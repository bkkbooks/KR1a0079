body:
  text: 周易本義集成卷四元熊良輔撰彖下傳咸感也釋卦名義集疏丘氏曰咸非訓感咸故感耳凡物兩相對待而後感應之理生故咸有感義而人不相得者謂之不咸也又曰咸者感也所以感者心也無心者不能感故咸加心而為感有心於感者不能咸故感無心而為咸惟無容心於感然後無所不感也聖人以咸名卦而彖以感釋之所以互眀其㫖也先儒謂咸為無心之感非也既無心矣又焉能感所謂無心者特不容心於感耳柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也以卦體卦德卦象釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通集疏程子曰咸之為卦兊上艮下少女少男也艮男敦實以下交兊女心說而上應男感之先也男先以誠感則女說而應也郭氏曰柔上而剛下二氣感應以相與天地之感也止而說男下女亨利貞取女吉人道之感也項氏曰柔上而剛下二氣感應以相與亨也止而說利貞也男下女取女吉也山澤相感六爻相應皆二氣感應之象又曰動而相說則有相隨之義止而相說則有相感之義男有室女有家止於禮而相說所以為夫婦也若動而相說則踰墻鑽穴豈夫婦之道哉此咸之所以取女吉也蔡氏曰柔上上也坤上交乾而為兊也剛下三也乾下交坤而為艮也愚案男下女是以取女吉男不下女而女從之非貞女也君不下士而士從之非貞士也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣極言感通之理集疏項氏曰咸曰觀其所感而天地萬物之情可見矣恆曰觀其所恆而天地萬物之情可見矣隂陽之情惟咸與恆而已愚案觀其所感易之所以感也而天地萬物之情可見易之有關於造化物理者也造化之感而化生人道之感而化成一感應之機天人之道備矣通論程子曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恆也恆久也剛上而柔下雷風相與巽而動剛柔皆應恆以卦體卦象卦德釋卦名義或以卦變言剛上柔下之義曰恆自豐來剛上居二柔下居初也亦通集疏程子曰震巽為恆男在女上男尊女卑男動於外女順乎內人理之常故為恆也又剛上柔下雷風相與巽而動剛柔皆應皆恆之義也愚案以卦變言自泰而來剛上居四柔下居初也恆亨無咎利貞久於其道也天地之道恆久而不已也恆固能亨且無咎矣然必利於貞乃為久於其道不貞則久非其道矣天地之道所以長久亦以貞而已矣愚案恆字從亘從心所謂亘古今而不已者此心也心之不已貞也貞則久於其道此以人事言也天地之道恆久不已亘古今不知其所始不知其所終也此以天道言也利有攸往終則有始也久於其道終也利有攸往始也動靜相生循環之理然必靜為主也集疏程子曰所謂亨者謂可常久之道非守一隅而不知變也終而復始隨時變易乃恆道一定則不能恆矣語録曰能常而後能變及其變也常亦只在其中日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣極言恆久之道集疏泉峰龔氏曰利貞久於其道者體常也利有攸往終則有始盡變也體常而後能盡變盡變亦所以體常天地萬物所以長久者以其能盡變也愚案上靣由人道說歸天道此復由天道說歸人道天地萬物之情可見則又合天人而為言也復見天地心咸恆萃見天地萬物之情聖人以易驗諸造化也遁亨遁而亨也剛當位而應與時行也以九五一爻釋亨義集疏郭氏曰聖人進退皆道無入而不自得雖遁亦亨也剛當位而應五應二也與時行者時止則止時行則行是為遁之義也語録問遁而亨分明是說能遁便亨下面更說剛當位而應與時行也是如何曰此所以遁而亨也陰尚微為他剛當位而應所以能知時而遁是能與時行不然便是與時背愚案剛當位而應謂二應五也二方浸長以害陽以五當位而應之故五得嘉遁而與時行也小利貞浸而長也以下二陰釋小利貞集疏語録問小利貞浸而長也是見其浸長故設戒令令其貞正且以寬君子之患然亦是他之福曰是如此與否初二兩爻相似遁之時義大矣哉陰方浸長處之為難故其時義為尤大也集疏新安胡氏曰遁以二陰之長成卦以四陽之遁得名易為君子謀名卦必以陽為主如是則時義之大亦以陽之能遁為言也愚案君子居當遁之時識當遁之義此所以遁而亨也大壯大者壯也剛以動故壯釋卦名義以卦體言則陽長過中大者壯也以卦德言則乾剛震動所以壯也大壯利貞大者正也正大而天地之情可見矣釋利貞之義而極言之集疏語録問大者正與正大不同上大字是指陽下大字是說理曰然亦緣上靣有大者正字方說此又曰正大便見天地之情天地只是正大未嘗有些子邪處項氏曰凡消息卦復姤臨遁泰否夬剝彖傳皆言消長之事獨觀與大壯不言消長者已過泰否則消長定矣其事以夬剝為終不係觀與大壯也徐氏曰大者壯壯之本體也大者正用壯之道也正大而天地之情可見則又推極其理而言之也晉進也釋卦名義明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也以卦象卦德卦變釋卦辭集疏丘氏曰明出地上離乘坤也順而麗乎大明坤附離也柔進而上行六自四上行進于五也愚案晉自觀來柔進而上行晝日三接即觀六四觀國之光利用賓于王之義明入地中明夷以卦象釋卦名內文明而外柔順以蒙大難文王以之以卦德釋卦義蒙大難謂遭紂之亂而見囚也利艱貞晦其明也內難而能正其志箕子以之以六五一爻之義釋卦辭內難謂為紂近親在其國內如六五之近於上六也集疏語録曰文王箕子大槩是晦其明然文王之外柔順是本分自然做底箕子晦其明又曰艱貞是他那佯狂底意思便是艱難底氣象項氏曰明夷彖傳以卦名與卦辭各當一事與諸卦彖辭不同文王之難在外故曰蒙大難箕子之難在家國故曰內難文王以全卦言箕子以六五一爻言也家人女正位乎內男正位乎外男女正天地之大義也以卦體九五六二釋利女貞之義集疏泉峰龔氏曰卦辭曰利女貞主二而言正家之道自內而始也彖傳曰女正位乎內男正位乎外主二五而言內外一於正而後家道正也彖傳又所以廣卦辭之㫖愚案卦辭利女貞故先言女正位乎內而後言男正位乎外女正位乎內則男正位乎外可知矣家人有嚴君焉父母之謂也亦謂二五集疏趙氏曰父義母慈母何以亦稱嚴蓋母之不嚴家之蠧也瀆上下之分庇子弟之過亂內外之别慢帷薄之儀父雖嚴有不能盡察者也必父母俱嚴內外齊肅而後家道正也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父初子五三夫四二婦五兄三弟以卦畫推之又有此象集疏愚案以父子兄弟分屬六爻則上父三子五兄初弟五初夫二四婦上之威如有嚴君之象焉所謂父盡父之道也三之婦子嘻嘻所謂子不子者與夫夫婦婦合取二應五四應初言而五初亦皆子也睽火動而上澤動而下二女同居其志不同行以卦象釋卦名義說而麗乎明柔進而上行得中而應乎剛是以小事吉以卦德卦變卦體釋卦辭天地暌而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉極言其理而贊之集疏程子曰睽者本同也本不同則非睽也泉峰龔氏曰水火根於一氣本同也及火動而上澤動而下則為睽矣二女同居本同也而其志不同行則為睽矣此始同而終暌者也天地睽而事同男女睽而志通萬物睽而事類此始睽而終同也同而睽睽而同此其時用之所以為大也或曰卦辭曰小事吉而彖傳稱其時用之大何也曰小事之吉以其睽者言也時用之大以其睽而同者言也睽則小而同則大也蹇難也險在前也見險而能止知矣哉以卦德釋卦名義而贊其美蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉以卦變卦體釋卦辭而贊其時用之大也集疏項氏曰蹇六爻皆不喜往往則入於蹇也彖獨喜往以一卦言之往有出之象也泉峰龔氏曰蹇合東北艮坎成卦西南其對方也利西南而得中出乎蹇之外也不利東北而道窮止乎蹇之地也利見大人而有功當位以致正邦之吉皆所以濟蹇也蹇雖以見險能止為知而不可以終止故又必以往而出險為功此其時用之所以為大也集疏項氏曰險而止為蒙止於外也見險而能止為知止於內也止於外者阻而得進止於內者有所見而不妄進也此蒙蹇之所以分也解險以動動而免乎險解以卦德釋卦名義集疏徐氏曰屯者解之反坎上震下曰屯坎下震上曰解屯則動乎險中解則動乎險外動乎險外則免乎險矣解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二集疏泉峰龔氏曰解合東北震坎而成卦利西南而得衆指對方坤位而言也來復而得中指下體坎中而言也夙往而有功指上體震卦而言也蓋難解於東北震坎險阻之地則利往於西南坤位平易之方無事則來復於坎中而以靜為吉有事則早用其震動而以速為功初以全體言次以二體對言也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉極言而贊其大也集疏語録曰陰陽之氣閉結之極忽然迸散做出這雷雨若只管閉結了而不解散如何會有雷雨作小畜所以不成雨者畜不極也徐氏曰雷雨作者氣之解也百果草木皆甲拆者形之解也形隨氣解則屈者伸鬱者暢生意充周此解之所以為大也損損下益上其道上行以卦體釋卦名義集疏新安胡氏曰損下卦乾九三之剛益上卦坤上六之柔而成損是為損下益上主剛而言故曰其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行此釋卦辭時謂當損之時集疏徐氏曰卦辭曰損有孚彖辭曰損而有孚加一而字則其義曉然矣泉峰龔氏曰當其可之謂時處損之時二簋用享損剛益柔皆當其可者也事各當其可則損所當損益所當益盈虛消息與時偕行矣益損上益下民說無疆自上下下其道大光以卦體釋卦名義集疏蔡氏曰損上益下損乾益坤也民說無疆益在下也徐氏曰自上下下其道大光天道下濟而光明也利有攸往中正有慶利涉大川木道乃行以卦體卦象釋卦辭集疏程子曰五以陽剛中正居尊位二復以中正應之是以中正之道益天下天下受其福慶者也益動而巽日進無疆天施地生其益無方凡益之道與時偕行動巽二卦之德乾下施坤上生亦上文卦體之義又以此極言贊益之大集疏項氏曰以利言之損上益下則民情悅以道言之則自上下下而其道光以六爻言之二五以中正相應故利有攸往以二卦言之震巽皆木也故利涉大川以卦德言之動而能巽則其進無疆耿氏曰在損則兼益曰損益盈虛在益則曰凡益之道不兼言損者損則求益益則不求損故也丘氏曰乾陽居初天氣下降坤陰居四地氣上騰此天施地生其益無方也夬決也剛決柔也健而說決而和釋卦名義而贊其德揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也此釋卦辭柔乘五剛以卦體言謂以一小人加於衆君子之上是其罪也剛長乃終謂一變則為純乾也集疏語録曰利有攸往剛長乃終今人以為陽不能無陰君子不能無小人故小人不可盡去今觀剛長乃終之言則聖人豈不欲小人之盡去邪但所以去之者自有道耳蔡氏曰其危乃光危消於孚號也所尚乃窮尚兵乃徒為窮黷也剛長乃終剛長當終於六位也徐氏曰剛長乃終不可有未盡之隂也君子雖盛不可以小人之勢孤謂其無能為而不盡去之唐五王不去一武三思而患生於所忽聖人於夬設戒深矣姤遇也柔遇剛也釋卦名集疏項氏曰陽之長也人以為君子之當然故曰復如人之復常也陰之長也人以為小人之天幸故曰遇如人之遭遇也故彖與雜卦皆曰柔遇剛也小人得君亦其運之遭耳勿用取女不可與長也釋卦辭集疏程子曰取女者欲長女而成家漸長之陰將逼於陽不可與之長久故戒勿用取如是之女天地相遇品物咸章也以卦體言集疏新安胡氏曰以乾遇巽巽得坤初爻而成故有天地相遇之象剛遇中正天下大行也指九五集疏語録曰姤是不好底卦然天地相遇以下却又甚好蓋天地相遇剛遇中正又自别取一義姤之時義大矣哉幾微之際聖人所謹集疏程子曰姤者女遇男而已推而上之天地不相遇則萬物不生君臣不相遇則政治不興姤之時與義皆甚大也泉峰龔氏曰姤遇也以下是言姤之不善者天地相遇以下皆言姤之善者時義之大是兼指上兩節而言與遁之所稱時義同本義謹幾微之說似非本意萃聚也順以說剛中而應故聚也以卦德卦體釋卦名義王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也釋卦辭集疏郭氏曰用大牲吉利有攸往者因時而可有為也時則所謂天命也當可為而為所以順天命也觀其所聚而天地萬物之情可見矣極言其理而贊之集疏徐氏曰天地萬物髙下散殊咸則見其情之通恆則見其情之久萃則見其情之同不於其萃而觀之其情不可得而備見也柔以時升以卦變釋卦名巽而順剛中而應是以大亨以卦德卦體釋卦辭集疏新安胡氏曰易以陽為大巽順不足以大亨必剛中而應所以大亨用見大人勿恤有慶也南征吉志行也項氏曰萃與升皆剛中而應萃剛中在上其衆必萃升剛中在下其勢必升故萃以五為大人升以二為大人聚者下之所樂故利見大人升者上之所忌故勸以用見大人勿恤吉言上三陰勿以陽升為憂陽來朋陰乃陰類之慶也用見大人勿恤戒陰也南征吉勉陽也困剛掩也以卦體釋卦名險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也以卦德卦體釋卦辭集疏項氏曰當困之時君子則不失其所亨大人則能致吉而無咎君子之亨顔曾之困也大人之吉無咎舜文周孔之困也惟大人能因汗隆以起變化故否之時君子避難而大人不害其亨與吉也新安胡氏曰只兊象上六為兊之主居窮極之地故有尚口乃窮之象泉峰龔氏曰在險則困說則不失其所亨處困而亨非君子不能也剛中而吉則有以出險尚口乃窮則益取困矣巽乎水而上水井井養而不窮也以卦象釋卦名義集疏誠齊楊氏曰巽入也巽乎水者入乎水也入乎水而能上乎水則井之用行矣改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也以卦體釋卦辭無喪無得往來井井兩句意與不改井同故不復出剛中以二五而言未有功而敗其瓶所以凶也集疏項氏曰幾至而未至者特未出而已猶可勉也一羸其瓶綆斷瓶碎不可為也童溪王氏曰巽乎水而上水合坎巽以言井之功用也夫井之為物取之而不竭無喪也存之而不盈無得也無喪無得則凡有求於我者皆賴我以為用也故曰無喪無得往來井井此又合井之體用以言井養之不窮也革水火相息二女同居其志不相得曰革以卦象釋卦名義大略與睽相似然以相違而為睽相息而為革也息滅息也又為生息之義滅息而後生息也集疏程子曰水火相息之物火性上水性下若相違行則睽而已今水上火下相就而相剋相滅息者也所以為革也臨川王氏曰澤火非如坎離有相逮之道其相遇則相息而已其相息也惟勝者能勝其不勝者爾泉峰龔氏曰水火之交不交為既未濟澤火之或上或下為睽為革澤火之與水火果何異邪曰坎水離火一陰一陽故其交則相為用而為既濟不交則不相為用而為未濟兊澤離火二卦皆陰故其相違則為睽相遇則為革蓋一隂一陽則相為用二隂則不相為用故也己日乃孚革而信之文明以說大亨以正革而當其悔乃亡以卦德釋卦辭集疏程子曰離為文明兊為說文明則理無不盡事無不察說則人心和順革而能察事理順人心可致大亨而得貞正如是變革得其至當故悔亡也郭氏曰文明見於未革之先說見於已革之後天地革而四時成湯武革命順乎天而應乎人革之時大矣哉極言而贊其大也集疏語録曰革是更革之謂須是翻轉更變一畨所謂上下與天地同流豈曰小補之哉小補之者謂扶衰救弊逐些補緝如錮露家事相似若是更革須是徹底重新鑄造非止補苴罅漏而已湯武順天應人是如此建安張氏曰時未當革聖人不能先時時而當革聖人不敢後時上順天命下應人心革而當其可故曰革之時大矣哉鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢以卦體二象釋卦名義因極其大而言之享帝貴誠用犢而已養賢則飱牢醴當極其盛故曰大亨集疏耿氏曰巽木而上水非井也井汲之用也以木巽火非鼎也鼎亨飪之用也蔡氏曰亨飪鼎之用也亨飪不過祭祀賓客二事而祭之大者無出於上帝賓客之重者無過於聖賢事天尚質故止言亨養聖賢貴多故曰大亨巽而耳目聰明柔進而上行得中而應乎剛是以元亨以卦象卦變卦體釋卦辭集疏程子曰離明而中虛於上有耳目聰明之象凡離上者皆云柔進而上行柔在下之物乃居尊位進而上行也震亨震有亨道不待言也震來虩虩恐致福也笑言啞啞後有則也恐致福恐懼以致福也則法也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也程子以為邇也下脫不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤集疏程子曰雷之震動驚及百里人無不懼而自失惟宗廟祭祀人無不盡其誠敬之心則雖雷震之威不能使之懼而自失其守故臨大震懼能安而不自失者惟誠敬而已此處震之道也徐氏曰震之所以亨者當震之來則虩虩然恐懼而顧慮乃因恐以致福也笑言啞啞所以繼於恐懼之後定而後能安自處有法則矣雷之震及於百里逺者驚而邇者懼而能不喪匕鬯則可以守宗廟社稷而為祭主矣丘氏曰驚者卒然遇之而動乎內懼者惕然畏之而變乎中也驚遠懼邇甚言雷之可畏也艮止也時止則止時行則行動靜不失其時其道光明此釋卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜之於艮亦以輝光言之集疏語録曰行固非止然行而不失其理乃所止也問艮之象何以為光明曰定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定則天光發是也徐氏曰光明陽德也艮以一陽進居二隂之上光明著見非隂暗所能掩蔽故其道自然光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也此釋卦辭易背為止以明背即止也背者止之所也以卦體言內外之卦隂陽敵應而不相與也不相與則內不見已外不見人而無咎矣朝氏云艮其止當依卦辭作背集疏語録曰艮其止止其所也上句止字當作背字下句止字是解艮字所字是解背字蓋云止於所當止之所即至善之地也不獲其身是無與於已不見其人是亦不見人無已無人惟見義理之當止所謂止其所也又曰八純卦都不相與只是艮卦是止尤見不相與內不見已是內卦外不見人是外卦兩卦各自去丘氏曰有止之時有止之所止之時如夫子之仕止久速各當其可是也止之所如大學之仁敬孝慈各得其分是也自艮止也而下言止之時自艮其止而下言止之所漸之進也女歸吉也之字疑衍或是漸字進得位往有功也進以正可以正邦也以卦變釋利貞之意蓋此卦之變自渙而來九進居三自旅而來九進居五皆為得位之正集疏蔡氏曰進得位四也乾下爻交坤而為艮坤上爻交乾而為巽漸義上進故只取坤爻進為言丘氏曰進得位往有功是釋女歸吉之義進以正可以正邦是釋利貞之義建安張氏曰女子適人不可遽合必待六禮備而後行故女歸以漸為吉進以正可以正邦者家道正而天下定矣其位剛得中也以卦體言謂九五也止而巽動不窮也以卦德言漸進之義集疏程子曰內艮止外巽順止為安靜之象巽為和順之義人之進也若以欲心之動則躁而不得其漸故有困窮在漸之義內止靜而外巽順故其進動不至困窮也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也釋卦名義也歸者女之終生育者人之始說以動所歸妹也又以卦德言之集疏語録曰歸妹未有不好只是說以動帶纍他征凶位不當也無攸利柔乘剛也又以卦體釋卦辭男女之交本皆正理惟若此卦則不得其正也集疏徐氏曰位不當則紊男女內外之正柔乘剛則悖夫婦倡隨之理所以征凶而無攸利也新安胡氏曰動而說為隨此陽倡而隂和男行而女從得男女之正故元亨利貞說以動為歸妹則是隂先倡而陽和女先行而男從失男女之正故征凶無攸利豐大也明以動故豐以卦德釋卦名義集疏語録曰明以動故豐以明心應事物非明則動無所之非動則明無所用王假之尚大也勿憂宜日中宜照天下也釋卦辭集疏語録曰王假之尚大也只是王者至此極大底時節所尚皆大事蔡氏曰明以動合二德言其致亨之道豐宜當作亨尚大言王能尚其豐之大也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎此又發明卦辭外意言不可過中也集疏語録曰豐卦彖許多言語其實在日中則昃月滿則食天地盈虛與時消息數句上這盛得極當須緊守得日中時候方得不然偃仆傾壞了旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也以卦體卦德釋卦辭集疏童溪王氏曰入而麗乎內者處家之象也故巽離合而為家人止而麗乎外者旅人之象也故艮離合而為旅旅也者聖賢失位之時夫君子之道固無往而不亨然時乎得位其亨在於天下時乎失位則其亨止於其身故曰柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅之時為難處集疏程子曰天下之事當隨時各適其宜而旅為難處故稱其時義之大重巽以申命釋卦義也巽順而入必究乎下命令之象重巽故為申命也集疏語録曰申字是叮嚀反覆之意風無所不入如命令之叮嚀告戒無所不至故象以之剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四集疏丘氏曰巽之德順而善入而於象為風風者天之號令故有命令之象內巽者命之始外巽者申前之命也故曰重巽以申命巽雖立乎柔而二五以剛得中故論成卦則以柔為主論六爻則以剛為重二五能巽乎中正則剛不過而志行若柔則不能自振必順乎剛而後可亨初順二四順五柔皆順乎剛也柔順乎剛故小者得亨利有攸往利見大人大人指二五之剛而言也兊說也釋卦名義剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉以卦體釋卦辭而極言之集疏程子曰陽剛居中中心誠實之象柔爻在外接物和柔之狀故為說以利貞貞者說之以道也說而能貞是以上順天理下應人心說道之至正至善者也若夫違道以干譽者苟取一時之說耳非君子之正道也語録曰設若不是剛中便成邪媚下面許多道理都從這箇剛中柔外來順天應人革卦是就革命上說兊卦是就說上說渙亨剛來而不窮柔得位乎外而上同以卦變釋卦辭集疏語録問剛來而不窮窮是窮極來處乎中不至窮極否曰是居二為中若在下則是窮矣又曰剛來而不窮是九三來做二柔得位乎外而上同是六二上做三此說有些不穩却為六三不喚做得位蔡氏曰剛來而不窮二也乾下交坤而為坎也二在卦中故不窮柔得位四也坤上交乾而為巽也上同四上同乎五也王假有廟王乃在中也中謂廟中利涉大川乘木有功也集疏丘氏曰王在中五也五陽剛居尊為渙之主而在上卦之中假有廟也乘木謂巽木在坎水之上有功謂利涉也節亨剛柔分而剛得中以卦體釋卦辭苦節不可貞其道窮也又以理言說以行險當位以節中正以通又以卦德卦體言之當位中正指五又坎為通集疏程子曰內兊外坎說以行險也人於所說則不知己遇艱險則思止方說而止為節之義當位以節五居尊位主節者也處得中正節而能通也中正則通過則苦矣語録曰說則欲進而有險在前進去不得故有節止之義問節卦大抵以當而通為善本義云坎為通豈水在中閒流而不止邪曰然天地節而四時成節以制度不傷財不害民極言節道集疏丘氏曰節下卦乾分上爻剛以節坤上卦坤分中爻柔以節乾天地節也天地之氣運而有節則分至啓閉弦望晦朔四時不差而歲功以成聖人體節之義則立為制度量入為出無泛用無過取故不傷財則不害民語曰節用而愛人正此意也中孚柔在內而剛得中說而巽孚乃化邦也以卦體卦德釋卦名義集疏語録曰柔在內而剛得中這箇是就全體看則中虛就二體看則中實他都見得有孚信之意故喚作中孚豚魚吉信及豚魚也利涉大川乘木舟虛也以卦象言集疏司馬氏曰中孚者發於中而信於人之謂也豚魚無知之物飼之以信則應期而集而況於人乎中孚以利貞乃應乎天也信而正則應乎天矣集疏蔡氏曰舟虛以卦象言應乎天五天位也愚案中孚得其正道乃應乎天天者理而已矣所謂至誠可以通神明也小過小者過而亨也以卦體釋卦名義與其辭過以利貞與時行也集疏蔡氏曰與時行謂隨小過之時而用其正也泉峰龔氏曰道貴得中過非所尚然隨時之宜施當其可則過也乃所以為中也故曰過以利貞與時行也與時行而不失其貞則過非過矣柔得中是以小事吉也以二五言剛失位而不中是以不可大事也以三四言有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也以卦體言集疏蔡氏曰上逆下順隂之道也丘氏曰飛鳥遺之音者言鳥飛而音尚遺過之不遠者也隂以承陽為順乘陽為逆上逆而下順者明不宜上宜下之義既濟亨小者亨也濟下疑脫小字利貞剛柔正而位當也以卦體言集疏蔡氏曰剛柔正乾坤相交而為坎離五以剛居上二以柔居下上下定位剛柔正也剛居陽位柔居隂位位當也初吉柔得中也指六二終止則亂其道窮也集疏程子曰天下之事不進則退無一定之理濟之終不濟而止矣無常止也衰亂全矣蓋其道已窮極也聖人至此奈何曰惟聖人為能通其變於未窮不使至於極也堯舜是也故有終而無亂愚案初吉柔得中指二而言終止則亂指上而言窮則變也未濟亨柔得中也指六五言集疏語録問未濟所以亨者便是有濟之理而柔得中又有亨之道曰然項氏曰既濟自泰變六五降而為二以六二為主爻未濟自否變六二升而為五以六五為主爻故二彖皆曰柔得中也既濟之終亂即泰之命亂未濟之飲酒即否之後喜也蔡氏曰既濟之後必亂故主在下卦而亨取二未濟之後必濟故主在上卦而亨取五又曰坎者隂陷陽而陽難離者隂麗陽而陽明是坎雖陽卦而陽不得用離雖隂卦而陽反得用故既未濟名義主坎以坎陽卦也其亨主離者以離陽得用故也小狐汔濟未出中也濡其尾無攸利不續終也集疏語録曰未出中不獨是說九二通一卦之體皆是未出乎坎險所以未濟不續終是首濟而尾濡不能濟不相接續去故曰不續終也狐尾大濡其尾則濟不得了雖不當位剛柔應也集疏滿氏曰六爻雖不當位而剛柔皆應苟能協力以濟亦可致亨未濟者終濟矣愚案既濟諸爻皆當位乃曰其道窮未濟諸爻皆不當位乃曰剛柔應蓋易變易也窮則變之道也當既濟則反於未濟未濟則終須濟也周易本義集成卷四
