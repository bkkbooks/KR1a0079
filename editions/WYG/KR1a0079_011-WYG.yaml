body:
  text: 周易本義集成卷十一元熊良輔撰序卦傳有天地然後萬物生焉盈天地之閒者唯萬物故受之以屯屯者盈也屯者物之始生也集疏程子曰萬物始生鬱結未通故為盈塞於天地之間至通暢茂盛則塞意忘矣愚按不言乾坤而言天地乾坤天地之性情也故直指其形體言之則乾坤見矣物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也集疏項氏曰人之所需飲食為急故以需為飲食之道愚按屯者物之始生蒙者民之始生至是方有人物之分而不可无以養之需者飲食之道所以養之也茹毛飲血而至於粒食民命立矣飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履集疏項氏曰人之所履未有外於禮者外於禮則非所當履故以履為有禮也履上天下澤亦有禮之名分焉愚按履踐履也踐履乎實則為有禮矣履而泰然後安晁氏云鄭无而泰二字故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也集疏項氏曰蠱不訓事蠱者壊也事因壊而起故以蠱為事之元如人之亡謂事故也以喜隨人者必淪胥以壊所謂荒於嬉毁於隨者此之謂也有事而後可大故受之以臨臨者大也集疏張子曰天下之事未有驟而大者必積累以成之有事然後可大故受之以臨者二陽進而四隂退駸駸已向於大矣物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以无妄集疏程子曰復者反於道也既復於道則合於正理而自无妄矣有无妄然後可畜故受之以大畜集疏程子曰无妄則為有實故可畜聚物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過集疏語錄問不養則不可動故受之以大過何也曰動則過矣故小過亦曰有其信者必行之故受之以小過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也集疏泉峰龔氏曰陷於險者必有所附麗有所憑藉而後可以出險无所附麗憑藉而能出險者未之有也故受之以離則有出險之道而不終陷矣序此於上經之終是亦窮則變之道也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯集疏語錄問卦序下經不言咸何也曰夫婦之道即咸也曰亦如上經不言乾坤而但言天地則乾坤可見否曰然夫婦之道不可以不乆也故受之以恒恒者乆也物不可以乆居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉集疏語錄問物不可以終壯受之以晉竊意物進然後至於壯盛既壯盛則衰退繼之矣今易傳曰壯盛則必進何也曰物固有壯而後進者亦有進而後壯者其義自有不同難以一説拘也且以十二月卦論大壯之為夬夬之為乾豈非壯而後進乎至乾乃極其衰耳又問壯與進何别曰不但如此壯而已又更須進一歩也晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也集疏語錄問緩字恐不是遲緩之意乃是懈怠之意故曰解緩也曰緩字是散意緩必有所失故受之以損損而不已必益故受之以益益而不已必决故受之以夬夬者決也決必有所遇故受之以姤姤者遇也集疏項氏曰決者相分别也遇者相會合也物有分必有合故曰決必有所遇物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升集疏程子曰物之積聚而益髙大聚而上也故升所以次萃升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革集疏程子曰井之為物存之則穢敗易之則精潔不可不革也愚按升而不已必困所謂冥升者也困乎上者必反下所謂困窮而通者也井道不可不革所謂井渫井甃居其所而遷者也革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也集疏程子曰羈旅親寡非巽順何以取容苟能巽順雖羈旅之中何往而不能入巽所以次旅也入而後説之故受之以兌兌者説也説而後散之故受之以渙渙者離也集疏項氏曰人之情相拒則怒相入則説故入而後説之憂則氣結説則氣散故説而後散也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過集疏項氏曰有節者必能守之以信自恃其信其行必果而過於中有其信猶書所謂有其善之有言其以此自負也有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉集疏項氏曰坎離之交謂之既濟此生生不窮所從出也而聖人猶以為有窮也又分之以為未濟此即咸感之後繼之以恒乆之義葢情之交者不可以乆而无弊故必以分之正者終之人之心腎其氣何嘗不交而心在上腎必在下不可易也以此觀之則可以知既濟未濟之象矣總論卲子曰易首乾坤中坎離終水火之交不交皆至理也又曰乾坤坎離上篇之用兌艮震巽下篇之用頥中孚大小過二篇之正程子曰乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恒夫婦之道生育之本故為下篇之首既未濟坎離之合合則交而生物隂陽之功也故為下篇之終二篇之卦既分然後推其義為之以序卦是也語錄曰序卦大率上經用乾坤坎離為始終下經便當用艮兌震巽為始終或問上經三十卦下經三十四卦多寡不均何也曰卦有正對有及對乾坤坎離頥大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而為三十六卦其上經不變卦凡六乾坤坎離頥大過是也自屯蒙而下二十四卦反之則為十二以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恒二卦反之則為十六以十六而加二亦十八也其多寡之數未嘗不均也問序卦或云非聖人之書信乎曰此沙隨程氏之説也先儒以為非聖人之藴某以為非聖人之精則可謂非易之藴則不可周子分精藴字甚分明序卦正是易之藴事事夾雜有在裏面項氏曰易始於乾坤終於坎離而震艮兑巽錯綜於其中故上下經之終皆先列不反對之卦二而後以坎離終之其不相反對者艮與震合巽與兑合之卦也明四卦之變畢坎離之用終也乾坤相合於上經之中而坎離相合於下經之終明乾坤為體坎離為用也震艮與巽兑相合於上經者一相合於下經者三乾坤與坎離相合於上經者三相合於下經者一明乾坤坎離為上經之主震艮兌巽為下經之主也又曰陽長之卦復臨泰皆在上經隂長之卦姤遯皆在下經否以與泰反對故得在上經陽多在上隂多在下也環溪李氏曰經分上下見於大傳大衍章二篇之策之語兼序卦至坎離别起文義而上經首乾坤是二老對立下經首咸是二少合體故上經隠乾坤之名下經獨隠咸之名以次推之所可見者上經需訟對下經晉明夷需訟變之盡為晉明夷上經泰否對下經損益泰否乾坤之交不交損益咸恒之交不交也上經頥大過偶在坎離之前下經中孚小過偶在既未濟之前坎離之交不交也頥似離大過似坎而坎離繼之中孚厚畫離小過厚畫坎而既未濟繼之此坎離又為乾坤震巽艮兌之用也上經五十二陽爻五十六隂爻下經五十六陽爻五十二隂爻以此觀之經分上下必有至理惜乎師説不傳未能究其所以然者深居馮氏曰上篇皆乾坤坎離之卦其否者四卦隨蠱頥大過是也下篇皆震兑艮巽之卦其否者四卦晉明夷既未濟是也泉峰龔氏曰上經以乾坤坎離為主下經以震艮巽兑為主故上經多乾坤坎離之卦下經多震艮巽兑之卦上經乾坤坎離合者十二卦震艮兑巽合者才四卦下經震艮兊巽合者十二卦乾坤坎離合者才四卦上經首乾坤而終坎離下經首咸恒而終既未濟咸恒兌艮震巽之合也既未濟坎離之合也上經將終序頥大過下經將終序中孚小過頥大過震艮兑巽之合也中孚小過亦震艮兑巽之合也乾坤坎離為上經之主而雜序於下經震艮兑巽為下經之主而雜序於上經互相為用也上經乾坤坎離四卦不變乾坤交而為否泰則變矣坎離交而為既未濟則變矣下經震艮兌巽四卦皆變震艮交為頥小過巽兌交而為中孚大過則不變矣頥中孚似離大小過似坎上經列頥大過於坎離之前下經列中孚小過於既未濟之前无往而非坎離也故坎離為乾坤之大用而艮震兑巽又所以成坎離之用也參同契曰乾坤易之門戸坎離匡郭運轂正軸牝牡四卦以為橐籥其序亦有取於此與又按後天序卦皆本先天八卦自相反對重為乾坤坎離願中孚大小過八正卦而以乾坤坎離為上經之始終而位頥大過於上經坎離之前位中孚小過於下經既未濟之前以先天八卦兩兩相對重為否泰咸恒損益既未濟八變卦而以咸恒損益既未濟為下經之始終而上經十一卦序泰否而下經十一卦序損益其始終次序无非自先天八卦來也先天者其後天之祖後天者其先天之用與愚按上經以乾坤坎離為主下經以兌艮震巽為主正伏羲八卦方位伏羲八卦方位乾南坤北離東坎西皆列之四方之正位兌艮震巽列之四隅列之四方之正位以正對言天之道也列之四隅者以反易言人之道也以天道而言故乾坤為首於上經主人道而言故咸恒為首於下經以乾坤坎離為主故首乾坤而終坎離以兑艮震巽為主故首咸恒而四卦皆在下經以伏羲八卦方位言之乾坤重而為泰否坎離重而為既未濟此正對之卦也兌艮重而為咸損震巽重而為恒益此反對之卦也乾坤上經之首泰否上經之中坎離上經之終咸恒下經之首損益下經之中既未濟下經之終今之易序即伏羲之卦序也若乾坤坎離頥中孚大小過此固以正對為序也屯反為蒙需反為訟之類此以反對為序然頥大過序於上經之末中孚小過序於下經之末者以明諸卦之反對及其終也又歸於正對始雖變而終不失其常也周易本義集成卷十一
