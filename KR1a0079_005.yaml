body:
  text: 周易本義集成卷五元熊良輔撰象上傳象者卦之上下兩象及兩象之六爻周公所繫之辭也集疏愚案六爻之辭乃周公所繫此謂象之傳乃孔子之言也天行健君子以自彊不息天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自彊而不息矣集疏胡氏曰天者乾之形乾者天之用天形蒼然南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里天之行健可知故君子法之以自彊不息云楊氏曰自彊不息所以體天之行健蓋思誠之道也語録曰天行健以氣言之則一晝一夜周乎三百六十五度而又過一度以理言之則於穆不已無間容息豈不是至健深居馮氏曰天一而已必言天之行也每一晝一夜而周一天於以見重乾之象焉天一晝一夜行九十餘萬里人一呼一吸謂之一息每一晝一夜一萬三千五百息則是一息之間天已行八十餘里矣亘古今未嘗止息何其健也法乾以自彊法重乾以不息則是人皆可以用健而自幾於天德也新安胡氏曰六十四卦大象皆著一以字以者所以體易而用之也愚案人一呼一吸謂之一息則天之一晝一夜亦可謂之一息人身小天地也觀之潮汐可見天之呼吸也天之行也十二萬九千六百年上不知其何所始下不知其何所終也天之健行如是哉君子體之以進德修業無有一息之間斷此其所以能參天地並立而為三才也與通論孔氏曰六十四卦象通上下則稱君子施於天子不兼在下則稱先王其兼諸侯則稱后又有稱上稱大人者上凡人上者皆是大人則以德言也濳龍勿用陽在下也陽謂九下謂濳集疏孔氏曰經言龍而象言陽明經之龍即陽也一爻舉自然之象五爻言人事互相通也徐氏曰陽釋龍字下釋濳濳故勿用愚案本義九當作龍濳龍釋初九之象陽在下又釋濳龍之所以取義言陽在下則謂之君子之在下亦可也見龍在田德施普也集疏語録曰如日方升雖未中天而光已無所不被矣徐氏曰德龍德也在地上則澤乎物故施普也林氏曰見龍在田非謂龍之在田也興雲致雨雨我田疇德澤在田也所貴乎大人者謂其德之及物也終日乾乾反復道也反復重復踐行之意集疏項氏曰三之上下皆得純乾故曰反復道此解乾乾二字論位則重剛故危論德則反復合道故無咎四亦以進退皆合道故得無咎三以自修故曰反復四以自試故曰進退或躍在淵進無咎也可以進而不必進也集疏石氏曰爻辭但云或躍無咎夫子加進字以斷其疑以進字釋躍字飛龍在天大人造也造猶作也集疏徐氏曰大人造者聖人作也龍以飛而在天猶大人作而居位大人釋龍字造釋飛字亢龍有悔盈不可久也集疏徐氏曰盈謂陽極釋亢字不可久釋有悔字用九天德不可為首也言陽剛不可為物先故六陽皆變而吉天行以下先儒謂之大象濳龍以下先儒謂之小象後倣此集疏語録曰乾為萬物之始故天下之物無不資之以始但其六爻有時而皆變故有羣龍無首之象而君子體之則當謙卑恭順不敢為天下先耳非謂可天德而不可為首若乾不為首則萬物何所資而為始而又誰為之首愚案天德不可為首天德釋見羣龍不可為首釋無首蓋言其變而之坤也六爻皆變而之坤是謂見羣龍無首象釋之以天德今變而之坤則不可為首矣上面進盈及天德皆當微斷句讀地勢坤君子以厚德載物地坤之象亦一而已故不言重而言其勢之順則見其髙下相因之無窮至順極厚而無所不載集疏語録問地勢猶言髙下相因之勢以其順且厚否曰髙下相因只是順若厚又是一箇道理然惟其厚所以只管上下相因去若是薄底物髙下只管相因則傾陷了不能如此無窮矣惟其髙下相因無窮所以為至順也君子體之惟至厚為能載物馮氏曰地一而已而勢有髙下於以見重坤之象焉地之厚無不載也法坤以厚德法重坤以載物則是德厚也物斯載焉天地民物之責聖賢道學之傳任之以身非其德之厚孰能載之哉履霜堅冰隂始凝也馴致其道至堅冰也案魏志作初六履霜今當從之馴順習也集疏丘氏曰乾初九小象釋之以陽在下坤初六小象釋之以隂始凝聖人欲明九六之為隂陽故於乾坤之初畫言之其㫖如此六二之動直以方也不習無不利地道光也游氏曰坤之六二靜則中正動則直方坤之道盛於六二而直方因動而見也徐氏曰生物而無所回非直乎賦形而無所移易非方乎含章可貞以時發也或從王事知光大也集疏程子曰夫子懼人守文而不逹義也又從而明之言義所當為則以時而發非含藏終不為也泉峰龔氏曰含章可貞或從王事惟知之光大者能之若淺暗之人豈能含章豈能出以從王事知之不光大者不知時措之宜也括囊無咎慎不害也集疏丘氏曰慎釋括囊義不害釋無咎義耿氏曰君子之括囊非惡有譽也惡有咎耳故象曰無咎不害而不及譽也黃裳元吉文在中也文在中而見於外也龍戰于野其道窮也用六永貞以大終也初隂後陽故曰大終集疏語録曰坤六爻皆隂其始本小到此隂皆變陽所謂以大終也言始小而終大雲雷屯君子以經綸坎不言水而言雲者未通之意經綸治絲之事經引之綸理之也屯難之世君子有為之時也集疏程子曰坎不云雨而云雲者雲為雨而未成者也郭氏曰坎在上為雲故雲雷屯坎在下為雨故雷雨作解雲而未雨則為屯已雨則為解屯猶妊解猶産也馮氏曰雲雷方作而未雨有屯結之象君子觀象以冶世之屯猶治絲者既經之又綸之所以解其結而使就條理也經之如雲之彌密綸之如雷之發達雖盤桓志行正也以貴下賤大得民也集疏程子曰陽居隂下以貴下賤之象方屯之時隂柔不能自存有一陽剛之才衆所歸從更能自處卑下所以大得民也楊氏曰初以陽剛之才足以濟時之屯又能以貴下賤宜得其民矣然猶盤桓不進者志行正故也行一不義殺一不辜得天下不為所謂正也六二之難乘剛也十年乃字反常也即鹿無虞以從禽也君子舍之往吝窮也求而往明也集疏泉峰龔氏曰求謂初上求四往謂四下從初四待初求而後往是知有陽倡隂隨之義其見可謂明矣屯其膏施未光也泣血漣如何可長也山下出泉蒙君子以果行育德泉水之始出者必行而有漸也集疏司馬氏曰果行言其動育德言其靜也君子動果而靜專項氏曰果行象泉之出育德象山之深力行者似戅養德者似愚皆有蒙之象焉彖言治人之蒙此言君子以蒙自治也馮氏曰泉之出山也有幽蒙欲達之象果行如泉育德如山蒙與蠱上卦皆山故皆曰育德其下卦為泉則曰果行為風則曰振民觀此則知字字有歸著而用卦之㫖可識矣坎水也而不為水者四卦初出山下者為泉蒙也氣在天上者為雲需也其遇雷者亦為雲屯也或為雨解也利用刑人以正法也發蒙之初法不可不正懲戒所以正法也集疏釋褐楊氏曰正法云者正吾教人之法非謂置之法律者也如記之夏楚二物以收其威書所謂朴作教刑是也子克家剛柔接也指二五之應集疏程子曰二五剛柔之情相接故得行其剛中之道成發蒙之功苟非上下之情親二雖剛中安得尸其事乎勿用取女行不順也順當作慎蓋順慎古字通用荀子順墨作慎墨且行不慎於經意尢親切困蒙之吝獨逺實也實協韻去聲集疏徐氏曰剛實發蒙四獨逺之困於蒙者也故吝童蒙之吉順以巽也集疏新安胡氏曰順以爻柔言巽以志應二言利用禦寇上下順也禦寇以剛上下皆得其道集疏程子曰利用禦寇上下皆得其順也上不為過㬥下得擊去其蒙禦寇之義也愚案蒙小象凡三順字只是一般不必以不順為不慎蓋六三所行不順故勿用取之雲上於天需君子以飲食宴樂雲上於天無所復為待其隂陽之和而自雨耳事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也集疏程子曰飲食以養其氣體宴樂以和其心志所謂居易以俟命也馮氏曰水氣上於天而雲興焉有需待將雨之象飲食之奉宴樂之暇安養以待時也項氏曰飲食坎象宴樂乾象需于郊不犯難行也利用恆無咎未失常也需于沙衍在中也雖小有言以吉終也衍寬意以寬居中不急進也集疏釋褐楊氏曰需貴乎逺而不貴乎近初九之需于郊於險為逺九三之需于泥於險為近二居郊與泥之間故曰沙論其所居之地雖不及於郊而勝於泥焉故得以寬裕居中而不陷於險也需于泥災在外也自我致寇敬慎不敗也外謂外卦敬慎不敗發明占外之占聖人示人之意切矣集疏語録問占外之占曰象中本無此意占者不可無此意所謂占外意也丘氏曰三既迫坎故曰致寇至夫坎在外未嘗迫人由人急於求進自迫於險以致禍敗象以自我釋之明致災之由不在他人也然能以敬慎自處亦不至於敗也需于血順以聽也集疏丘氏曰需之三四乾坎之會也三恃健冒險而進四據險以待乾來聖人於三以敬告之能敬則不犯坎矣於四以順告之能順則不忤乾矣二者交盡其道此處需之要也酒食貞吉以中正也不速之客來敬之終吉雖不當位未大失也以隂居上是為當位言不當位未詳集疏程子曰隂宜在下而居上不當位也然能敬以自處終必得吉而亦未為大失也天與水違行訟君子以作事謀始天上水下其行相違作事謀始訟端絶矣集疏郭氏曰天體於上水行於下天道左旋水性右流皆違行而不相親故曰訟不親也不親所以為訟馮氏曰天西而水乃東相違而為訟天上而火亦上相合而為同人項氏曰作屬乾謀屬坎不永所事訟不可長也雖小有言其辨明也集疏程子曰訟不可長之事居訟之初故因以戒之石氏曰初六自以隂柔居下無犯上之事九四居上恃其剛壯而陵初如此則初之理直雖小有言其辨易明故得終吉也不克訟歸逋竄也自下訟上患至掇也掇自取也集疏程子曰自下訟上義乖志屈禍患之至猶掇拾而取之言易得也京口曰逋言遁之逺竄言伏之深掇言自取之速也食舊德從上吉也從上吉謂隨人則吉明自主事則無成功也集疏釋褐楊氏曰二健而訟上故取逋竄之羞三順而從上則食舊德而吉也復即命渝安貞不失也訟元吉以中正也中則聽不偏正則斷合理集疏泉峰龔氏曰訟元吉以中正也是訟者得其中正而元吉似無與聽斷之事也以訟受服亦不足敬也集疏愚案訟終必凶雖或幸勝不可以為常故夫子抑之曰受服亦不足敬所以戒人終訟也地中有水師君子以容民畜衆水不外於地兵不外於民故能養民則可以得衆矣集疏楊氏曰地中有水容而能畜也故君子體師之象以容民畜衆馮氏曰地無不容衆水所歸有師之象民與衆對言則民農也衆兵也武有七德亦曰安民和衆也古者井田兵農為一為農則曰比閭族黨州鄉以養民也為兵則伍兩卒旅師軍以畜衆也容民如地畜衆如水坤容而坎畜也師出以律失律凶也在師中吉承天寵也王三錫命懷萬邦也集疏程子曰在師中吉者以其承天之寵任也天謂五也人臣非君寵任之則安得專征伐之權而有成功之吉象以二專主其事故發此義王三錫以恩命褒其成功所以懷萬邦也師或輿尸大無功也左次無咎未失常也知難而退師之常也長子帥師以中行也弟子輿尸使不當也集疏愚案使不當分明是說帥師當用長子用弟子則有輿尸之凶程傳衆主之說非本意大君有命以正功也小人勿用必亂邦也聖人之戒深矣集疏丘氏曰初言師之出六言師之還則功成奏凱之時也大君行賞功之命開國功之大者也承家功之小者也以正功者言爵賞之命所以正諸將武功之等差也然兵行詭道出竒立功不必皆君子也此曰小人勿用者蓋以小人有功固當列賞之若使參預國家之謀議則必挾功以逞而生僭竊亂邦之禍故戒以勿用勿者禁辭必者决辭也愚案開國承家所以正其功小人勿用又是開國承家以後底事言既開國承家之後則天下大定矣天下火定但戒以勿用小人則可保安於無窮用小人則必至於亂邦也以正功為創業之始小人勿用為盡守成之道矣地上有水比先王以建萬國親諸侯地上有氷水比於地不容有間建國親侯亦先王所以比於天下而無間者也彖言人來比我此取我往比人集疏程子曰夫物相親比而無間者莫如水在地上所以為比也先王觀比之象建萬國所以比民親諸侯所以比天下也語録曰伊川言建萬國以比民言民不可盡得而比故建諸侯使比民而天子所親者諸侯而已這便是他比天下之道朱氏曰建萬國則民比其國君親諸侯則民比於天子馮氏曰地上之水異源同流有合比之象畎澮相比以比於川九川相比以比於海如萬國諸侯小大相比而方伯連率率之以比於天子也萬國猶地也諸侯之得國猶水居地也建之親之比之道也愚案地上有水而象之以建萬國親諸侯而為比政猶杜詩所謂衆流歸海意萬國奉君心之義比之初六有他吉也比之自內不自失也得正則不自失矣集疏程子曰守已中正之道以比上乃不自失也比之匪人不亦傷乎集疏張子曰履非其正比之又非其人故可傷外比於賢以從上也集疏童溪王氏曰已不正未有能從夫正者也以六居四蓋正人也已之既正則所從必正故能外比於賢以從上也釋褐楊氏曰比之道不可執一之人也果可比也雖非正應而當從之人也果不可比也則雖正應而尤在所當舍六四與初非可比者故舍之以比於五為比於賢此君子經權之道也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也由上之德使不偏也集疏丘氏曰舍逆謂舍一隂隂以乘陽為逆也取順謂取下四隂隂以承陽為順也失上一隂故曰失前禽比之無首無所終也以上下之象言之則為無首以終始之象言之則為無終無首則無終矣風行天上小畜君子以懿文德風有氣而無質能畜而不能久故為小畜之象懿文德言未能厚積而逺施也集疏程子曰以巽畜乾能畜而不能固故為小畜之象君子觀小畜之義懿美其文德君子之所藴畜者大則道德小則文藝文德方之道藝為小也馮氏曰文德乾也懿巽也一隂之畜五陽是也復自道其義吉也牽復在中亦不自失也亦者承上爻義集疏泉峰龔氏曰復自道此復字與無往不復不逺復之義同謂復於在下之位而不進也初九以陽剛之才位居最下為隂所畜知幾不進而自復其道焉何咎之有九二牽復亦謂與初九牽連而內復也易及諸經無有以復為上進者此義亦通夫妻反目不能正室也程子曰說輹反目三自為也集疏程子曰隂剝於陽者也今反制陽如婦人為夫寵惑既而反制其夫焉未有夫不失道而妻能制之者故曰夫妻反目不能正室也有孚惕出上合志也集疏郭氏曰上合志者合九五有孚之志惟其上合志是以能畜也有孚攣如不獨富也既雨既處德積載也君子征凶有所疑也集疏釋褐楊氏曰上九之載非尚力也乃尚德也然以隂制陽以婦制夫俱非正也君子以往則不能無凶無他有所疑也易曰隂疑於陽必戰上天下澤履君子以辨上下定民志程傳備矣集疏程子曰天在上澤居下上下之正理也君子觀履之象以辨上下上下之分明而後民志有定民志定而後可以言治古之時公卿大夫而下位各稱其德終身居之得其分也士修其學學至而君求之農工商賈勤其事而所享有限故皆有定志後世自士庶至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖乎利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也馮氏曰天居上澤居下截然各得其分為履之象履者禮也上者安於上下者安於下上下之分辨而民志定禮之用也素履之往獨行願也集疏程子曰初處在下素在下者也若安其卑下之素而往則無咎矣夫人不能安於貧賤之素則其進乃貪躁而動求去其貧賤而已非欲有為若安履其素而往者非苟利也獨行其志願耳若欲貴之心與行道之心交戰於中豈能安履其素也幽人貞吉中不自亂也集疏楊氏曰履道幽人顔子在陋巷不改其樂是也非中不自亂何以與此古之人雖在側微若將終身焉不自亂也眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也訴訴終吉志行也集疏李氏曰畏懼所以行其志也夬履貞厲位正當也傷於所恃元吉在上大有慶也若得元吉則大有福慶矣天地交泰后以財成天地之道輔相天地之宜以左右民財成以制其過輔相以補其不及集疏語録問聖人財成輔相之功當無時而不然何獨於泰卦言之曰天地交泰萬物各遂其理聖人自此方能致其用若天地閉塞萬物不生聖人亦無所施其巧蔡氏曰天地之道謂日月寒暑之往來東西南北之經緯天地之宜謂春生秋殺髙黍下稌財成者因其全體而裁制其節使不過輔相者隨其所宜而贊助其不及如氣化流行籠統相續聖人則為之裁制以分春夏秋冬之節地形廣邈經緯交錯聖人則為之裁制其東西南北之限此裁成天地之道也春生秋殺此時運之自然髙黍下稌此地勢之所宜聖人則輔相之使春而耕秋而斂髙者黍下者稌此輔相天地之宜也泉峰龔氏曰財成以制其過天氣下降象輔相以補其不及地氣上騰象拔茅征吉志在外也集疏泉峰龔氏曰下卦為內上卦為外志在外者謂其志在與三陽上進也包荒得尚于中行以光大也無往不復天地際也集疏司馬氏曰物極則反天地之常也是故治者亂之原也通者塞之端也三居天地之際否泰相反之交可不戒哉翩翩不富皆失實也不戒以孚中心願也隂本居下在上為失實集疏程子曰三隂皆在下之物居上乃失其實其志皆欲下復故不富而相從不待告戒而誠意相合也以祉元吉中以行願也集疏徐氏曰中以行願居中應二行其志願非勉強也城復于隍其命亂也命亂故復否告命所以治之也集疏楊氏曰上六泰之終泰反為否上下分崩離析之時也命亂而不一衆其可用乎天地不交否君子以儉德辟難不可榮以祿收斂其德不形於外以辟小人之難人不得以祿位榮之集疏程子曰天地不交通為否否者小人得志之時君子居顯榮之地禍患必及其身故宜晦處窮約也丘氏曰儉德地卑下象榮祿天髙顯象如坤括囊無咎即儉德辟難也乾遁世無悶即不可榮以祿也拔茅貞吉志在君也小人而變為君子則能以愛君為念而不計其私矣大人否亨不亂羣也言不亂於小人之羣集疏蔡氏曰羣謂衆柔也九五大人不為衆柔所亂也包羞位不當也集疏程子曰隂柔居否不中不正所可羞者處不當位所為不以道也有命無咎志行也集疏鄭氏曰君子不可榮以祿蓋謂不在位者設也四居近君之位濟否之責在焉辟難可乎大人之吉位正當也集疏程子曰有大人之德而得至尊之正位故能休天下之否是以吉也無其位則雖有其道將何所為乎故聖人之位謂之大寶泉峰龔氏曰六二大人否亨以其不亂於小人之羣也九五大人吉以其得位而能休天下之否也若六二小人之吉則以其能包容承順乎君子易之為君子謀也如此否終則傾何可長也集疏程子曰豈有長否之理極則必反理之常也天與火同人君子以類族辨物天在上而火炎上其性同也類族辨物所以審異而致同也集疏語録曰類族如青底做一類白底做一類恁地類了同底自同異底自異就其異處以致其同此其所以為同童溪王氏曰同人之所以為同者非混然無所區别之謂也天下有不同之物吾安得强之使同哉此同人之道所以欲類物之族而後物得所辨也物得所辨以不同同之乃所以同之也東坡水之於地為比大之於天為同人同人與比相近而不同以無所不比為比以有所不同為同斯言得之矣馮氏曰類族如天之兼覆辨物如火之照燭出門同人又誰咎也集疏程子曰出門同人所同者廣無所偏私人之同也有厚薄親疏之異過咎所由生既無偏黨誰其咎之同人于宗吝道也伏戎于莽敵剛也三歲不興安行也言不能行集疏蔡氏曰敵謂五安何也安往不得貧賤之安乘其墉義弗克也其吉則困而反則也乘其墉矣則非其力之不足也持以義之弗克而不攻耳能以義斷困而反於法則故吉也集疏童溪王氏曰四困而反則聖人與之以吉者蓋開小人知反之門也丘氏曰同人之世二五正應當同者也而三四介乎其間三近二而爭者也四逺二而爭者也四之反則知義之不勝而止三之不興則畏勢之不敵而不敢爭此四之吉所以異於三之不興也同人之先以中直也大師相遇言相克也直謂理直同人于郊志未得也集疏蔡氏曰未及乎野未盡乎大同之道故曰志未得也火在天上大有君子以遏惡揚善順天休命火在天上所照者廣為大有之象所有既大無以治之則釁蘖萌於其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣集疏文集曰堯舜之治舉元凱放共兜此所謂遏惡揚善順天休命者也天之為道既福善禍淫又以賞罰之權寄之司牧使之補助其禍福之不及也誠齊楊氏曰天討有罪而吾遏之天命有德而吾揚之吾何與焉故曰順天休命蔡氏曰遏惡揚善離象順天休命乾象馮氏曰謂之大有則善惡無所不有謂之天命則有善無惡以大之明辨其善惡而一遏一揚之則惡者去善者伸所以順天命之休也大有初九無交害也大車以載積中不敗也集疏程子曰壯大之車重積載於其中而不損敗由九二木力之强能勝大有之任也公用亨于天子小人害也集疏程子曰民衆財豐反擅其富强益為不順是小人大有則為害又大有為小人之害泉峰龔氏曰小人擅大有之資不能用亨於天子則其所有適以為害也匪其彭無咎明辨晢也晢明貌集疏蔡氏曰居離明之始故能辨其理之必至愚案晢字以韻協當音至厥孚交如信以發志也一人之信足以發上下之志也威如之吉易而無備也太柔則人將易之而無畏備之心大有上吉自天祐也集疏泉峰龔氏曰大有初九與大有上吉皆以卦名為言者大有之始終也大有之始以無交而致害不得於人者也大有之終以信順而致吉則得助於天矣得助於天人亦不能外之宜其吉無不利也地中有山謙君子以裒多益寡稱物平施以卑藴髙謙之象也裒多益寡所以稱物之宜而平其施損髙增卑以趣於平亦謙之意也集疏語録問謙是損髙就低使教恰好曰大抵人多見得在已者髙在人者卑謙則抑已之髙而卑以下人便是平也馮氏曰山之髙也而在地之中謙下之象山本髙而降之地下地本卑而升之山上裒山之多以益地之寡稱物之多寡而施如權衡然平而後已所以治一世而使之皆謙也此與虧盈益謙之意同蓋夫子之易也謙謙君子卑以自牧也集疏程子曰自牧自處也童溪王氏曰牧養也夫謙卑德初卑位也養德之地未有不基於至卑所養者至卑則愈卑而愈不卑矣鳴謙貞吉中心得也勞謙君子萬民服也集疏誠齊楊氏曰九三一陽主五隂以陽剛之才任天下之重有大勳勞於天下者也萬民服者非服其勞也服其勞而能謙也蔡氏曰萬民衆柔象無不利撝謙不違則也言不為過集疏泉峰龔氏曰六四上而能下柔而得正謙而不違則者也惟其不違則所以無不利利用侵伐征不服也鳴謙志未得也可用行師征邑國也隂柔無位才力不足故其志未得而至於行師然亦適足以治其私邑而已集疏程子曰以謙極而反居髙位未得遂其謙之志童溪王氏曰六二以謙德而居下之正位得其所欲者也故曰鳴謙中心得也上六以謙德而居極位豈得遂欲謙之志哉故曰鳴謙志未得也六二上六其鳴一也其所以鳴則不一也泉峰龔氏曰六二自下而承剛得以遂其執謙之本心故曰中心得上六自上而應剛非執謙者之所安故曰志未得雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮和之至也先王作樂既象其聲又取其義殷盛也集疏程子曰雷者陽氣奮發隂陽相薄而成聲也陽始潛閉地中及其奮發而出地則通逹和豫故為豫也坤順震動和順積中而發於聲樂之象也語録曰象其聲者謂雷取其吉者謂和崇德謂著其德作樂所以發揚其德潘氏曰樂之為用朝覲聘饗祭祀各有所主惟郊祀上帝則大合古今衆樂而奏之大司樂圜丘之奏樂極九變是也故曰殷薦之上帝以配祖考郊祀后稷以配天配以祖也宗祀文王於明堂以配上帝配以考也項氏曰象言作樂者凡豫多不善非君子之所尚惟樂者先王之所以飾喜也以此為豫與天地祖考同其樂則無惡於豫矣說文曰作樂之盛稱殷崇與殷皆盛大意初六鳴豫志窮凶也窮謂滿極不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恆不死中未亡也冥豫在上何可長也澤中有雷隨君子以嚮晦入宴息雷藏澤中隨時休息集疏黃氏宗台曰卦爻取隨時而動大象取隨時而息人當旦晝之時酬酢萬變至於昏晦則入居宴息者一動一靜交相為養若終日役役而不知止息則神疲力竭而無以繼之矣童溪王氏曰時之運於天也有晦則有明君子之隨夫時也有動則有息馮氏曰雷發聲於震之春收聲於兊之秋由震而兊雷藏澤中與時休息為隨時之象日出於東方之震而入於西方之兊由震而兊自明嚮晦出於明者至晦而入勞於作者至宴而息所以隨用也天地之隨為晝夜為寒暑為古今君子之隨為動息為語默為行藏一晝一夜之頃而動息隨之况於消息盈虛之大者乎丘氏曰雷陽聲也發聲於春夏動也收聲於秋冬靜也澤中有雷其秋冬之時乎君子體天行事故動與雷俱出靜與雷俱入如雷出地奮豫以之作樂崇德雷在天上大壯以之非禮勿履天下雷行無妄以之對時育物皆法雷之動也雷在地中復以之閉關息旅澤中有雷隨以之嚮晦宴息皆法雷之靜也官有渝從正吉也出門交有功不失也係小子弗兼與也集疏程子曰人之所隨得正則逺邪從非則失是無兩從之理二苟係初則失五矣弗能兼與也故以戒人從正當專一也係丈夫志舍下也隨有獲其義凶也有孚在道明功也集疏泉峰龔氏曰四之從三為陽隨隂上隨下非所當隨者也事雖有獲義實凶矣若能舍其所獲不為妄隨而孚於道焉則變凶為吉是剛明之功也孚于嘉吉位正中也拘係之上窮也窮極也集疏蔡氏曰上六之窮舍五何往山下有風蠱君子以振民育德山下有風物壞而有事矣而事莫大於二者乃治已治人之道也集疏語録曰振民有風之象育德有山之象釋褐楊氏曰根萬物者莫如風育萬物者莫如山山藴畜而風動蕩也馮氏曰風行山下山之草木為風所落蠱壞之象當蠱壞之時必有所事振恤其民養育已德天下豈有蠱壞而不振起者乎所以飾蠱也秦醫對趙孟曰在易風落山為蠱正合大象之義建安張氏曰君子體巽風之動以振民則天下之蠱治矣體艮山之止以育德則人心之蠱治矣幹父之蠱意承考也集疏鄭氏曰子改父道其事若不順而其意則在於承其父也幹母之蠱得中道也幹父之蠱終無咎也裕父之蠱往未得也幹父用譽承以德也不事王侯志可則也集疏泉峰龔氏曰諸爻皆言蠱而上獨不言蠱處事之外無所幹者也王侯五也上獨髙尚而不事之蓋其處艮山之顛時止則止以髙潔自守之節廉頑立懦振蠱壞之風此其志可則也澤上有地臨君子以教思無窮容保民無疆地臨於澤上臨下也二者皆臨下之事教之無窮者兊也容之無疆者坤也集疏程子曰無窮者澤之不竭也無疆者地之博厚也蔡氏曰澤上之地必臨乎水臨之象也教思無窮澤潤地之象也容保民無疆地容澤之象也咸臨貞吉志行正也咸臨吉無不利未順命也未詳集疏程子曰九二以剛德之長而又得中與五至誠相感非由順上之命也是以吉而無不利五順體而二說體故象特明其非說順也愚案未順命之說以隂未順命故陽咸臨之陽咸臨之則吉無不利矣甘臨位不當也既憂之咎不長也至臨無咎位當也大君之宜行中之謂也集疏徐氏曰六五之行中與師六五以中行泰六五中以行願同義敦臨之吉志在內也集疏語録曰居臨之時二陽上進而隂為之應所謂志在內者非謂正應只是卦內與二陽應也古為徐氏曰臨上六志在內與否初六志在君同否之初六本非應五臨之上六亦非應二此可以志論耳風行地上觀先王以省方觀民設教省方以觀民設教以為觀集疏程子曰風行地上周及萬物為由歷周覽之象故先王體之為省方之禮以觀民俗而設教也省方觀民也設教為民觀也項氏曰風行地上所加者偃所觸者動先王俯視其民而教示之蓋如此若彖所謂大觀在上乃風化之本原非此之謂彖與大象取義不同類如此方與民屬地省之觀之教之屬風丘氏曰坤屬土有土此有人省方觀民乃坤之象巽為風風以動之教以化之設教乃巽之象初六童觀小人道也窺觀女貞亦可醜也在丈夫則為醜也觀我生進退未失道也集疏泉峰龔氏曰三居上下之交未暇觀人惟觀已所行之通塞以為進退三隂柔而不中正疑其失道者然能觀已所行以為進退亦未為失道矣觀國之光尚賔也觀我生觀民也此夫子以義言之明人君觀已所行不但一身之得失又當觀民德之善否以自省察也觀其生志未平也志未平言雖不得位未可忘戒懼也雷電噬嗑先王以明罰敕法雷電當作電雷集疏程子曰雷電相須並見之物亦有嗑象先王觀電雷之象法其明與威以明其刑罰敕其法令也項氏曰石經作電雷噬嗑六十四卦大象無倒置者當從石經蔡氏曰明罰離象敕法震象徐氏曰明罰所以示民而使知所避敕法所以防民而使知所畏未至折獄致刑處故與豐象異罰之當避法之當畏人猶有冒犯而不顧者而後不得已而用刑也愚案雷電皆至而為豐此為電雷無疑矣取其先照而後威故曰明罰敕法取其威照並行故曰折獄致刑然明罰敕法以先王言者取其法令之垂後世折獄致刑以君子言者所以制小人也通論語録曰噬嗑明在上動在下是明得事理先立這法在此未有犯底人留待異時之用故云明罰敕法豐威在上明在下是用這法時須用明見下情曲折方得故云折獄致刑不然威動於上必有過錯之事也屨校滅趾不行也滅趾又有不進於惡之象噬膚滅鼻乘剛也遇毒位不當也集疏程子曰六三以隂居陽處位不當自處不當故所刑者難服而反遇毒也利艱貞吉未光也集疏程子曰在噬嗑四為最善凡言未光其道未光大也戒於利艱貞蓋其所不足者不得中正故也貞厲無咎得當也集疏程子曰貞厲所以能無咎者以所為得其當也所為當者居中用剛而能守正慮危也何校滅耳聰不明也滅耳蓋罪其聽之不聰也若能審聽而早圖之則無此凶矣集疏誠齊楊氏曰初九滅趾故惡不行上九滅耳以聰不明使耳聰而明則聞過而改久矣何至於惡積罪大而受大戮之凶乎山下有火賁君子以明庶政無敢折獄山下有火明不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此集疏語録曰明庶政是就離上說無敢折獄是就艮上說又曰賁內明外止雖然內明是箇止殺底明所以不敢用其明以折獄與山上有火旅君子以明慎用刑而不留獄相似而相反賁內明外止旅外明內止其象不同如此蔡氏曰有山之才而照之以火則光彩外著賁之象也政者治之具所當文飾也折獄貴乎情實則無事於文飾矣舍車而徒義弗乘也君子之取舍決於義而已集疏郭氏曰無所乘而行謂之徒行凡易之義所乘者在下乘之者在上初在下卦之下無所乘也蔡氏曰初在最下亦理無可乘者故曰義弗乘也賁其須與上興也集疏徐氏曰須附頤而生者也賁上四爻外實中虛有頤之象二才柔不能自興隨三而興猶須之附頤而動也故曰與上興也永貞之吉終莫之陵也集疏潘氏曰陵勝也文終不能勝質也泉峰龔氏曰九三以一陽居二隂之間上下交賁之故曰賁如濡如夫一陽而上下交賁之若濡澤然非貞固自守則必至浸淫泛濫而文滅其質矣故惟永貞乃吉蓋永貞則陽之自守者固二柔雖比已而濡如終亦莫能陵之也六四當位疑也匪寇婚媾終無尤也當位疑謂所當之位可疑也終無尤謂若守正而不與亦無他患也集疏程子曰四與初相逺而三介於其間是所當之位為可疑也雖為三寇讎所隔未得親其婚媾然正應終必得合故云終無尢也蔡氏曰當乘剛之位故疑六五之吉有喜也集疏泉峰龔氏曰六五當賁飾極盛之時而能敦本尚儉斂華就實如此故有喜也此孔子所以大林放之問而天下文明之治將復見於此矣白賁無咎上得志也集疏潘氏曰處賁之極文變為素潔白自守其志得矣釋褐楊氏曰上九之白賁聖人取之者以其處賁之極而能白所謂既雕既琢還反於朴之謂也山附於地剝上以厚下安宅集疏語録曰厚下者乃所以安宅如山附於地惟其地厚所以上安其居而不搖人君厚下以得民則位亦安而不搖猶所謂本固邦寧也項氏曰彖以六爻言之隂自下而長以剝乎陽則為小人剝君子之象故曰小人長也象以二體言之山自上以附乎下則為君厚其民之象故曰上以厚下安宅上削而下廣山形之所以安也大抵卦有吉凶善惡而火象無不善者遇卦之凶者必别取其吉以為象焉剝與明夷是也人君無用隂剝陽之理則當自剝以厚下君子無用暗傷明之事則當自晦以涖衆凡此皆凶中取吉也故大象與彖無同義者苟同義焉則無所復用大象矣蔡氏曰卦以下剝上取義則小人剝君子也象以上厚下取義乃人君厚生民也下剝上者成剝之義上厚下者用剝之道也厚下坤象安宅艮象丘氏曰山附於地剝損山之髙以益乎地之厚也地中有山謙屈山之尊以降於地之卑也此二象就山尊地卑取義剝牀以足以滅下也剝牀以辨未有與也言未大盛集疏蔡氏曰與謂與剛也取上爻尚逺是未有剛可與也丘氏曰與應也困四應初言有與井二不應五言無與是也二未有與者言當剝之時在上無應也泉峰龔氏曰六二隂柔中正使上有陽剛之與則已必應之助之而不為剝矣惟其無與所以雜於羣隂之中而為剝若三則有與故雖不如二之中正而反得無咎二之不得如三是固二之不幸亦君子之所惜也本義謂未盛大似非本㫖剝之無咎失上下也上下謂四隂集疏丘氏曰上謂四五下謂初二違去四隂而獨從剛故曰失上下也剝牀以膚切近災也以宫人寵終無尤也集疏泉峰龔氏曰剝至六五隂之盛極矣隂盛則剝陽疑有尤者也今五不剝陽而反率衆隂以從陽亦何尢之有哉君子得輿民所載也小人剝廬終不可用也集疏泉峰龔氏曰民衆隂坤象也愚謂君子得輿言隂不可以無陽衆民不可無君子在上以治之故剝之終言君子得輿乃民之所載也若小人剝廬乃自取凶禍耳雷在地中復先王以至日閉關商旅不行后不省方安靜以養微陽也月令是月齊戒掩身以待隂陽之所定集疏語録曰至日閉關是於已動之後以安靜養之蓋陽氣甚微勞動他不得如人善端初萌須靜以養之方能盛大項氏曰商旅象坤坤為衆也后象震帝出震也當是時也外而行旅之人未可行內而出震之君未可出象雷之在地也彖取陽之復來故可以出入可以朋來可以有攸往主乎動也象取雷在地中故不可以行不可以出戒其動也彖象取義不同如此蔡氏曰雷陽氣也方反乎地中而未能出奮復之象也先王體之以閉關上至后下至商旅莫不皆以安靜為事不逺之復以修身也集疏蔡氏曰克已復禮所以修身也愚謂此顔子之不二過也知其不善則速改以從善也休復之吉以下仁也集疏徐氏曰仁初也一陽初復乃天地生物之心所謂仁也二雖非仁下與初比故曰下仁頻復之厲義無咎也中行獨復以從道也集疏郭氏曰剝六三乃復六四反對其義相類在剝則取其失上下以應乎陽在復則取其獨復以從道寬居胡氏曰修身之道自復也下仁之復從道之復待人而復也愚謂道者理所當然者也行衆隂之中而獨與陽應所從得其道故也敦復無悔中以自考也考成也集疏程子曰五處中而體順能篤其志以中道自成謂成其中順之德也丘氏曰二四待初而復故曰下仁曰從道五不待初而復故曰自考二四其學力之效五其天資之美與迷復之凶反君道也集疏程子曰復則合道既迷於復與道相反也泉峰龔氏曰迷復而謂之反君道者行師大敗十年不克征皆國君之凶也故以反君道言之迷而不復無不凶者非特國君為然也天下雷行物與無妄先王以茂對時育萬物天下雷行震動發生萬物各正其性命是物物而與之以無妄也先王法此以對時育物因其所性而不為私焉集疏項氏曰對時象天育物象震對時育物以天育之也物與無妄者物之生無不得乎天也茂對時者君之政無不對乎天也先王之制對時以育物不以人汨其天非能有所加損也愚謂物與無妄猶所謂萬物各一太極者也無妄之往得志也集疏程子曰誠之於物無不能感動以之修身則身正以之治事則事理以之臨人則人感而化無所往而不得其志也不耕穫未富也富如非富天下之富言非計其利而為之也行人得牛邑人災也可貞無咎固有之也有猶守也無妄之藥不可試也既已無妄而復藥之則反為妄而生疾矣試謂少嘗之也集疏泉峰龔氏曰以無妄而得疾則亦聽其自然不可以藥治之以藥治之則反為妄矣若有故而致疾則不可以不藥也愚謂以無妄而致疾故勿藥而有喜有故而致疾不得名醫以藥之則亦不如勿藥語云病不服藥為得中醫蓋庸醫之誤人也多矣其可試也哉無妄之行窮之災也天在山中大畜君子以多識前言往行以畜其德天在山中不必實有是事但以其象言之耳集疏程子曰畜為止畜又為畜聚取天在山中之象則為藴畜取艮止乾之義則為止畜止而後有積故止為畜義又曰天至大而在山之中所畜至大之象君子觀象以火其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以成其德大畜之義也語録曰大畜多識前言往行以畜其德小畜只做得些文物如威儀文辭之類馮氏曰多識如天之容覆畜德如山之藴畜丘氏曰大畜言畜德小畜言懿文德畜德雖同文德則德之小者也建安張氏曰天在山中非畜其形畜其氣也凡山中有雷雨雲風之氣皆天也山而畜天其所畜也大矣君子體畜之象以多識前言往行所識者多則德之所畜者大泉峰龔氏曰以畜為止者文王周公之易兼取畜止畜聚二義者孔子之易愚謂山而畜天所謂以形而畜氣以小而畜大也多識前言往行所謂以心而畜德以一心貫萬事也有厲利己不犯災也集疏程子曰有危則宜已不可犯災而行不度其勢而進有災必矣輿說輹中無尤也集疏程子曰二雖志於進度其勢之不可則止而不行蓋其處得中道動不失宜故無過尤也利有攸往上合志也集疏程子曰上九陽性上進且畜已極故不下畜三而與三合志也六四元吉有喜也六五之吉有慶也何天之衢道大行也集疏愚謂乾健在下艮止在上故謂之畜畜極則變止不終必止而健者進矣故曰何天之衢亨道大行固是釋亨之義亦言道路之大可坦然而行也山下有雷頤君子以慎言語節飲食二者養德養身之切務集疏程子曰慎言語以養其德節飲食以養其體蔡氏曰慎節主靜艮象言語飲食主動震象語録曰諺云禍從口出病從口入甚好前輩嘗用以解慎言語節飲食馮氏曰言語飲食由頤以出入者也如雷之動而慎其所出如山之止而節其所入所以用順也大象以自養為義爻象兼養人而言養人必先自養也觀我朵頤亦不足貴也集疏泉峰龔氏曰初如靈龜可以自養本有貴於己者若觀我朵頤而求養於人則失其所以為貴矣故曰亦不足貴六二征凶行失類也初上皆非其類也集疏泉峰龔氏曰失類無應也二欲求養於初上而初上皆非其應行而失類其凶宜矣十年勿用道大悖也顛頤之吉上施光也集疏程子曰六四得陽剛之應以濟其事致已居上之德施光明被於天下吉孰大焉居貞之吉順以從上也集疏項氏曰六五之貞非自守也以從上也成王之於周公孝昭之於霍光六五之貞也若逺上而自守則不能以吉矣由頤厲吉大有慶也集疏項氏曰上九之厲吉非能自吉也得六五之委任而吉也上九苟不得君而自用則厲且凶矣又烏能吉而有慶乎愚案項氏五上二爻之說有關於世教看爻辭無此意蓋由夫子發言外意也澤滅木大過君子以獨立不懼遁世無悶澤滅於木大過之象也不懼無悶大過之行也集疏程子曰天下非之而不顧獨立不懼也舉世不見知而不悔遁世無悶也語録曰澤在上木在下澤水髙張浸沒了木是為大過木雖為水浸而未嘗動故君子觀之而獨立不懼遁世無悶也蔡氏曰獨立不懼巽木象遁世無悶兊說象藉用白茅柔在下也老夫女妻過以相與也棟橈之凶不可以有輔也集疏楊氏曰棟居中而衆材輔之者也九三以剛居剛過而不中也剛過而不中則不可以有輔此棟之所以橈也棟隆之吉不橈乎下也枯楊生華何可久也老婦士夫亦可醜也過涉之凶不可咎也水洊至習坎君子以常德行習教事治己治人皆必重習然後熟而安之集疏童溪王氏曰君子德行貴乎有常而教事貴乎習熟此不舍晝夜之功蔡氏曰常德行坎剛中象習教事重坎象習坎入坎失道凶也集疏項氏曰習坎入坎者已在重險之下而又加以不正更入於窞故失道凶也求小得未出中也來之坎坎終無功也樽酒簋二剛柔際也陸氏釋文木無二字今從之集疏潘氏曰剛柔際君臣相接也蔡氏曰剛五也柔四也際交際之謂坎不盈中未大也有中德而未大集疏項氏曰九五已登上坎無重坎矣然水必盈坎而後可出九五猶處於隂中如水方與坎平較之九二稍能自見而已亦未能流而出坎故曰中未大也蔡氏曰不盈故曰未大上六失道凶三嵗也集疏丘氏曰坎以四隂陷二陽四隂為險者也然就四隂而論則初上之為險尤甚故象皆以失道罪之然初之失道自入於坎窞上之失道則為人係縛之以徽纆而置於叢棘則初上之罪又有輕重矣明兩作離大人以繼明照于四方作起也集疏郭氏曰六十四卦惟離象獨稱大人大人者與日月合其明故繼明必稱大人語録曰明兩作猶言水洊至今日明明日又明若說兩明却是兩箇日馮氏曰日一而已旦旦明作於以見重離之象是旦既明翼旦復明明而又明日也一明先之一明後之明以繼明大人也履錯之敬以辟咎也黃離元吉得中道也日昃之離何可久也突如其來如無所容也無所容言焚死棄也六五之吉離王公也集疏程子曰六五之吉者所麗得王公之正位也據在上之勢而明察事理畏懼憂虞以持之所以能吉也不然豈能安乎王用出征以正邦也周易本義集成卷五
