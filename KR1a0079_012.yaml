body:
  text: 周易本義集成卷十二元熊良輔撰雜卦傳乾剛坤柔集疏文集曰剛柔雖各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其為全也其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖二五之爻有不通者愚按朱子文集是破當時有乾剛坤柔便有所偏之説又按立地之道曰柔與剛而曰乾剛坤柔者隂陽以氣言剛柔以質言此所謂乾剛坤柔明卦爻之大用乾坤之性情也比樂師憂臨觀之義或與或求以我臨物曰與物來觀我曰求或二卦互有與求之義集疏語録曰臨觀皆有與求之義臨以二陽言之則可以臨上四隂以全卦言之則六五上六又以上而臨下觀自下而觀上則為觀平聲自上而為物之觀是去聲屯見而不失其居蒙雜而著屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言集疏泉峰龔氏曰屯以初言陽動乎險中故見未得位而利居貞故不失其居蒙以二言處於羣蒙之中故雜為羣蒙之主而能發蒙故著震起也艮止也損益盛衰之始也集疏徐氏曰陽在上之物震動在二隂之下故起艮陽在二隂之上故止損極則益生故為盛之始益極則損生故為衰之始愚按震起即震動也以韻故變言起大畜時也無妄災也止健者時有適然無妄而災自外至集疏項氏曰以乾之剛而受畜於二隂如大畜者可以言時矣當無妄之時而猶有災焉則可以言災矣萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也白受采集疏語録曰謙輕是自謙抑不自尊重又曰輕是自卑小之義説豫之極便放倒了如冥豫是也蔡氏曰澤萃而下木升而上泉峰龔氏曰賁始於無色亦終於無色始於無色本義所謂白受采是也終於無色上九所謂白賁是也白者賁之質也有質而後有文文之極則復歸於質兑見而巽伏也兑隂外見巽隂內伏集疏項氏曰屯見而蒙雜皆指陽而言也兑見巽伏皆指隂而言也坎中隱伏伏於隂中遇陷而不能出也巽之伏伏於陽下順伏之也隨無故也蠱則飾也隨前無故蠱後當飾集疏項氏曰隨以無故而偷安蠱以有故而修飾故聖人不畏多難而畏無難也剝爛也復反也集疏徐氏曰剝爛則陽窮於上復反則陽生於下猶果之爛而墜於下則可種而生也晉晝也明夷誅也誅傷也集疏蔡氏曰晉離在上而明著夷離在下而明傷愚按言晉晝則明夷為晦可知言明夷誅則晉為進用可知互相為例也井通而困相遇也剛柔相遇而剛見掩也集疏項氏曰以通與遇為反對則遇為相抵不通之象自乾坤至此凡三十卦正與上經之數相當而下經亦以咸恆為始以見卦雖以雜名而乾坤咸恆上下經之首未嘗相離也泉峰龔氏曰木入坎下巽而上水故曰通剛柔相遇剛為柔掩故曰遇通相成遇相抵也愚案井居其所而遷故曰通困則適然相值故曰遇咸速也恆久也咸速恆久集疏蔡氏曰有感則應故速不失其常故久渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也止謂不進集疏語録曰渙散意如縱弛之類項氏曰渙節解蹇皆以水言解近於渙緩而縱之也蹇近於節難而止之也張氏曰四陽長而不可過故大壯則止也二隂長而馴至有傷陽之理故君子當退蔡氏曰風散水故離澤防水故止徐氏曰睽者疏而外也家人者親而內也否大往小來泰小往大來故曰反其類愚按大壯正以四陽決二隂如夬之類而曰止何也五君位君位不可過也大壯則止所以為四陽盛長之戒遁則隂盛將至於否而君子所當退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也既明且動其故多矣集疏項氏曰卦名皆在句上旅獨在下者取其韻之叶也以多故對寡親則故非故事矣凡物之豐盛則故舊合羈旅則親戚寡作易者其知之矣二卦皆主離言之雷與電俱至其黨不亦盛乎山上有火其勢不亦孤乎徐氏曰所有者大故衆能與人同故親革弊者必去其故鼎烹者必取其新小事之過是亦過也中既有孚能無信乎離上而坎下也火炎上水潤下小畜寡也履不處也不處行進之義集疏泉峰龔氏曰小畜以一柔畜三剛而無助故曰寡履以一柔躡三剛而上進故曰不處需不進也集疏愚按需不進非終不進也不即進耳有待而行也訟不親也大過顛也徐氏曰本末弱故顛姤遇也柔遇剛也漸女歸待男行也集疏語録曰女待男而行故以為漸釋褐楊氏曰以柔遇剛柔之幸也故為姤愚按困相遇則適然相值姤遇也有遇而配合之意故曰柔與剛遇也頥養正也既濟定也蔡氏曰六位皆當故定歸妹女之終也未濟男之窮也集疏語録曰伊川説未濟男之窮為三陽失位以為斯義也得之成都隱者見張欽夫説伊川之在涪也一日讀易有刳桶人以此問伊川伊川不能答其人云三陽失位故伊川記之不知此語火珠林上已有蓋伊川未嘗看雜書所以被他説動了項氏曰終與窮不同終者事之成女子之義從一而終也窮者時之災事窮勢極君子之不幸也愚按歸妹卦意固為女之終未濟卦意不專指男之窮此謂男之窮者未濟之一義耳夬決也剛決柔也君子道長小人道憂也自姤以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義集疏項氏曰自咸恆至此三十四卦正與下經之數相當蔡氏曰自姤以下有亂簡案雜例皆以反對協韻為序今以其例改正大過顛也頥養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也新安胡氏曰雜卦以乾為首不終之以他卦而終之以夬者蓋夬以五陽決一隂決去一隂則復為乾矣故曰君子道長小人道憂也易為君子謀於此可見愚案夫子贊易止於雜卦終之以夬而謂君子道長小人道憂蓋深為世道慮也世用陽類君子之道則世道陽明世用隂類小人之道亡家敗國其為可憂也大矣聖人作易拳拳於崇陽抑隂所以扶植世道也其旨微矣總論文集曰雜卦反對之義只是反覆則其吉凶禍福動靜剛柔皆相反了合沙鄭氏曰上經起乾坤至坎離三十卦下經起咸恆至既未濟三十四卦此序所述以為二章者也雜卦雖合為一章無上下之分然自乾坤至困亦三十卦自咸恆至夬亦三十四卦由是推之則其雜也豈無説而苟然者哉是必有其説而易師失其傳矣周易本義集成卷十二
