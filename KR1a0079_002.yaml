body:
  text: 周易本義集成卷二元熊良輔撰下經艮下兊上咸亨利貞取女吉咸交感也兊柔在上艮剛在下而交相感應又艮止則感之專兊説則應之至又艮以少男下於兊之少女男先於女得男女之正婚姻之時故其卦為咸其占亨而利貞取女則吉蓋感有必通之理然不以貞則失其亨而所為皆凶矣集疏程子曰咸感也不曰感者咸有皆義男女交相感也物之相感莫如男女而少復甚焉凡居臣上下以至萬物皆有相感之道物之相感則有亨通之理利貞相感之道利於正也不以正則入於邪惡矣愚案咸感也不言感而言咸取其無心而感也猶兊説也不言説而言兊取其不言而説也感有必通之理故亨曰利貞者九四為感之主而不正故戒以利貞而爻亦曰貞則吉取女吉取兊少女在外而應乎艮少男之象姤勿用取女以巽女一隂方壯而不正也漸女歸吉亦以巽女在外而應乎艮家人利女貞以離女巽女二隂爻皆得其正位也初六咸其拇拇足大指也咸以人身取象感於最下咸拇之象也感之尚淺欲進未能故不言吉凶此卦雖主於感然六爻皆宜靜而不宜動也集疏泉峰龔氏曰咸其拇不言吉凶者當咸感之初吉凶未判之時也愚謂艮為指而在一卦之下拇之象也咸其拇動以感也感貴於無心而能應故下三爻艮體宜靜而上三爻兊體亦不宜於動也六二咸其腓凶居吉腓足肚也欲行則先自動躁妄而不能固守者也二當其處又以隂柔不能固守故取其象然有中正之德能居其所故其占動凶而靜吉也集疏愚謂互巽為股而在下體之中故有腓象咸其腓躁動以求感是宜凶矣然居止而下行則可以易凶而為吉夫聖人作易正欲人避凶而趨吉也故既曰咸其腓凶而又曰居吉九三咸其股執其隨往吝股隨足而動不能自專者也執者主當持守之意下二爻皆欲動者三亦不能自守而隨之往則吝矣故其象占如此集疏郭氏曰足之力在腓而行用在拇股無所事皆隨之而已隨下而往能無吝乎語録曰咸是感動之義問內卦艮止也曰艮雖是止然咸有交感之義都是要動所以都説動卦體雖説動然才動便不吉動之所以不吉者以內卦屬艮故也易氏曰三陽居艮止之終不能以靜處之乃隨人以往知隨而不知止所以吝也愚謂巽為股九三適當其處股所以行也而不足以自行隨下而已故象曰亦不處也所執下也九四貞吉悔亡憧憧往來朋從爾思九四居股之上脢之下又當三陽之中心之象咸之主也心之感物當正而固乃得其理今九四乃以陽居隂為失其正而不能固故因占設戒以為能正而固則吉而悔亡若憧憧往來不能正固而纍於私感則但其朋類從之不復能及逺矣集疏程子曰四為感之主貞正則吉而悔亡感不以正則有悔也聖人感天下之心如寒暑雨暘無不通無不應者亦貞而已夫貞一則所感無不通若往來憧憧然用其私心以感物則思之所及者能感而動所不及者不能感也語録曰往來有自然之理惟正靜為主則吉而悔亡至於憧憧往來則私意為主而私意之所及者朋從不及者不從矣或曰一往一來皆感應之常理也加憧憧焉則私矣此以私感彼以私應所謂朋從爾思非有感必通之理也曰然問憧憧往來曰這只是對那日往則月來底説那箇是自然之往來此憧憧者加私意不好底往來憧憧只是一箇忙迫底心不能順自然之理方往時又便要來方來時又便要往只是一箇忙又曰憧憧是一心方欲感他一心又欲他來應如正其誼便欲謀其利明其道便欲計其功這便是憧憧底病徐氏曰往來感應也憧憧往來容心於感應也泉峰龔氏曰四居心位為感之主者也心之感物必得其貞乃吉而悔亡若憧憧於往來之思則非貞矣惟其朋類從之不能逺及其能吉而無悔乎往來感應也下體方往上體又來憧憧之謂也愚謂感必有應諸爻感其偏體之一不能盡感之義故皆不言其應九四感之以心庶乎盡感之義矣而又貴乎無所容心也故雖言其應而未能光大蓋天下有自然之感應感以心為主而無所容心於感焉則光大矣然則偏體之感皆心之所使也故皆稱咸九五咸其脢無悔脢背肉在心上而相背不能感物而無私係九五適當其處故取其象而戒占者以能如是則雖不能感物而亦可以無悔也集疏楊氏曰脢背肉無思無慮故無悔然與所謂寂然不動者異矣趙氏曰咸其脢無悔者則以其應之本於中正而無心於感也咸雖以相應為感要不可以動而有心也脢之在背非有欲者也非動而求感者也所謂艮其背之意也可見其無心之感為至也泉峰龔氏曰脢與心相背體之不動而無所事者也感而不動雖不能亨亦可以無悔愚案孔氏引子夏傳云在背曰脢馬融云脢背也王肅云脢在背而夾脊鄭玄及説文云脢背肉雖諸説不同六體皆在心上感以心為主咸其拇腓股下之應也咸其脢形之應也咸其輔聲之應也一身皆應乎心也上六咸其輔頰舌輔頰舌皆所以言者而在身之上上六以隂居説之終處咸之極感人以言而無其實又兊為口舌故其象如此凶咎可知集疏程子曰上隂柔而説體為説之主又居感之極是欲以口舌動人者此小人之常態也不直云口而云輔頰舌亦猶今人謂口過曰脣吻曰頰舌也輔頰舌皆所以言也語録曰咸上一畫如人口中三畫有腹背之象下二畫有人腳之象泉峰龔氏曰上居兊説之終處咸感之極感於口而多言者也不曰口而曰輔頰舌於以見其多言也愚案兊三索而得女則知上六兊之主也總論易氏曰咸感也感以心為主而偏體皆所感之一初咸其拇二咸其腓三咸其股五咸其脢上咸其輔頰舌皆感其偏體者也惟所感出於心故皆以咸字明之九四在上下之間其位在心故不言咸而言所感之道所感得其道則吉非其道則有朋從爾思之戒所感以心為主也聖人盡咸感之道其有不由於心乎泉峰龔氏曰咸以人身取象與艮卦相類但咸感艮止感者動而止者靜故咸諸爻不如艮吉多而凶少五上二爻本義以感物感人為言以下爻咸其拇腓股及艮卦諸爻例之似未然也愚案咸感也感必有應以造化言之則一隂一陽之相感應以物理言之則澤之氣蒸於山山之泉入於澤則山澤之相感應以人事言之則少男少女之相感應以人身言之則形聲手足之相感應故彖傳言天地感大象言澤山咸序卦言夫婦之道爻辭言拇腓股脢輔而皆應乎心也蓋人之一身心為之主百體莫不從令不待此感而彼應者故取以為言苟血氣壅遏則一身且不能使況於天下之大者乎巽下震上恆亨無咎利貞利有攸往恆常久也為卦震剛在上巽柔在下震雷巽風二物相與巽順震動為巽而動二體六爻隂陽相應四者皆理之常故為恆其占為能久於其道則亨而無咎然又必利於守貞則乃為得所常久之道而利有所往也集疏潘氏曰恆久也不曰久而曰恆惟恆而後久也天下之理未有不正而能恆亦未有不動而能恆者恆非不動之謂動而不離乎正所以為恆故曰利貞利有攸往徐氏曰恆有二義有不易之恆有不已之恆利貞者不易之恆也利有攸往者不已之恆也合而言之乃常道也倚於一偏則非道矣愚案恆久也而非一定之謂一定則不能恆矣利貞者以正靜為恆者也利有攸往者以燮動為恆者也當靜而靜當動而動乃常道也當靜而動當動而靜是所謂知常而不知變者矣初六浚恆貞凶無攸利初與四為正應理之常也然初居下而在初未可以深有所求四震體而陽性上而不下又為二三所隔應初之意異乎常矣初之柔暗不能度勢又以隂居巽下為巽之主其性務入故深以常理求之浚恆之象也占者如此則雖貞亦凶而無所利矣集疏程子曰初與四為正應求望之深是知常而不知變也泥常如此無所往而利矣世之責望故素而致悔咎者皆浚恆者也愚案初以隂柔在下不宜靜而宜動者也顧乃深浚守常雖貞何為若九三上六宜靜而動亦致凶咎凡若此者時位之不同故也九二悔亡以陽居隂本當有悔以其久中故得亡也集疏程子曰居得其正則常道也陽居隂位非常理矣處非其常本當有悔以其得中故得亡之其處得中是能久於中也能久於中則不失正矣中重於正中則正矣正不必中也愚案此爻有占無象蓋九二即象也以陽居隂凡處非其位事不得宜皆是也曰悔亡者僅得中而已九三不恆其德或承之羞貞吝位雖得正然過剛不中志從於上不能久於其所故為不恆其德或承之羞之象或者不知其何人之辭承奉也言人皆得奉而進之不知其所自來也貞吝者正而不恆為可羞吝申戒占者之辭集疏語録曰承如奉承之承如人送羞辱與之也易氏曰二與四上皆不恆其德者也而三為甚陽剛不中居巽之終變態不常之人而已果能恆其德者乎愚謂恆巽下震上益震下巽上恆九三即益之上九也益之上九立心勿恆故有或擊之凶恆之九三其德不恆故或承之羞也九四田無禽以陽居隂久非其位故為此象占者田無所獲而凡事亦不得其所求也集疏程子曰以陽居隂處非其位雖常何益人之所為得其道則久而成功不得其道則雖久何益田無禽徒用力而無功也易氏曰四處非其位為動之主動而無獲故曰田無禽巽六四之田獲三品以其得位此則失位不中宜其無所獲也六五恆其德貞婦人吉夫子凶以柔中而應剛中常久不易正而固矣然乃婦人之道非夫子之宜也故其象占如此集疏程子曰五以隂柔而應陽剛居中而所應又中隂柔之正也故恆久則其德為貞也夫以順從為恆者婦人之道在婦人則為貞故吉若丈夫而以順從於人為常則失其陽剛之正乃凶也語録問婦人從一而終以順為正夫子則制義者也若從婦道則凶曰固是如此然須看得象占分明六五有恆其德貞之象占者視其德而有吉凶耳項氏曰彖以貞為利而爻辭皆不利於貞者彖論卦德爻各言其位卦得其道固當以貞守之爻多不正正者又不得中皆失其道不可貞也童溪王氏曰易於六五設泥常之戒故以婦人夫子兼言之丘氏曰二以陽居隂五以隂居陽皆位不當而得中者也在二則悔亡而五有夫子凶之戒者蓋二以剛中為常五以柔中為常也恆九四之才與二同而位異故四之久不如二之久六五之位與二同而才異故五之柔中又不如二之剛中也泉峰龔氏曰初之浚恆五之恆其德貞皆泥於常者也初泥常而求之於人五泥常而守之於已皆知常而不知變其為凶一也上六振恆凶振者動之速也上六居恆之極處震之終恆極則不常震終則過動又隂柔不能固守居上非其所安故有振恆之象而其占則凶也集疏項氏曰初居巽之下以深入為恆者也上居震之極以振動為恆者也在始而求深居上而好動皆凶之道也李氏曰動靜不失其時然後其常可久此恆卦之大旨上六動極當靜猶且振動不已凶之道也總論丘氏曰恆中道也中則能恆不中則不能恆矣初在下體之下四在上體之下皆不及乎恆者故泥常而不知變是以初浚四田無禽三在下體之上上在上體之上皆已過乎恆者故好變而不知常是以三不恆而上振恆也二五得中似知恆者而五位剛爻柔以柔中為常故不能制義而但為婦人之吉而二位柔爻剛以剛中為常而居位不當故但悔亡而已亦不能盡恆久之道也能盡恆久之道者其惟卦辭乎泉峰龔氏曰二以剛為恆而居位不當近乎不常者五以柔為恆而居位不當近乎泥常者然二以剛中故得亡其悔五以柔中故不免制義之凶也愚案恆六爻之義有宜動而反靜者初六是也有宜靜而反動者九三是也在動靜之間者其九二乎九四則動靜皆未見其可六五則靜為婦人之吉為夫子之凶則隂類宜靜而陽類宜動矣上六則過於求動者由初終而論初為過於求靜上為過於求動以見恆非一定之謂惟其時位而已通論程子曰天地萬物之夲夫婦人倫之始所以上經首乾坤下經首咸繼以恆也又曰咸少男在少女之下以男下女是男女交感之義恆長男在長女之上男尊女卑夫婦居室之常道也劉氏曰男下女成昏之禮女下男正家之道也心既感而位不辨非可久之道以恆次咸義取諸此誠齋楊氏曰上經首乾坤乾坤隂陽之辨下經首咸恆咸恆隂陽之交不辨分不嚴不交情不通丘氏曰咸二少相交夫婦之始恆二長相承夫婦之終也或曰卦以二少二長相重者不有損益乎曰損雖二少而男不下女益雖二長而女不下男於交感恆久之義悖矣此下經所以不首損益而首咸恆也愚案咸卦二體隂陽相等乾下交坤坤上交乾故取交感為義蓋獨陽不生獨隂不成而隂陽合而不相等則造化亦偏而不全故以巽遇艮則隂老陽少而為蠱以兌遇震則陽老隂少而為歸妹惟咸恆二少二長相等故取以為人倫之始而為下經之首又天地水火為上經之用而雷風山澤為下經之用也艮下乾上遁亨小利貞遁退避也為卦二隂寖長陽當退避故為遁六月之卦也陽雖當遁然九五當位而下有六二之應若猶可以有為但二隂寖長於下則其勢不可以不遁故其占為君子能遁則身雖退而道亨小人則利於守正不可以寖長之故而遂侵迫於陽也小謂隂柔小人也此卦之占與否之初二兩爻相類集疏程子曰遁者隂長陽消君子退藏之時也君子退藏以伸其道道不屈則為亨遁所以有亨也語録曰遁字雖是逃隱大抵欲取逺去之義所以六爻在上漸逺者愈善也問小利貞是見其寖長故戒令其貞正且以寬君子之患然亦是他之福曰是如此誠齋楊氏曰遁而亨者進則窮而退則通也雖然君子之通天下之窮也丘氏曰遁亨為君子言也小利貞為小人言也愚謂易為君子謀遁之得名主四陽而言也四陽之當遁以二隂之長也四陽之遁則亨不遁則為否二隂之長宜貞不貞亦不利然為君子者豈坐視小人之進而甘於退避哉亦時而已矣初六遁尾厲勿用有攸往遁而在後尾之象危之道也占者不可以有所往但晦處靜俟可免災耳集疏程子曰見幾而作乃為善遁而在尾危道也語録曰遁尾這時節去不逮了所以危厲不可有所往只得看他如何愚謂遁者皆自內而之外故初六為尾其曰勿用有攸往蓋戒之以知止不可往進而逼於陽也世無君子不能飬小人小人逐盡君子之黨則隨亦取禍故曰厲而又戒以勿用有攸往也諸説皆言初亦遁者不知遁之得名主陽而言初二隂也又何遁之有哉六二執之用黃牛之革莫之勝説以中順自守人莫能解必遁之志也占者固守亦當如是集疏程子曰黃中色牛順物二與五雖在遁之時以中正相應其交自固如執係之以牛革也潘氏曰六二有中順之德應於九五其交固雖居遁時不能自脫去也泉峰龔氏曰五爻皆言遁惟六二不言遁者二居大臣之位上與五應雖當遁時固結而不可遁者也故有執用黃牛之革之象正與革卦初九之義同夲義謂其有必遁之志人莫能解似未然也愚謂當遁之時豈有合外內皆遁之理哉故二不言遁而曰執之用黃牛之革莫之勝説蓋君臣相應固結而不可解此小人得志之時也小人得志之時君子之所宜遁也是則使君子之遁者六二也使六二得以行其志者時使然也彖言小利貞指六二而言蓋戒之之辭而爻不言吉亦抑之之意觀此則聖人之意可見矣九三係遁有疾厲畜臣妾吉下比二隂當遁而有所係之象有疾而危之道也然以畜臣妾則吉蓋君子之於小人惟臣妾則不必其賢而可畜爾故其占如此集疏程子曰遁貴速而逺有所係纍安能速且逺哉故云有疾遁而不速是以危也易氏曰二隂寖長九三比之若為所係而不知遁則有疾厲若能以臣妾畜之使之服屬於我則吉係如係小子之係傳曰男為人臣女為人妾蓋役屬於我也徐氏曰係者我為彼所係隂為主也畜者彼為我所畜陽為主也故以隂係陽則有疾以陽畜隂則為吉也愚謂自古小人得志之時容或有一二君子與之相比者此九三之係而不可遁者也連艮之體係也逼二隂之上有疾厲也處九三之時蓋亦不可以大有為故止曰畜臣妾吉九四好遁君子吉小人否下應初六而乾體剛健有所好而能絶之以遁之象也惟自克之君子能之而小人不能故占者君子則吉而小人否也集疏郭氏曰九四好遁所謂遁世無悶者也小人汲汲於富貴戚戚於貧賤又豈能好遁而安之哉泉峰龔氏曰好遁是誠心欲遁者也惟成德之君子能之故曰君子吉小人亦庸有遁者非迫於不得已則假之以釣名非其誠心豈好遁之謂哉故曰小人否本義謂有好而能絶之以為遁似未然也愚謂隱遁非君子之所專尚而簞瓢有不能改其樂者然與其奔走於形勢之途孰若隱居以求其志哉小人則反是矣九五嘉遁貞吉剛陽中正下應六二亦柔順而中正遁之嘉美者也占者如是而貞則吉矣集疏程子曰九五中正遁之嘉美者也處得中正之道時止時行乃所謂嘉美也語録問九五以陽剛中正漸向遁極故為嘉美未是極處故戒以貞正則吉也曰是如此便是剛當位而應處是去得恰好時節小人亦未嫌自家只是自合去莫見小人不嫌却與相接而不去便是不好所以戒他貞正始得愚謂嘉遁貞吉即彖所謂遁而亨也不失嘉會之義也五當位而應與時偕行內不失己外不忤物能全身逺害以正其志遁之嘉美者也上九肥遁無不利以剛陽居卦外下無係應遁之逺而處之裕者也故其象占如此肥者寬裕自得之意集疏程子曰肥者寬裕之意遁者惟飄然逺逝無所係滯之為善上九體乾剛斷在卦之外又下無所係是遁之逺而無纍可謂寬綽有餘裕也遁者困窮之時也善處則為肥矣其遁如此何所不利愚案有量能度分知止足之道而遁者九四之好遁是也有懷抱道德不用於時而遁者九五之嘉遁是也有清介自守不屑天下之事而獨肥其身者上九之肥遁是也九四九五之遁知時之不可為而為之計故猶有戒辭上九之遁不問時之可否道之通塞惟掉頭不顧山林自養而已故曰無不利而象曰無所疑也總論泉峰龔氏曰遁之為卦內艮外乾內卦艮體故九三有所係而不能遁六二莫之勝説而不可遁初六居尾而不能早遁外卦乾體故九四好遁九五嘉遁上九肥遁愈逺而愈吉蓋健而在外者為遁止而居內者非遁也乾下震上大壯利貞大謂陽也四陽盛長故為大壯二月之卦也陽壯則占者吉亨不假言但利在正固而已集疏程子曰壯而不以貞強暴之為耳非君子之壯也易氏曰卦辭獨繫以利貞二字貞正也易之爻例不當位者為不正今二四五以不當位而皆利初三上以當位而皆不利則諸爻之利何取乎正蓋大壯以陽盛為戒剛過而暴則其正乃所以為不正也丘氏曰遁小利貞小者利於貞也指二隂言大壯利貞大者利於貞也指四陽言小者正則不至於害陽大者正則能有以勝隂皆扶陽抑隂之意也愚案大壯以四陽盛長前臨二隂猶有利貞之戒何哉蓋天下之理不可以隂之寖微而有所忽也雖夬之一隂尚必揚于王庭而後可決則陽之進也其可不以貞乎且四陽逼五亦有君位之嫌故戒之意自見於言外也初九壯于趾征凶有孚趾在下而進動之物也剛陽處下而當壯時壯于進者也故有此象居下而壯于進其凶必矣故其占又如此集疏程子曰初陽剛乾體處下而當壯時壯于進者也夫以剛處壯雖居上猶不可行況在下乎故征則甚凶有孚信也謂往則得凶必也愚案壯于趾與夬初九同皆以陽剛盛壯而在下不可以有進之象蓋無正應故也九二貞吉以陽居隂已不得其正矣然所處得中則猶可因以不失其正故戒占者使因中以求正然後可以得吉也集疏程子曰二雖以陽剛當大壯之時然居柔得中不過於壯乃貞正而吉也易氏曰易之諸爻貴乎得位惟大壯則以陽居隂為吉蓋慮其陽剛之過於壯者也故二與四皆言貞吉然九四貞吉而非中故以悔亡戒之九二中而無悔壯之正者也所以特言貞吉愚案大壯九二曰貞吉恆九二曰悔亡解初六曰無咎皆有占無象何也蓋舉象則占在其中而舉占者亦有不待於舉象也大概此爻平易無險言以設也九三小人用壯君子用罔貞厲羝羊觸藩羸其角過剛不中當壯之時是小人用壯而君子則用罔也罔無也視有如無君子之過於勇者也如此則雖貞亦危矣羝羊剛壯喜觸之物藩籬也羸困也貞厲之占其象如此集疏項氏曰既曰小人用壯又曰君子用罔勸戒備矣又曰貞厲羝羊觸藩羸其角恐人以用剛居剛為得正也大壯之時方以過剛為戒位愈正則愈危矣剛而又剛其剛不能自制必至於觸藩而羸角此其所以危也童溪王氏曰君子進以壯為用也故君子用罔罔無也謂無所用也泉峰龔氏曰大壯本以四陽盛長而得名九三又以陽居陽而過剛壯而又壯者也用壯如此是小人之所為而非君子之道矣故曰君子用罔用罔猶言不用也象釋之曰小人用壯君子罔也語意與遁九四君子好遁小人否也同蓋遁之九四即大壯九三之反對故皆以君子小人並言也愚案九三斥言小人用壯則其凶不言可知又言君子用罔貞厲則君子者不用壯雖能貞而亦厲蓋當大壯之時而過於剛也故又有羝羊觸藩羸其角之象九四貞吉悔亡藩決不羸壯于大輿之輹貞吉悔亡與咸九四同占藩決不羸承上文而言也決開也三前有四猶有藩焉四前二隂則藩決矣壯于大輿之輹亦可進之象也以陽居隂不極此其剛故其象占如集疏釋褐楊氏曰壯惡乎過過則見傷矣以九居四則處壯以柔而無太過之患藩決而無所事乎觸尚何羸之有哉蔡氏曰九四為壯之主以剛決柔壯之正者也位不當故有悔得正而吉其悔可亡藩五也以剛決柔易而無困也輹在車之下所用以行者下乘三剛壯輹之象愚謂九四以剛居柔不極其壯貞固守此所以獲吉惟貞而吉所以悔亡以此而往何所滯礙大輿取任重致逺之象輿者士之所恃以載輹者車之所恃以行亦用拯馬壯之義六五喪羊于易無悔卦體似兊有羊象焉外柔而內剛者也獨六五以柔居中不能抵觸雖失其壯然亦無所悔矣故其象如此而占亦與咸九五同易容易之易言忽然不覺其亡也或作疆埸之埸亦通漢食貨志埸作易集疏語録曰此卦多説羊是兊之屬蔡季通曰這箇是夾注底兊卦兩畫當一畫王氏曰旅上九喪羊于易與此卦爻辭相類愚謂以六居五為失位四陽上進而見決皆喪羊之義也喪羊于易者不敢用其剛壯者也此禍兮福所倚失乃得之幾與故無悔上六羝羊觸藩不能退不能遂無攸利艱則吉壯終動極故觸藩而不能退然其質本柔故又不能遂其進也其象如此其占可知然猶幸其不剛故能艱以處則尚可以得吉也集疏語録曰上六取喻甚巧蓋壯終動極無可去處如羝羊之角挂於藩上不能退遂然艱則吉者畢竟有可進之理耳但必艱則吉項氏曰九三上六皆在本卦之上三為健之窮上為動之窮故皆有觸藩羸角之象易氏曰大壯大過大畜皆陽盛之卦然大畜則陽有所止大過則陽比於弱未若大壯之體乾健震動故爻以陽盛為戒初與三陽居陽位故凶厲二四陽居隂位故貞言五雖陽位而居之以六故無悔上雖居壯之終而才與位皆隂故艱則吉凡六爻之義皆所以戒乎陽剛之過也愚案三前有四故為觸藩四前遇隂故言藩決上六前無滯礙而亦言觸藩者處一卦之窮也不能退者在衆爻之上不能遂者亢而不可前進也然能艱則吉此易之所以備勸戒也坤下離上晉康侯用錫馬蕃庶晝日三接晉進也康侯安國之侯也錫馬蕃庶晝日三接言多受大賜而顯被親禮也蓋其為卦上離下坤有日出地上之象順而麗乎大明之德又其變自觀而來為六四之柔進而上行以至於五占者有是三者則亦當有是寵也集疏程子曰大眀在上而下體順附諸侯承王之象也六五以柔居君位明而順麗為得待下親密之義是以為康侯用錫馬蕃庶晝日三接也項氏曰康侯用錫馬蕃庶侯享王之禮也錫猶錫貢錫納之錫享禮匹馬卓立九馬隨之故曰蕃庶晝日三接王接侯之禮也覲禮延升一也覲畢致享升致命二也享畢王勞之升成拜三也順而麗乎大明此釋康侯用錫馬蕃庶柔進而上行此釋晝日三接也易氏曰下卦坤為衆為馬有錫馬蕃庶之象上卦離為日為晝有晝日三接之象泉峰龔氏曰程子項氏康侯錫馬之説有理有據當從之愚謂晉自觀而來六四之柔上升於五而觀六四之辭曰觀國之光利用賔于王正與錫馬蕃庶晝日三接同義皆以自下升上得接於君而蒙寵賚者也晉進也不謂之進者晉有明盛之義彖象所言明晉之義六爻所言晉進之義也初六晉如摧如貞吉罔孚裕無咎以隂居下應不中正有欲進見摧之象占者如是而能守貞則吉設不為人所信亦當處以寬裕則無咎也集疏程子曰初居晉之下進之始也晉如升進也摧如抑退也於始進而不遂其進惟得正則吉也罔孚上未見信也苟上未見信則當安中自守雍容寬裕無急於求上之信故得無咎苟欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也此君子處進退之道也語録曰晉如摧如象也貞吉占辭罔孚裕無咎又是解上靣兩句恐貞吉説不分明故又曉之毛氏曰摧如在彼而吾不可以不正罔孚在上而吾不可以不裕蔡氏曰晉如摧如進而復退也貞吉進退得正故吉罔孚四也處晉之初四未信也裕則終信故無咎愚謂初六進而見摧能守貞則吉矣罔孚者設或守貞而吉未之應裕無咎但能寬裕以處之則吉雖未之應亦可以得無咎也六二晉如愁如貞吉受兹介福于其王母六二中正上無應援故欲進而愁占者如是而能守貞則吉而受福于王母也王母指六五蓋享先妣之吉占而凡以隂居尊者皆其類也集疏徐氏曰六二欲進而才柔無應故晉如愁如言不能無憂也然上雖無應而同德相感故受兹介福于王母也介大也言受六五之福也愚謂二臣位也當晉之世出任王事而五不應於上安得不憂故曰愁如惟能居中守正則吉受兹介福于其王母則不求應而福自來也上面既言貞吉下面又説箇所以貞吉之應六三衆允悔亡三不中正宜有悔者以其與下二隂皆欲上進是以為衆所信而悔亡也集疏程子曰三在順體之上為順之極三隂皆順上者也是三之順上與衆同志衆所允從其悔所以亡也有順上向明之志而衆允從之何所不利或曰不由中正而與衆同得為善乎曰衆所允者必至當也況順上之大明豈有不善也是以悔亡蓋亡其不中正之失矣古人曰謀從衆則合天心語録曰衆允象也悔亡占也問六三如何見得為衆所信處曰晉之時二隂皆欲上進三處地較近故二隂皆從之以進徐氏曰衆坤象新安胡氏曰三處順之極由初之罔孚二之愁如以至於三則順之極而衆允矣九四晉如鼫鼠貞厲不中不正以竊髙位貪而畏人蓋危道也也故為鼫鼠之象占者如是雖貞亦危集疏程子曰以九居四貪據其位下乘三柔恐其上進貪而畏人者也故有此象李氏曰君子未嘗不欲仕也又惡不由其道若貪位慕祿志於苟得而不知義命之所在其不為鼫鼠者幾希項氏曰晉卦釋文云鼫鼠螻蛄也今俗稱土狗是也許氏説文云五技鼠也能飛不能踰屋能緣不能升木能浮不能渡谷能穴不能掩身能走不能先人今土狗之技盡與此合先儒多以毛詩碩鼠為説誤矣四雖進乎上以其失柔順之道如鼫鼠之技窮而不能遂若固執不悛危必至矣荀子勸學篇鼫鼠本作鼫後誤也泉峰龔氏曰項氏鼫鼠之説有理有據因附於此愚謂貞厲之義程子謂貞固守此則危可知蔡氏謂守此之貞危孰甚焉項氏謂固執不悛危必至矣三説與本義雖貞亦危之説不同而似得爻意又互艮為鼠象六五悔亡失得勿恤往吉無不利以隂居陽宜有悔矣以大明在上而下皆順從故占者得之則其悔亡又一切去其計功謀利之心則往吉而無不利也然亦必有其德乃應其占爾集疏語録曰失得勿恤此説失得都不須問他自是好猶言勝負兵家之常云爾此卦六爻無如此爻吉又曰失得勿恤只是自家自作教是莫管他得失如仁人正其義不謀其利明其道不計其功相似又曰人當看此爻則大勢已好雖有所失得亦不必慮而自無不利也蔡氏曰位不當故悔居中故亡丘氏曰五以柔居尊為離明之主彖所謂柔進而上行者也在下三隂皆欲附倚而九四阻之失得主三隂而言為四所間失也終與已合得也勿恤不必憂也言五但當往而上進三柔終與已合或得或失皆當置之不問則自然吉無不利矣五爻柔疑不進故勉之愚謂世之人以失得纍其心而疑於進者多矣苟有道以自處而不以失得纍其心焉則何往而不利哉上九晉其角維用伐邑厲吉無咎貞吝角剛而居上上九剛進之極有其象矣占者得之而以伐其私邑則雖危而吉且無咎然以極剛治小邑雖得其貞亦可吝矣集疏程子曰上九以剛居卦之極故取角為象以陽居上剛之極也在晉之上進之極也剛極則有強猛之過進極則有躁急之失以剛而極於進失中之甚也無所用而可維獨用於伐邑則雖厲而吉且無咎也語録問上九剛進之極以伐私邑安得吉而無咎曰以其剛故可伐邑若不剛則不能伐邑矣但易中言伐邑皆是用之於小若伐國則其用大矣如髙宗伐鬼方之類維用伐邑則不可用之於大可知又曰伐邑如墮郈墮費之類是也易氏曰晉進之道莫善於柔莫不善於剛上與四言厲以剛故也徐氏曰離為戈兵故有伐象邑坤體在下之象新安胡氏曰晉其角與姤其角同義皆剛上之象也總論泉峰龔氏曰晉卦諸爻皆以進為義初二三五柔之進四與上剛之進也初隂在下上未見信故欲進而摧二以隂居隂上無應援故欲進而愁此隂欲進而未遂者也四剛不中正欲進而不遂故如鼫鼠而厲上陽剛居終進極而上窮故晉其角而厲此陽之上進而不安者也五為大明之主三為衆隂之倡相率而歸於五故五不言晉而三言衆允亦不言晉也又卦四隂二陽隂多吉而陽多厲者晉以柔順為善剛強則躁矣且四隂在下而二陽在上在下者宜進在上者不可再進也故彖傳曰順而麗乎大明柔進而上行卦之得名其亦以隂為主與離下坤上明夷利艱貞夷傷也為卦下離上坤口入地中明而見傷之象故為明夷又其上六為暗之主六五近之故占者利於艱難以守貞而自晦其明也集疏程子曰君子當明夷之時利在艱難而不失其貞昏暗艱難之時不失其貞所以為明君子也愚謂君子之所以為君子以其貞也當明夷之時而不以貞則非所以為君子矣今曰利艱貞兹所謂疾風知徑草者與初九明夷于飛垂其翼君子于行三日不食有攸往主人有言飛而垂翼見傷之象占者行而不食所如不合時義當然不得而避也集疏蔡氏曰飛以象言行往以人事言曰飛曰行曰往皆進之謂曰垂翼曰不食曰有言皆傷之謂也當明夷之初進而有傷也去上獨逺故傷者淺六二明夷夷于左股用拯馬壯吉傷而未切救之速則免矣故其象占如此集疏程子曰足者所以行也股在脛之上於行之用不甚切左又非便用者夷于左股謂傷害其行而不甚切拯用壯健之馬則獲免而吉矣誠齋楊氏曰明夷之時晦者可免於傷六二乃有文明之德此暗主所甚忌也惟去者可免於傷而六二乃居大臣之位此昏世之所不得去也以其位之不得去故有左股之傷股肱左右者大臣之象也以其德之文明故有馬壯之拯此正文王事也見囚傷股也閎夭之徒脫之者馬壯之拯也愚案彖稱文王蒙大難正指六二所謂夷于左股也有文明中正之德馬壯吉也九三明夷于南狩得其大首不可疾貞以剛居剛又在明體之上而屈於至暗之下正與上六暗主為應故有向明除害得其首惡之象然不可以亟也故有不可疾貞之戒成湯起於夏臺文王囚於羑里正合此爻之義而小事亦有然者集疏程子曰九三離之上明之極也上六坤之上暗之極也南在前明方也狩畋而去害之事也南狩謂前進而除害也大首謂暗之魁上六也三與上正相應為至明克至暗之象其湯武之事乎郭氏曰九三以剛明上進之才可以南狩而得志矣不可疾貞者離之性失之過剛暴故戒之如此誠齋楊氏曰九三其武王之事乎恭行天罰是南狩也勝殷殺紂得大首也須假五年不可疾也愚謂離在坤下日入地中故謂之明夷九三居下卦之極在離之上其明有復出之漸焉于南狩復於離方也得其大首得南狩之志也不可疾貞猶在坤下當守正俟時而不可過暴本義謂小事亦有然者凡去昏就明皆若此所謂明夷者不特遭時之昏暗人有蔽於物而汨於情者皆足以傷其明也六四入于左腹獲明夷之心于出門庭此爻之義未詳竊疑左腹者幽隱之處獲明夷之心于出門庭者得意於逺去之義言筮而得此者其自處當如是也蓋離體為至明之德坤體為至暗之地下三爻明在暗外故隨其逺近髙下而處之不同六四以柔正居暗地而尚淺故猶可以得意於逺去五以柔中居暗地而已迫故為內難正志以晦其明之象上則極乎暗矣故為自傷其明以至於暗而又足以傷人之明蓋下五爻皆為君子獨上一爻為暗君也集疏楊氏曰腹坤象也坤體之下故曰左腹地尊右故也入于左腹不用其明也獲明夷之心所謂求仁而得仁于出門庭則與慎密而不出者異矣故自靖人自獻于先王我不顧行遁此微子之明夷也六五箕子之明夷利貞居至暗之地近至暗之君而能正其志箕子之象也貞之至也利貞以戒占者集疏楊氏曰凡卦皆以五為君位而明夷之君貴而無位髙而無民其存者名號而已故以上六當之而父師其次也故以六五當之上下無常剛柔相易不可為典要惟其則而已語録曰彖言利艱貞爻言貞而不言艱者蓋言箕子則艱可見愚案彖言利艱貞爻言箕子之明夷非取君位此正明夷利艱貞之事言其當紂之世能處內難而正其志者也上六不明晦初登于天後入于地以隂居坤之極不明其德以至於晦始則處髙位以傷人之明終必至於自傷而墜厥命故其象如此而占亦在其中矣集疏誠齋楊氏曰紂之嗣立間見甚敏材力過人其初登于天之時乎及其昏棄失德而為獨夫其後入于地之時乎愚案明夷以全體言離明為坤暗所掩以六爻而論則下五爻皆為上六傷其明故五爻皆曰明夷而上六獨稱不明晦言其不明之故也初則傷人之明而登于天終則成已之晦而入于地故曰不明晦明之夷猶可以反之明之晦暗之極不可以拯也總論丘氏曰明夷以二體言則離明為坤暗所傷以六爻言則上六一爻為暗君自五以下皆為所傷所以下五爻皆曰明夷受傷者也上一爻獨不曰明夷傷人之明者也今以商周之事論之上爻極暗為紂之昏棄五近暗為箕子囚奴四與上同體避暗就明為微子遁去三與上應以明克暗為武王之伐紂二在大臣之位藏明於暗為文王之羑里初暗稍逺見傷即避其伯夷太公居海濵之事乎明夷六爻於此可見矣離下巽上家人利女貞家人者一家之人卦之九五六二內外各得其正故為家人利女貞者欲先正乎內也內正則外無不正矣集疏程子曰家人之道利在女貞女貞則家道正矣夫夫婦婦而家道正獨云利女貞者夫正者身正也女正者家正也女正則男正可知矣易氏曰巽以長女居上離以中女居下而二四皆以隂柔得正故卦辭惟利女貞三字而已新安胡氏曰二四皆女之正者然爻惟六二稱貞吉則知六二為尤重愚案家人者治家人之道也傳言欲治其國者先齊其家故齊家自夫婦始舜觀厥刑于二女文主刑于寡妻至于兄弟利女貞者言家道之本也初九間有家悔亡初九以剛陽處有家之始能防間之其悔亡矣戒占者當如是也集疏程子曰初家道之始也有家之始若不間之以法度則人情流放必至於有悔失長幼之序亂男女之别傷恩義害倫理無所不至能以法度間之於始則無是矣故悔可亡易氏曰家人之道羣居類聚能無悔乎所以正家必謹乎始諺云教子嬰孩教婦初來於其始而以禮法防間之是以悔亡六二無攸遂在中饋貞吉六二柔順中正女之正位乎內者也故其象占如此集疏郭氏曰彖傳言夫夫婦婦六二所謂婦婦者也婦人從夫無遂事婦之道也居中主饋婦之職也詩所謂無非無儀惟酒食是議者也易氏曰六二柔順得位與外九五相應女正位乎內者也此爻正所以發明利女貞之義無攸遂者春秋傳曰大夫無遂事有君在上不敢專也況於女子乎中饋者蒸嘗甘旨之奉此外一毫不敢有所專所以貞吉九三家人嗃嗃悔厲吉婦子嘻嘻終吝以剛居剛而不中過乎剛者也故有嗃嗃嚴厲之象如是則雖有悔厲而吉也嘻嘻者嗃嗃之反吝之道也占者各以其德為應故兩言之集疏程子曰九三在內卦之上主治乎內者也以剛居剛而不中雖得正而過乎剛者也治內過剛則傷於嚴急必有悔厲然家道齊肅人心祗畏猶吉也若婦子嘻嘻則終至羞吝矣在卦非有嘻嘻之象蓋反嗃嗃而言謂與其失於放肆寧過於嚴也愚案九三發此二義蓋二者治亂之别治家之道於此分也嚴厲之道悔厲所由生雖非中道而得終吉歡悅之情固人所喜而以恩掩義分日以亂終吝之道也六四富家大吉陽主義隂主利以隂居隂而在上位能富其家者也集疏童溪王氏曰家人六位俱得其人而四以鎮靜無營處近五之位能富其家者也李氏曰乘承應皆剛而在上體資於陽以為富者也徐氏曰六四當位應剛又在二剛之間以柔得剛以虗受實莫此之盛故曰富家大吉九五王假有家勿恤吉假至也如假于太廟之假有家猶言有國也九五剛健中正下應六二之柔順中正王者以是至於其家則勿用憂恤而吉可必矣蓋聘納后妃之吉占而凡有是德者遇之皆吉也集疏語録曰王假有家到這裏方具得許多物事有妻有妾方始成箇家有家之有只如夙夜浚明有家亮采有邦之有有字虛非如奄有四海之有釋褐楊氏曰間有家則間之於其始假有家則假之於其終也丘氏曰假有感格之義故象以相愛言之泉峰龔氏曰假與格同猶奏假無言昭假烈祖之假謂感格也九五以陽剛中正居尊位為有家之主盛德至善所以假乎家人之心者至矣然王者家大人衆子孫臣庶之心難一其有未假者勿用憂恤而自吉也蓋初之間有家是以法度防間之至王假有家則躬行有以感化之矣王假有家與萃渙王假有廟之義同但彼所假者神此所假者人爾本義於假字皆訓至字殊覺無意義愚非敢求異也僭附所擬與讀易者共商之愚謂由初之間二之在中饋三之嗃嗃四之富家至於五而家道成矣故曰王假有家言王者至是亦方始謂之有家也本義至於其家其字合改作有字上九有孚威如終吉上九以剛居上在卦之終故言正家久逺之道占者必有誠信嚴威則終吉也集疏易氏曰初言間有家家道之始也上言有孚威如家道之終也初與三五皆以陽剛為正家之本至上九而後謂之有孚威如且威如何取於有孚哉以正道律其家人而不能反諸身則其勢必有所不行惟反求其在我者無一毫之不實人心敬服不怒而威矣兑下離上睽小事吉睽乖異也為卦上火下澤性相違以異中女少女志不同歸故為睽然卦德言之內説而外明以卦變言之則自離來者柔進居三自中孚來者柔進居五自家人來者兼之以卦體言之則六五得中而下應九二之剛是以其占不可大事而小事尚有吉之道也集疏程子曰睽者乖異離散之時非吉道也以卦才之善雖處睽時而小事吉也丘氏曰小柔也小事吉柔為卦主也凡卦陽為主則可大事睽合兑離成卦而柔進乎五其才不能大有所為故以處小事則猶可以得吉也泉峰龔氏曰彖傳曰柔進而上行得中而應乎剛以卦變言自中孚來四柔進而上居五也愚案睽自家人反而爻多失位是本同而睽也本同而睽其中必合本不同則何睽之有哉初九悔亡喪馬勿逐自復見惡人無咎上無正應有悔也而居睽之時同德相應其悔亡矣故有喪馬勿逐而自復之象然亦必見惡人然後可以避咎如孔子之於陽貨也集疏程子曰惡人與已乖異者見者與相通也當睽之時小人乖異者衆若棄絶之則失含𢎞之義古人所以能化姦凶為善良革仇敵為臣民者由弗絶也語録曰喪馬勿逐自復大率睽之諸爻都如此多説先異而後同泉峰龔氏曰此三句只是疊説言雖有悔而其悔可亡雖喪馬而能勿逐自復雖見惡人而可以無咎皆先睽而後合之意傳言見惡人以避咎也乃夫子推説之意非周公本旨也彖象中此類甚多各以其意觀之可也九二遇主于巷無咎二五隂陽正應居睽之時乖戾不合必委曲相求而得會遇乃為無咎故其象占如此集疏程子曰當睽之時君心未合賢臣在下竭力盡誠委曲以求相遇所謂委曲者以善道宛轉將就使合而已遇非枉道逢迎也巷非邪僻曲徑也故夫子特云遇主于巷未失道也愚謂坎險睽異之時人臣愛君之意不能以直遂要必委曲宛轉而後能有合也故坎之四與五納約不自門而自牖睽之二與五遇主不于正塗而于巷雖非所由之正而亦未為失道者權時之宜也六三見輿曳其牛掣其人天且劓無初有終六三上九正應而三居二陽之間後為二所曳前為四所掣而當睽之時上九猜狠方深故又有髠劓之傷然邪不勝正終必得合故其象占如此集疏程子曰三以正應在上欲與之合而四阻於前二牽於後夫以六居三非正又在二陽之間所以有如是難厄無初有終必與九合也不正而合未有久而不相離者合以正道自無終睽之理語録曰天合作而篆文而作剃鬚也項氏曰輿與牛載人者也以位言之指三也天且劓乘車者也以人言之指六掣曳陷而不能進天劓挫而不得進也愚案六爻皆睽也而三上為尤甚三之疑上者如此而上之疑三者又如此當睽之時處非其位欲無疑得乎然睽有必合之理故三曰無初有終而上曰往遇雨則吉九四睽孤遇元夫交孚厲無咎睽孤謂無應遇元夫謂得初九交孚謂同德相信然當睽時故必危厲乃得無咎占者亦如是也集疏程子曰四當睽離之時孤居二隂之間處不當位可謂危矣以遇元夫而交孚故得無咎也郭氏曰天下之勢合則衆睽則孤凡睽皆然而獨於四上稱睽孤何哉蓋上居睽極四陷坎中非若初之自復二之遇主三之有終也故稱睽孤焉六五悔亡厥宗噬膚往何咎以隂居陽悔也居中得應故能亡之厥宗指九二噬膚言易合六五有柔中之德故其象占如是集疏語録曰宗如同人于宗之宗項氏曰二以五為主而委曲以入之五以二為宗而親之二五以中道相應當睽之時其間也微而易合也泉峰龔氏曰睽與同人所謂宗皆以其應言也然同人于宗則吝而睽厥宗噬膚則無咎者處同人之世則欲其公不可以有私應處睽之世則欲其合不可以無正應時義有不同也睽卦自二至上似噬嗑故有噬膚之象上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉睽孤謂六三為二陽所制而已以剛處明極睽極之地又自猜很而乖離也見豕負塗見其汚也載鬼一車以無為有也張弧欲射之也説弧疑稍釋也匪寇婚媾知其非寇而實親也往遇雨則吉疑盡釋而睽合也上九之與六三先睽後合故其象占如此集疏程子曰上居卦之終睽之極也在離之上明之極也睽極則拂戾難合明極則過察而多疑上九有六三之正應實不孤而其才性如此自睽孤也如人自有親黨而多自猜疑妄生乖離雖處骨肉親黨之間而常孤獨也語録曰載鬼一車等語為他這般事是差異底事所以把世間差異事明之又曰小畜之上九曰既雨既處睽之上九曰往遇雨則吉者畜極而通睽極則和隂陽至是而方暢也項氏曰三上爻辭最為險怪蓋彼此皆不正相疑之深者也三為上所疑者故自見輿之曳共牛之掣其人天且劓上疑三者也故見其為豕負塗為鬼一車然而二爻本是正應暌極則富合疑極則當解故三曰無初有終上曰遇兩則吉曰輿曰牛曰人曰豕曰塗曰鬼曰車皆謂六三也耿氏曰夫物本離而偶合者其終必離本合而偶離者其終必合丘氏曰上本與三應不孤也為九四所間未能遇合故亦曰睽孤上睽而未敢親近乎三如見豕之負塗泥疑其汚我也又如載鬼滿於一車疑其祟我也豕則有之鬼則妄矣始焉致疑則張弧終焉釋疑則説弧非四為寇則上與三久為婚媾矣自此以往上與三合隂陽和暢遇雨則吉向之疑心羣起者至此盡冰釋而亡矣愚謂處睽而無應與有應而未合皆孤之義也故四上皆稱睽孤總論馮氏曰內卦皆睽而有所待外卦皆反而有所應初喪馬勿逐至四遇元夫而初四合矣二委曲求遇至五往何咎而二五合矣三輿曳牛掣至上遇雨而三上合矣天下之理固不能久合亦未有終睽也泉峰龔氏曰睽卦六爻皆有先睽後合之意三上二爻處過中之地睽之甚者也故其合為難初四二爻處各卦之下睽未為甚故其合為易二五居中雖睽而不睽故上之遇三四之遇初皆曰睽孤而二之遇五獨不曰睽此易之所以貴中也又卦內曰遇主遇元夫遇雨三言遇皆陽爻見之以見卦之睽以隂為主而睽之合又以陽為主也艮下坎上蹇利西南不利東北利見大人貞吉蹇難也足不能進行之難也為卦艮下坎上見險而止故為蹇西南平易東北險阻又艮方也方在蹇中不宜走險又卦自小過而來陽進則往居五而得中退則入於艮而不進故其占曰利西南不利東北當蹇之時必見大人然後可以濟難又必守貞然後得吉而卦之九五剛健中正有大人之象自二以上五爻皆得正位則又貞之義也故其占又曰利見大人貞吉蓋見險者貴於能止而又不可終於止處險者利於進而不可失其正也集疏程子曰西南坤方坤地也體順而易東北艮方艮山也體止而險在蹇難之時利於順處平易之地不利止於危險處順易則難可紓止於險則雖益甚矣徐氏曰坎屬北方艮屬東方合艮坎而為蹇處蹇之時當適他方所不利於坎艮東北之險阻而利於西南方之平易也丘氏曰東北艮方蹇之地也在東北則未離乎蹇故不利西南其對方舍東北而往西南則出蹇矣所以利也愚案蹇以見險而能止得名故爻辭除二五相應以濟外餘皆不宜往而宜止然事無終止之理故利西南利見大人以同濟蹇難而諸爻皆無凶咎利可知也已初六往蹇來譽往遇險來得譽集疏程子曰六居蹇之初隂柔無援往進則益入於蹇矣來者對往之辭上進則為往不進則為來止而不進則有見幾知時之美譽也愚案初當蹇難之時而處非其位求以免難恐不可得但能止而不往而反得譽何哉居止之初去險尚逺見險而即止彖傳之所謂知也六二王臣蹇蹇匪躬之故柔順中正正應在上而在險中故蹇而又蹇以求濟之非以其身之故也不言吉凶者占者但當鞠躬盡力而已至於成敗利鈍則非所論也集疏程子曰二中正之德與五相應為所信任故為王臣致力於蹇難之時其艱蹇至甚故為蹇蹇然其蹇蹇非為身之故也志在濟君於蹇中雖使不勝志義可嘉矣易氏曰以六居二人臣之正位也上卦為坎自二至四為互坎蹇蹇之象也九三往蹇來反反就二隂得其所安集疏泉峰龔氏曰九三為艮之主居下卦之上往則入於坎而蹇來則反乎內而得其所安也愚案來反若説是來就二隂來連是連九三來碩是來就五則來譽有所不通蓋九三陽性尚往正接坎險故戒以往則蹇來歸其所則反其道也此艮以一陽為內卦之主正聖人所謂反身修德者處蹇之時得處蹇之道矣六四往蹇來連連於九三合力以濟集疏徐氏曰六四近君往從於五則隂柔不足以濟五之蹇惟下連九三同心合力乃克有濟泉峰龔氏曰六四坎體居上下之交往則益陷於坎而蹇益甚惟來則可以下連乎三而為濟蹇之地也九五大蹇朋來大蹇者非常之蹇也九五居尊而有剛健中正之德必有朋來而助之者占者有是德則有是助矣集疏程子曰五居君位而在坎險之中是天下之大蹇也大蹇之時二以中正相應是明來助之也得朋來而無吉何也曰未足以濟蹇也在大蹇之中非得陽剛之臣相輔之不能以濟也自古聖王濟天下之蹇必有賢聖之臣為之助湯武得伊呂是也中常之君得剛明之臣而能濟大難者則有矣賢明之君苟無其臣則不能濟於難也故凡六居五九居二者則多由助而有功蒙泰之類是也九居五六居二者則其功多不足屯否之類是也語録曰處九五尊位而居蹇中所以為大蹇所謂遺大投艱于朕身人君當此之時須屈羣䇿用羣力乃可濟也或問何故為大蹇曰五是蹇主凡人臣之蹇只是一事至大蹇須人主當之蔡氏曰二五居中得位濟蹇者也故不言往來新安胡氏曰五為濟蹇之主二為濟蹇之臣故五稱大蹇二稱蹇蹇愚案王臣九五之臣也蹇蹇者濟蹇之難非一也匪躬之故為國而不為身也故九五稱朋來即二之王臣也得朋來則可以濟大蹇矣不言王臣而言朋以六二中正相應氣類相感能致匪躬之節協濟而成功者也上六往蹇來碩吉利見大人已在卦極往無所之益以蹇耳來就九五與之濟蹇則有碩大之功大人指九五曉占者宜如是也集疏程子曰蹇之時惟能止為善故諸爻除九五六二外皆以往為失來為得語録曰往來二字惟程傳言上進則為往不進則為來説得極好泉峰龔氏曰卦內言往來者四初居蹇之始往則遇乎坎而蹇來則可以得君子見幾之譽上居坎之終往則無所之而蹇來則可以成碩大之功三居下卦之上往則入於坎而蹇來則反乎艮而即安四居上卦之下往則益陷於坎而蹇來則連乎九三而有濟初上為蹇之始終三四居坎艮之交際坎險在前艮止在後故皆以往為失來為得也若二之王臣蹇蹇五之大蹇朋來則君臣戮力以濟天下之蹇者也又豈可以往來為避就哉此二五所以不言往來也坎下震上解利西南無所往其來復吉有攸往夙吉解難之散也居險能動則出於險之外矣解之象也難之既解利於平易安靜不欲久為煩擾且其卦自升來三往居四入於坤體二居其所而又得中故利於西南平易之地若無所往則宜來復其所而安靜若尚有所往則宜早往早復不可久煩擾也集疏程子曰震動坎險動於險外出乎險也故為患難解散之象無所往謂天下之難已解散無所為也有攸往言尚有當解之事也張氏曰無所往而不復戒妄動也有所往而不速將後時也故無所往則靜吉有所往則速吉蔡氏曰利西南者坎震東北之卦也難解於東北至西南則無不利矣其來復吉謂二也主內象言難既解散宜復於安靜也有攸往夙吉主外象言難有未解者急往而解之不可久擾也泉峰龔氏曰彖傳曰其來復吉乃得中也以卦變言是自小過來三來居二而得中也愚案蹇稱利西南不利東北去蹇難就平易也解稱利西南不言不利東北者難既解散則無所不利也故或往或復而皆言初六無咎難既解矣以柔在下上有此正應何咎之有故其占如集疏郭氏曰處解之初以柔在下得無所往其來復吉之義故無咎也易氏曰難解之世初以隂柔在下無所事也故爻辭不言所事止曰無咎而已愚案初六在坎之下未能出險寧免無咎然以柔居剛以隂應陽况九四為動之主資陽剛之助以解難所以無咎也九二田獲三狐得黃矢貞吉此爻取象之意未詳或曰卦凡四隂除六五君位餘三隂即三狐之象也大抵此爻為卜田之吉占亦為去邪媚而得中直之象能守其貞則無不吉矣集疏程子曰九二以剛中之才上應六五之君用於時者也田者去害之事狐邪媚之獸三狐指卦之三隂時之小人也獲謂除去之如田之獲狐也徐氏曰狐者隱伏之物坎象黃矢中直象貞吉謂得中道而吉也易氏曰二五正應當蹇難未解之時五以柔處君位必資陽剛以濟其難此九二所以有田獲三狐之象愚案先儒有取互離為罔罟田也坎為險為穴為隱伏狐也以巽六四互離為田獲三品及未濟坎體在下為小狐汔濟一説觀之理或然也離為三數所謂狐者蓋指六三之小人也故上六亦欲射而獲之然則一卦之難皆六三所為也六三負且乘致寇至貞吝繫辭備矣貞吝言雖以正得之亦可羞也惟避而去之為可免爾集疏程子曰六三隂柔居下之上處非其位猶小人宜在下以負荷而且乘車非其據也必致寇奪之至雖使所為得正亦可鄙吝也語録曰六居三大率少有好底負且乘聖人這裏又見得有這箇小人乘君子之器之象故於此發出這道理來新安胡氏曰坎為輿為盜六三坎體自三至五又有互體之坎故有負乘致寇之象泉峰龔氏曰負者小人之事謂六也乘者君子之器謂三也以六居三隂居陽位在下之上是小人而乘君子之器處非所宜致寇之至不亦宜乎愚案負且乘如在車之上而負物也故人知其非已有而思奪之六為小人其事則宜負三為君子之位於器為乘宜負而乘安得不見侵乎故二以為狐而獲之五以為小人而解之上以為隼而射之其能免於患害乎九四解而拇朋至斯孚拇指初初與四皆不得其位而相應應之不以正者也然四陽初隂其類不同若能解而去之則君子之朋至而相信矣集疏語録曰能解其拇者以四雖隂位而才則陽與初六隂柔則為有間所以能解其拇則陽之朋類至而相信矣徐氏曰解之時陽能解隂剛能解柔九四解初六在下之隂解而拇也愚案四當近臣之位下與初六小人為應則君子之朋與我同類者不信而去矣故必解其不正之應則朋類自至而相孚朋謂九二六五君子維有解吉有孚于小人卦凡四隂而六五當君位與三隂同類者必解而去之則吉也孚驗也君子有解以小人之退為驗也集疏程子曰五為解之主人君之解也君子之所親比者必君子也所解去者必小人也驗之於小人小人之黨既去則是君子能有解也丘氏曰險難小人之所為也小人情狀最為不一狐言其蠱惑隼言其􅋧害拇言其附麗負乘言其僭竊已極其形容矣至此復明以小人斥之所以正其罪而去之也愚案君子指二四陽爻小人則專指六三之隂爻也五為解之主用君子以解小人者也上六公用射隼于髙墉之上獲之無不利繫辭備矣集疏誠齋楊氏曰隼六三也射而獲之者上六也公大臣之稱即上六也六三悖亂遇上六射而獲之則天下之悖亂渙然解散矣此解之終也童溪王氏曰解至上六解之功已成矣上以震動之極在諸爻之上於位則正於勢則便於器則利於時則宜以正而去不正蓋無難者故曰獲之無不利三居下之上內外之限也故有高墉之象同人九四乘其墉亦指三而言也總論徐氏曰下三爻不言解上三爻言解所謂動而免乎險也泉峰龔氏曰解者難之散也卦內曰狐曰寇曰拇曰隼曰小人皆指隂而言所以為難者也初以隂柔在下當解難之初安靜無為故得無咎二陽剛得中上與五應任解難之責者也故田獲三狐三柔不中正居下之上處非所宜而致難者也故致寇至四陽剛為震之主下應初隂能解而去之者也故曰解而拇五柔居尊位為解之主能解小人而吉者也故曰有孚于小人上居解之終處王公之位能解天下之難者也故曰射隼元不利夫合震坎而為解其所以為難者坎也隂也所以解難者震也陽也二四以陽解乎隂五上以震解乎坎故上卦言解而下卦不言解也兊下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享損減省也為卦損下卦上畫之陽益上卦上畫之隂損兊澤之深益艮山之髙損下益上損內益外剝民奉君之象所以為損也損所當損而有孚信則其占當有此下四者之應矣曷之用二簋可用享言當損時則至薄無害集疏朱氏曰六爻皆相應有孚也蔡氏曰內本乾外本坤乾上爻與坤上爻往來本剛得柔為損本柔得剛為益凡卦以內為貞主貞而言故為損徐氏曰孚信實也可貞者可以貞固守此也其道可行故利往損而有孚則元吉無咎可貞而利有所往也蓋損者拂人情之事易至凶咎故特詳之曷之用問辭二簋享答辭下之奉上槩謂之享燕禮之重亦謂之享古者享禮以四簋為中陳饋八簋為盛當損之時二簋雖薄而亦可用享也初九已事遄往無咎酌損之初九當損下益上之時上應六四之隂輟所為之事而速往以益之無咎之道也故其象占如此然居下而益上亦當斟酌其淺深也集疏程子曰損之義損剛益柔損下益上也初以陽剛應於四四以隂柔居上位賴初之益者也初當酌度其宜而損已以益之過與不及皆不可也徐氏曰損者人情之所難而初又最下不可過損損下太過則其本傷矣必斟酌其義之淺深而不失損已益人之道可也耿氏曰損上益下過益無傷損下益上過則有害故初九有酌損之戒泉峰龔氏曰己事者輟己所為之事所謂損也遄往者速往以益之也當損下益上之時初居最下故其象如此愚謂初以陽剛之才務於速進故戒以已事以剛居最下故戒以酌損已事遄往者事未已往不可先事既已往不可後反是則有咎矣此酌損之道與九二利貞征凶弗損益之九二剛中志在自守不肯妄進故占者利貞而征則凶也弗損益之言不變其所守乃所以益上也集疏程子曰不自損其剛貞則能益其上乃益之也若失其剛貞而用柔説適足以損之而已世之愚者雖無邪心惟知竭力順上為忠者蓋不知弗損益之之義也遊氏曰兊之情説而陽性動故有利貞征凶之戒愚案弗損益之弗損為句益之為句六三三人行則損一人一人行則得其友下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也兩相與則專叄則雜而亂卦有此象故戒占者當致一也集疏蔡氏曰萬化不窮惟二而己三則為贅所當損也丘氏曰此爻乃損之所以為損也下體之乾三陽並進三人行也九三一爻損而上之三人則損一人也九三上而為上則上六下而為三剛柔偶合一人行則得其友也愚案損自泰來者也三人行損一人乾三陽損一以為上九所存者兩而已坤三隂移上六以為六三所存者亦兩而已一人行則得其友者上九得六三為應也初二兩陽並進四五兩隂並進四應初五應二皆兩兩之義也朱子曰兩相與則專三人而損一人焉兩也一人行而得友亦兩相與也六四損其疾使遄有喜無咎以初九之陽剛益已而損其隂柔之疾唯速則善戒占者如是則無咎也集疏程子曰疾謂疾病不善也損於不善惟遄速則有喜而無咎人之損過惟患不速速則不至於深過為可喜也楊氏曰六四承乘皆隂偏於隂者也隂陽失其平則為疾四當損時所謂損其疾者也愚案六四以柔居柔又乘承皆柔其性偏而有疾之象也是以在於損其疾剛戒於鋭必已事而遄往柔成於緩必遄則有喜故初四皆曰遄也六五或益之十朋之龜弗克違元吉柔順虛中以居尊位當損之時受天下之益者也兩龜為朋十朋之龜大寶也或以此益之而不能辭其吉可知占者有是德則獲其應也集疏語録曰易象自是一法如離為龜則損益卦皆説龜此類甚多又曰損益二卦説龜一在二一在五是顛倒説既未濟説鬼方亦然潘氏曰或益之謂莫知其所自來疑自天而降故曰自上祐也蔡氏曰元龜直二十大貝雙貝曰朋十朋元龜有國之大實言益之大也徐氏曰班固食貨志元龜長尺二寸直二千一百六十為大貝十朋注云兩貝為朋朋直二百一十六元龜十朋故直二千一百六十也丘氏曰卦似離者皆有龜象頤與損益皆外實中虛所以取象龜也泉峰龔氏曰本義謂兩龜為朋龜字疑當作貝愚案六五以柔居尊虛中以受九二之陽剛益者也九二以陽剛益之則天下之善皆願益之矣然損之得名以下益上以陽益隂以九三為上九上九所以益隂者也六五曰或益之正受上九之益者也此象所以曰自上祐也上非應與故曰或上九弗損益之無咎貞吉利有攸往得臣無家上九當損下益上之時居卦之上受益之極而欲自損以益人也然居上而益下有所謂惠而不費者不待損已然後可以益人也能如是則無咎然亦必以貞則吉而利有所往惠而不費其惠廣矣故又曰得臣無家集疏程子曰得臣謂得人心歸服無家謂無有逺近內外之限也潘氏曰損下益上曰損損終則變不復損下以益上乃自上而益下也是以天下歸之得臣無家語録曰得臣無家猶化家為國相似得臣有家其所得也小矣無家則可見其大新安胡氏曰上與三為正應故三曰得友上曰得臣總論語録曰大抵損益二卦諸爻皆互換損好益却不好如損六五却勝六二損上九好益上九却不好蔡氏曰爻辭初曰酌損二上皆曰弗損四但損其疾而已五則無損而大有益惟三當可損之時爾損爻辭兼言益益爻辭不言損意亦可見泉峰龔氏曰損爻辭兼言益益爻辭不言損者益固所以為益損所當損亦所以為益也初損已以益人二上則不待損已而可以益人三因損得益四因損為益五不特無損而反受天下之益益已固所以為益損己以益人非益乎聖人公天下以為益吾於損見之若私己以為益則反為損矣此益上九求益不已所以有莫益或擊之凶震下巽上益利有攸往利涉大川益增益也為卦損上卦初畫之陽益下卦初畫之隂自上卦而下於下卦之下故為益卦之九五六二皆得中正下震上巽皆木之象故其占利有所往而利涉大川也集疏程子曰盛衰損益如循環損極必益理之自然益所以繼損也為卦巽上震下風烈則雷迅雷擊則風怒兩相助益所以為益此以象言也巽震二卦皆由下變而成陽變為隂者損也隂變為陽者益也益上卦損而下卦益損上益下所以為益此以義言也蔡氏曰內卦本坤外卦本乾乾之下爻與坤之下爻往來剛來居內故曰益愚案損益自泰否而來故往往相反凡卦以內為主故三損而為上則為損四損而為初則為益也皆主陽而言陸宣公曰損上益下曰益損下益上曰損上約己而裕於人人必悅而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎初九利用為大作元吉無咎初雖居下然當益下之時受上之益者也不可徒然無所報效故利用為大作必元吉然後得無咎集疏程子曰初九震動之主陽剛之盛也居益之時其才足以益物而有六四大臣之應居下而得上之應以行其志小善不足以稱也故利用為大作謂作大益天下之事也必須元吉乃得無咎語録曰吉是事無咎是理蓋有事雖吉而理則過而差者是則謂之吉而有咎泉峰龔氏曰本義受益報效之説似若可疑當以程説為正愚案益之成卦者初九也震陽性動當益之時為益之主能大有為者也故利用為大作其位下故元吉然後無咎六二或益之十朋之龜弗克違永貞吉王用享于帝吉六二當益下之時虛中處下故其象占與損六五同然爻位皆隂故以永貞為戒以其居下而受上之益故又為卜郊之吉占集疏程子曰損六五以柔居剛故元吉益六二以柔居柔疑從益之未固故戒能常永貞固則吉也郭氏曰損益相須以上卦反對言之則損之上益之初損之五益之二也故損上益初其辭相屬損五益二又大同矣損之六五曰元吉自然之言也此曰永貞吉久而有守斯為吉也也愚案程郭諸家皆以或益之為句謂或益之人益之十朋之龜弗克違鬼神益之也王用享于帝天益之也即天且弗違況於鬼神乎之意初見似亦可通然合損六五而玩之似無天且弗違意當從本義六三益之用凶事無咎有孚中行告公用圭六三隂柔不中不正不當得益者也然當益下之時居下之上故有益後之以凶事者蓋警戒震動乃所以益之也占者如此然可以無咎又戒以有孚中行而告公用圭也用圭所以通信集疏語録曰益之用凶事猶言用降我凶德嘉績于朕邦蔡氏曰凶事困心橫慮之事六三與上為應故有凶事之象中行在一卦之中故三四皆曰中行泉峰龔氏曰益之用凶事須合本義與蔡氏之説觀之其義始備愚案益則吉矣而又用凶事者非常之變也本然常事則非益矣故大享帝者禮之盛凶事者事之變遷國則又興利之大而大作者非常之事也此數者皆非其常所以為益六四中行告公從利用為依遷國三四皆不得中故皆以中行為戒此言以益下為心而合於中行則告公而見從矣傳曰周之東遷晉鄭焉依蓋古者遷國以益下必有所依然後能立此爻又為遷國之吉占也集疏郭氏曰六四居巽之下不能自動以益人故欲有行告公而己欲遷國也依人而已不能自用也告公者以益天下之志告之也蔡氏曰依謂依五也泉峰龔氏曰利用為大作不言所利者也利用為依遷國言所利者也六四以巽順之才非初九陽剛之比故所利不如初之大也愚謂中行告公從承上文而為言也六三居三隂之中故曰中行猶復之六四曰中行獨復六三曰中行告公用圭至六四則曰中行告公從矣利用相依以遷國也四與初應遷則九四下為初九也即損之一人行則得其友也坤民衆象震長子主器利建侯遷國象九五有孚惠心勿問元吉有孚惠我德上有信以惠於下則下亦有信以惠於上矣不問而元吉可知集疏程子曰君至誠而益於天下天下受其大福其元吉不假言矣君至誠以益天下天下之人皆至誠而愛載以德惠其君也蔡氏曰惠順也我以有孚也下而順下之心所謂皇建其有極用敷錫厥庶民者亦以有孚而順我之德所謂錫汝保極者也泉峰龔氏曰有孚惠心者上益下也有孚惠我德下益上也惟上有以益下則下有以益上矣愚案為益之大莫大於相信為惠之大莫大於順民心因民之所利而利之惠而不費惠心者也勿問而知其為元吉我既以信惠被於物物亦以信惠歸於我也上九莫益之或擊之立心勿恆凶以陽居益之極求益不已故莫益而或擊之立心勿恆戒之也集疏語録曰或者衆無定主之辭立心勿恆勿字只是不字非禁止之辭也童溪王氏曰益極必損處益之極又以剛亢在上求益不己此豈處上之道哉故莫有益之者謂其求益而不己知益已而不知益人而人莫益之也六二虛中無我自損以逮下故益之者衆而曰或益之上九剛亢居上既莫益之而傷之者亦衆矣故曰或擊之人之立心其可以求益為常乎新安胡氏曰恆九三亦巽體亦有不恆其德之戒説卦謂巽為不果為進退為躁卦其立心不恆之意與愚謂居上而立心不恆故求益不已求益不已則人不益之而擊之者至矣理之必然也人其可以立心勿恆乎凶可知矣總論泉峰龔氏曰益卦雖以損上益下為義六爻則以益人益已為言初九利用為大作六四利用為依遷國以益於人者言也而所益有大小之殊六二益之十朋之龜六三益之用凶事以益於已者言也而所益有吉凶之異九五有孚惠心有孚惠我德則人已皆益上九莫益或擊則人已皆無益矣惟無以益於人故無以益於已此卦義之必主於益下爻辭必先於益人也愚案損益二卦皆以損陽益隂為義損自泰來者也損九三之陽以益於上故下乾變而成兊上坤變而成艮謂之損者以其損下而益上也益自否來者也損四之陽以益於初故上乾變而成巽下坤變而成震謂之益者以其損上而益下也莫吉於泰而益上則損莫凶於否而損上則益則是上可損而不可益下可益而不可損明矣凡卦以內為主而以陽為主故泰之九三變而之上則為損否之初六得陽之來則為益泰之變而為損泰之反而為否否之變而為益否之反而為泰天下之理未有泰而不否否而不泰亦未有損而不益益而不損者故泰居上經十一卦而損居下經十一卦泰否損益為上下經之對後天序易其微意蓋可識矣乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬決也陽決隂也三月之卦也以五陽去一隂決之而己然其決之也必正名其罪而盡誠以呼號其衆相與合力然亦尚有危厲不可安肆又當先治其私而不可專尚威武則利有所往也皆戒之之辭集疏孔氏曰剛德不長則柔邪不消故陽爻利有所往夬道乃成胡氏曰以天道言之則夏之三月五陽盛長以消一隂之時以人事言之羣賢並進以決去小人之象程子曰謀亂必先修已告自邑先自治也語録曰上卦兊體兊為口故多言號耿氏曰植德莫如滋除惡莫如盡故一柔己窮而猶決五剛已盛而猶利往也泉峰龔氏曰夬以一隂乘乎五陽之上是小人位乎君子之上也揚于王庭所謂聲言其罪愚案上六以一隂過乎君位揚于王庭謂必有君命而後可也自昔君子恃其公論之勝鋭於誅斥而不量其君之不足以有為未有不召禍者不知夬之義也初九壯于前趾往不勝為咎前猶進也當決之時居下任壯不勝宜矣故其象占如此集疏程子曰九居初而壯于進躁於動者也故有不勝之戒隂雖將盡而已之躁動自宜有不勝之咎不計彼也郭氏曰四剛過中已為大壯況夬五剛乎故大壯初九曰壯于趾此曰壯于前趾則又欲速其進矣往必不勝其咎宜矣潘氏曰趾在下而先動者也初九在四陽之下首以剛進壯于前趾隂居髙位而初欲決之猶布衣論權臣不量力之甚往必不勝徒取咎耳李氏曰初九雖有剛健之才而位在下君子於此亦靜以待之而已愚案經稱往不勝為咎象云不勝而往咎翻其文者蓋不量力而用壯必無勝理王輔嗣曰不勝之理在往前也九二惕號莫夜有戎勿恤九二當決之時剛而居柔又得中道故能憂惕號呼以自戒備而莫夜有戎亦可無患也集疏程子曰夬者陽決隂君子決小人之時不可忘戒備也陽長將極之時而處中居柔不過於剛能知戒備處夬之至善也莫夜有兵戎可懼之甚然勿恤者以自處之善也愚案二處九之時以陽居隂能以怯飬勇足以惕號莫夜有戎而可以勿恤者知懼之早彼不能為吾之害也知勇知怯道之所謂中九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎頄顴也九三當決之時以剛而過乎中是欲決小人而剛壯見於面目也如是則有凶道矣然在衆陽之中獨與上六為應若能果決其決不係私愛則雖合於上六如獨行遇雨至於若濡而為君子所愠然終必能決去小人而無所咎也溫嶠之於王敦其事類此集疏語録曰九三與復卦六四皆有獨字蓋諸爻皆欲去隂獨此一爻與上六為應又問壯于頄曰君子之去小人不必悻悻然見於面目至於遇雨而為所濡濕雖為衆陽所愠然志在決隂必能終去小人故亦可得無咎也蓋九三雖與上六為應而實以剛居剛有能決之象故壯于頄則有凶而和柔以去之乃無咎易氏曰夬與大壯下三爻相類故初與三皆言壯壯于頄者剛之見於顔面者也力未能勝而機已先露其視大壯尤為有凶以九居三正君子夬夬之象與上六一隂為應如獨行而遇雨能無濡乎既為小人所濡宜為君子所愠然終能決去小人而無咎此平勃所以定諸吕之變仁傑所以去二張之亂也愚案君子夬夬者當羣陽共決一隂之時也獨行遇雨以獨與上六為應也隂陽和而為雨若濡有愠無咎則非終與之和矣此爻迹雖與小人和而終不與之同也九四臀無膚其行次且牽羊悔亡聞言不信以陽居隂不中不正居則不安行則不進若不與衆陽競進而安出其後則可以亡其悔然當決之時志在上進必不能也占者聞言而信則轉凶而吉矣牽羊者當其前則不進縱之使前而隨其後則可以行矣集疏張子曰牽羊者必讓而先之則為力也易溺於所趨必不能用故曰聞言不信蔡氏曰臀無膚後傷乎三也其行次且前犯乎五也次且不進貌羊兊象五也聞言不信居位不當雖聞牽羊之義亦不信也愚謂陽喜進而隂喜退九四以陽居隂不得其位欲止則決其剛壯勢不能安欲進則牽於隂柔而剛決不足是以有臀無膚其行次且之象必如牽羊之義待衆陽先進而已隨之則其悔可亡而所聞之言亦不必信也九五莧陸夬夬中行無咎莧陸今馬齒莧感隂氣之多者九五當決之時為決之主而切近上六之隂如莧陸然若決而決之而又不為過暴合於中行則無咎矣戒占者當如是也集疏語録曰莧陸是兩物莧者馬齒莧陸者商陸皆感隂氣多之物也藥中用商陸其子紅泉峰龔氏曰莧陸隂之易決者也指上六而言九五以陽剛居尊位而決上六衰微將盡之隂為力易矣故以中行為戒言不過用剛暴也愚案復之四益之四非中也而曰中行以及乎中為善也夬之五曰中行無咎以中為不足也又案子夏傳云莧陸木根草莖宋衷云莧莧菜陸商陸董遇云莧赤莧陸商陸耿氏云莧柔脆之物陸高平之地馬融鄭玄王肅皆云莧陸一名商陸以是考之則是一物正合子夏木根草莖之説要皆柔脆易去之物近有音莧為完者失之太鑿上六無號終有凶隂柔小人居窮極之時黨類已盡無所號呼終必有凶也占者有君子之德則其敵當之不然反是集疏愚謂夬以五陽而決一隂五君子而決一小人非難事也然上六連四五為兊説所謂包陽之隂挾君子之小人所以難決之耳然至於無所號呼則終必為人所決故曰終有凶而象以為終不可長理勢然也總論語録問以五陽決一隂君子盛而小人衰卦爻之辭猶如此嚴謹小豈去小人之道惟戒懼而不可安肆邪曰觀上一爻則人之勢窮而君子去之之道猶如此嚴謹蓋不可以其勢衰而安意自肆也其為戒深矣徐氏曰以五剛而夬一柔其勢若甚易而聖人不敢以易而忽之故丁寧深切周防豫備無所不至後世衆賢在位其始未嘗不欲去小人大抵不知決之之義而機失事敗禍亂相尋可不戒哉丘氏曰夬雖以五陽決一隂惟比與應當之逺者不能相及也五比上故曰莧陸夬夬三應上故曰君子夬夬四介二五之間故有臀無膚其行次且之象二去上逺則但惕號以為莫夜有戎之備而已初又愈逺故有壯趾不勝之戒泉峰龔氏曰夬卦似大壯故諸爻多與大壯相似初之壯于趾三之壯于頄之類是也夬以五陽決一隂其壯甚矣聖人慮其夬決之過故於陽爻皆致戒焉初壯趾則為咎二惕號則勿恤三壯頄則有凶四牽羊則悔亡五中行則無咎皆所以戒其過而陽居陽者為尤甚焉陽之決隂君子之去小人亦貴乎中而己矣愚案夬以五陽而決一隂自非難事而聖人拳拳於戒謹者蓋決衆小人易決一小人難衆皆去而一獨留是必君側之小人平時固結而不可解者可不謹哉揚于王庭欲使人主知其為小人也孚號有厲欲使舉朝知其為小人也告自邑又使國人知其為小人也而逐爻又各致謹焉亦以小人隂慝之不可以輕視而不知所以防之是則夬之義也巽下乾上姤女壯勿用取女姤遇也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為姤遇已非正又一隂而遇五陽則女德不正而壯之甚也取以自配必害乎陽故其象占如此集疏程子曰一隂始生自是而長漸以盛矣是女之將壯長也隂長則陽消女壯則男弱故戒勿用取如是之女程語録不是説漸長為女壯乃是一隂遇五陽大率一箇女遇五陽是箇不正當底如人盡夫也之事又白上五爻皆陽下面只一隂五陽便立不住了愚案姤以一隂而承五陽故曰女壯勿用取女戒占者宜如是也然女得此占則將何如初六曰繫于金柅貞吉有攸往見凶如是則自守貞靜猶可致吉若冒有所往則見凶矣然舍正應而遇乎二將必為人所棄欲人之必取得乎又案姤以天道言之正為五月隂長之卦而卦爻辭以女壯為言易之書為人事設也言人事而天道在其中矣初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅所以止車以金為之其剛可知一隂始生靜貞則吉往進則凶故以二義戒小人使不害於君子則有吉而無凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云集疏項氏曰羸豕之羸猶羸角之羸也羸則牽繫之義如羸其瓶亦然蔡氏曰金剛也柅所以止車者謂二也牽於二故曰繫柔方進而前為剛所止徐氏曰豕隂躁之物羸豕初象蹢躅跳躑也泉峰龔氏曰羸即上文所謂繫也豕方羸繫未能蹢躅而其性信在於蹢躅也又烏可以不防哉愚案初六以隂方長故爻皆戒辭以女子言之當有所制係一變而守貞則吉以小人言之亦戒以守貞不可往害於君子若恃己而用壯則五陽猶衆其見凶也必矣君子小人正不正之間而已然譬之豕雖羸其性未始不蹢躅也故因以戒之九二包有魚無咎不利賔魚隂物二與初遇為包有魚之象然制之在己故猶可以無咎若不制而使遇於衆則其為害廣矣故其象占如此集疏程子曰姤遇也二與初密比相遇者也在他卦則初正應於四在姤則遇為重包苴裹魚隂物初象易氏曰包者以陽而包隂也故姤三爻皆言包初六為姤之主諸爻皆欲與之遇九二比而包之雖非正應亦無咎賔指九四潘氏曰當遇之世隂遇陽即合初本與四為正應而近合於二故二包有魚二既有魚則不利於四反指為賔而不及之也故四曰無魚愚謂魚乃四之所當有也而二擅有之其能無咎也幸矣然二之無咎四之不利也九三臀無膚其行次且厲無大咎九三過剛不中下不遇於初上無應於上居則不安行則不進故其象占如此然既無所遇則無隂邪之傷故雖危厲而無大咎也集疏易氏曰夬以上為決而四阻於五姤以初為遇而三阻於二故臀無膚其行次且徐氏曰姤者夬之反姤之三即夬之四也故其象同但夬一隂在上故其下之五陽皆趨於上姤一隂在下故上之五陽皆向於下其隂陽相求之情則然也九三之志亦在乎初初比二應四與三無繫而三介乎二四之間乘承皆剛進退不能故其象如此九四包無魚起凶初六正應己遇於二而不及於已故其象占如此集疏徐氏曰四與初為正應宜相遇也遇先於近初柔近二二包有魚矣四逺而不遇故曰包無魚起妄動也彼得則此失四既失所遇安處順守可也苟妄動而求必得之則凶矣九五以杞包瓜含章有隕自天瓜隂物之在下者甘美而善潰杞髙大堅實之木也五以陽剛中正主卦於上而下防始生必潰之隂其象如此然隂陽迭勝時運之常若能含晦章美靜以致之則可以回造化矣有隕自天本無而倏有之象也集疏程子曰九五下亦無應非有遇也然得遇之道終必有遇項氏曰杞高而直乾之象也瓜在下而柔巽之象也九五為乾之主而包巽在內以杞包瓜也以位言之則為以上包下以德言之則為以君子包小人泉峰龔氏曰五以陽剛居上初以隂柔居下相去懸絶本無可遇之理如杞本不可以包瓜也然五居得中正內含章美去初雖逺終不期遇而遇焉則如有隕自天矣愚案姤之一隂卦以女壯言之初以羸豕言之二與四則以魚言之五以瓜言之皆隂柔之義也但自各爻而觀之則取象有不同耳以杞包瓜以上而包下也含章以陽而包隂也一隂在內故既曰包而又曰含章九五中正在上與初無係但既包而有之則有隕自天蓋不期遇而自無不遇也遇不必初也上九姤其角吝無咎角剛乎上者也上九以剛居上而無位不得其遇故其象占與九三類集疏易氏曰姤其角乾體為首在首之上則為角如角之上窮則不遇也徐氏曰上九處姤之窮與初無遇雖吝而亦無咎者隂不必遇也愚案六爻皆姤而不言姤上九於姤無取而獨言姤者姤道之窮也不言姤者姤非所當姤言姤者姤其所不必姤也總論蔡氏曰姤者以柔遇剛而成卦遇非正道惟近者得之而正應者反凶也二最近故先有之三之厲以隔乎二而不遇也五含章雖無相遇之道而處位中正也上之吝最逺而窮也四之起凶遇不利正應也泉峰龔氏曰姤以一隂遇五陽隂壯有傷陽之理故卦辭曰女壯勿用取女是不欲隂之遇陽也爻辭除初六與卦辭同外上五陽爻則皆欲與隂遇矣二之包有魚以其近而遇初也三其行次且四無魚之凶上姤角之吝皆以其不遇初也五有隕自天則始雖不遇終必得遇是亦欲與初遇矣蓋不欲隂與陽遇者恐其盛而傷陽也其陽欲與隂遇者欲得隂以為用也一主陽而言一主隂而言一卦取義前後不同如此於以見易之不可為典要也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃聚也坤順兊説九五剛中而二應之又為澤上於地萬物萃聚之象故為萃亨字衍文王假有廟言王者可以至乎宗廟之中王者卜祭之吉占也祭義曰公假於大廟是也廟所以聚祖考之精神又人必能聚已之精神則可以至於廟而承祖考也物既聚則必見大人而後可以得亨然又必利於貞所聚不貞則亦不能亨也大牲必聚而後有聚則可以有所往皆占吉而有戒之辭集疏程子曰用大牲承土有廟之文以享祀言豐萃之時用物當厚稱其宜也項氏曰在損之時則二簋可用享在萃之時則用大牲吉易之隨時如此泉峰龔氏曰假字疑當作昭假烈祖之假謂感格也王者致祭於宗廟以己之精神感格祖考之精神所以為萃也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎初六上應九四而隔於二隂當萃之時不能自守是有孚而不終志亂而妄聚也若號呼正應則衆以為笑但勿恤而往從正應則無咎矣戒占者當如是也集疏程子曰初與四為正應本有孚以相從者也然當萃時三隂萃處含正應而從其類乃有孚而不終也若呼號以求正應則一握笑之矣一握一圑也謂衆以為笑也若能勿恤而往從陽剛之正應則無過咎不然則入於小人之羣矣六二引吉無咎孚乃利用禴二應五而雜於二隂之間必牽引以萃乃吉而無咎又二中正柔順虛中以上應五剛健中正誠實而下交故卜祭者有其孚誠則雖薄物亦可以祭矣集疏程子曰三與五為正應當萃者也而相逺又在羣隂之間必相牽引則得其萃矣是以吉而無咎孚信者萃之本也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交於神明也孚乃者謂有其孚則可不用文飾專以至誠交於上也童溪王氏曰彖以用大牲為吉六二以用禴為利何也曰備物者王者所以隨其時有孚者人臣所以通乎其上也愚謂二處二隂之中以中正自守上應於五而五引之此卦辭所謂利見大人利貞利有攸往其二五之謂與然卦曰用大牲此曰利用禴者孚也上下之孚可通於神明而況於人乎故五亦曰孚六三萃如嗟如無攸利往無咎小吝六三隂柔不中不正上無應與欲求萃於近而不得故嗟如而無所利唯往從於上可以無咎然不得其萃困然後往復得隂極無位之爻亦可小羞矣戒占者當近捨不正之強援而逺結正應之窮交則無咎也集疏朱氏曰六三履非其位欲萃於四四應於初欲萃於二二應於五莫知所萃故萃如嗟如上下不與宜其無所利也丘氏曰往前進也謂萃於五也萃五則正矣何咎之有亦通九四大吉無咎上比九五下比衆隂得其萃矣然以陽居隂不正故戒占者必大吉然後得無咎也集疏程子曰四當萃時上比九五下比羣隂得上下之萃者也然四以陽居隂其位不當上下之萃疑於不由正道而得者故必大吉然後為無咎也項氏曰九四自觀之上而下比於坤獨當三隂之萃遂為成卦之主無尊位而得衆心故必大吉而後可以無咎如益之初九在下位而任厚事亦必元吉而後可以無咎也愚謂九四九五處於羣隂之中皆萃之主也九五在上之萃也九四在下之萃也故九五曰萃有位而四象曰位不當以九居四而獲萃蓋無位之萃也曰大吉而曰無咎者上比於君以臣而有君萃之象疑於有咎故也郭氏易氏俱云九四大吉何咎之有九五萃有位無咎匪孚元永貞悔亡九五剛陽中正當萃之時而居尊位固無咎矣若有未信則亦修其元永貞之德而悔亡矣戒占者當如是也集疏程子曰元永貞君之德民所歸也故比天下與萃天下之道皆在此三者語録問九五以陽剛中正當萃之時而居尊位安得而有匪孚曰此言有位而無德則雖萃而不能使人信故當修其元永貞之德而後可悔亡也丘氏曰元永貞之德惟比萃二卦有之皆指五而言也然在比則吉在萃則惟悔亡何也曰比以一陽統五隂一陽為之主一則專專則衆隂順從萃以二陽統四隂二陽為之主二則分分則五不得以專萃此萃有位匪孚不如顯比之吉也愚案以九居五有其位者也然止於無咎者以僅能有其位而已非至誠足以感衆使人心恱而誠服也故曰匪孚惟修其元永貞之德而後悔可亡上六齎咨涕洟無咎處莘之終隂柔無位求萃不得故戒占者必如是而後可以無咎也集疏郭氏曰衆隂可與之萃則逺而在下二陽可從之萃而已獨乘之當萃之時而失其所萃者也故有齎咨涕洟之象然能齎咨涕洟不敢自安於上猶為知懼之人故雖失其所萃亦無咎丘氏曰上居萃之終兊之極聚終而散説極而悲理之常也能以憂戚處之則無咎矣總論泉峰龔氏曰萃卦與比卦相似比卦以九五為主萃卦亦以九五為主其餘諸爻皆萃比於五者也萃惟九四一爻與比不同九四下當羣隂之萃而上承於五故必大吉然後無咎初乃亂乃萃三萃如嗟如逺於五而未得所聚者也二引吉無咎應乎五而得所萃者也上齎咨涕洟乘乎五而失所萃者也其六爻吉凶亦與比相類但比一而萃二比專而萃分萃者比之始比者其萃之終與巽下坤上升元亨用見大人勿恤南征吉升進而上也卦自解來柔上居四內巽外順九二剛中而五應之是以其占如此南征前進也集疏語録曰南征吉巽坤二卦拱得箇南如算命生虛拱底説話易氏曰升之下卦二三以陽剛在下卦之上有可升之道以全體言內巽外順九二以剛中應乎五亦自下而升是以元亨時可以升故言用見大人大人者二三之陽剛是也泉峰龔氏曰彖傳柔以時升似指六五而言非謂卦變故下文言剛中而應亦謂二應五也愚案用見大人所以為升而亨也見有位之大人足以行其道見有德之大人足以進於道勿用憂恤而有向明之日矣南征向乎明也初六允升大吉初六柔順居下巽之主也當升之時巽於二陽占者如之則信能升而大吉矣集疏郭氏曰二三之陽其升為易初六與之同體而升故言允升而致大吉也潘氏曰初六隂柔在下無應於上本不能升密比九二剛中之臣隂陽志合而相允九三援而升之所以大吉易氏曰升者升乎上也凡升乎上必自下始故於初六發允升之義愚案初六以隂在下而能自拔者也蓋二三之陽剛其升為易初六能上合二三之志與之同體巽順而升故言允升大吉而象亦曰上合志也九二孚乃利用禴無咎義見萃卦集疏李氏曰升者萃之反二爻辭同何也萃六二以隂應陽升九二以陽應隂至誠相感一也項氏曰升與萃相反而孚乃利用禴皆在卦中爻者蓋禴所以享上也六二求萃於上九二求升於上故其義皆同新安胡氏曰萃六二以中虛為孚而與九五應升九二以中實為孚而與六五應虛實雖不同而孚則一而已愚案升萃二爻皆稱孚乃利用禴者上以誠信接於下下以誠信事其上只用薄祭亦可通於神明蓋能交人然後能交神能交神則其能交人也可知矣九三升虛邑陽實隂虛而坤有國邑之象九三以陽剛當升時而進臨於坤故其象占如此集疏程子曰三以陽剛之才正而且巽上皆順之復有援應以是而升如入無人之邑孰禦哉郭氏曰自下而升至於三其來不可禦也況有陽剛之才上皆順之是以如升無人之虛邑其行無所疑矣徐氏曰九三陽升進臨於坤前無疑礙如入無人之邑言至易也愚案三以剛居下卦之上應冥升之上六如明夷于南狩者前入坤虛之邑無剛以拒之其升甚易坤為土為衆邑象隂消為虛虛邑之象也六四王用亨于岐山吉無咎義見隨卦集疏語録曰王用享于岐山亨于西山只是説祭山川又問升萃二卦多是言祭亨萃取聚象不知升何取義曰人積其誠意以事鬼神有升而上通之義易氏曰四以隂柔得位而在順體之下有順而升之理然至此不可復升故爻不言升而言王用亨于岐山其惟文王之事乎所以吉且無咎也徐氏曰卦惟二四不言升何也五君位也二應五大臣也四承五近臣也其位不可升升則疑於五而有逼上之嫌矣愚案六四互兌故言岐山自周而言岐山在西故言文王之事六四上比柔順之君下乘剛強之臣能執柔順之道率下以事上如文王惟以順事乎君為心終不敢越乎臣位翼翼小心交通神明所以吉且無咎也六五貞吉升階以隂居陽當升而居尊位必能貞固則可以得吉而升階矣階升之易者集疏郭氏曰六五以貞自守不失其吉如歷階而升有進無退且言其易也愚案升之道在下為難在上為易在下必有剛德然後可升在上以順而升如歷階然然質本隂柔必守貞固乃得其吉而下有剛中之應輔之而升登進自階向乎高明無以復加矣上六冥升利于不息之貞以隂居升極昏冥不已者也占者遇此無適而利但可反其不己於外之心施之於不息之貞而已集疏程子曰六以隂居升之極昏冥於升知進而不知退止者其為不明甚矣君子於貞之德終日乾乾自強不息如上六不已之心用之於此則利也以小人貪求無已之心移之進善則何善如之愚案上六升之極猶升而不已豈知盛衰消長進退之義哉所謂冥於升也惟施此心於進德則利仁義忠信樂善不倦無疆之進也故曰利于不息之貞總論泉峰龔氏曰升卦六爻之義有以時位言者有以誠意言者有以德言者初允升三升虛邑五升階上冥升時位之升也二孚乃利用禴四王用亨于岐山誠意之升也上利于不息之貞與大象積小以髙大德之升也六五為升之主故彖傳曰柔以時升二四承應於五者也其位不可復升故以誠意之升言初三在下故可升也上乘乎五而升不己則為冥升矣惟升於德者無限故又曰利於不息之貞此則不嫌於升之過也坎下兊上困亨貞大人吉無咎有言不信困者窮而不能自振之義坎剛為兊柔所掩九二為二隂所掩四五為上六所掩所以為困坎險兊説處險而説是身雖困而道則亨也二五剛中又有大人之象占者處困能亨則得其貞矣非大人其孰能之故曰貞又曰大人者明不正之小人不能當也有言不信又戒以當務晦默不可尚口益取困窮集疏徐氏曰兊口不掩言象處困之時當務晦默尚口多言人誰信之困且窮而已故戒愚案困之得名以剛為柔所掩君子為小人所蔽然曰大人吉無咎者以貞而已夫人當困窮之時能反身修德以正自守豈終困也哉蓋有亨通之時也初六臀困于株木入于幽谷三嵗不覿臀物之底也困于株木傷而不能安也初六以隂柔處困之底居暗之甚故其象占如此集疏語録曰初六在困之下至困者也株木不可坐臀在株木上其不安可知李氏曰坎初最下厯三爻而後險盡故有三嵗不覿之象徐氏曰株木無枝葉之木在下初象幽谷幽深之谷坎陷象坎陷益下有入于幽谷之象三嵗不覿謂初不見四也案易氏謂臀指九四兊體如夬之九四亦曰臀愚謂隂居下故取臀象坎為坎窞故入于幽谷三嵗不覿隂居最下不能自見蓋不知處困之道矣善處困者當何如修德以致命遂志而已九二困于酒食朱紱方來利用亨祀征凶無咎困于酒食厭飫苦惱之意酒食人之所欲然醉飽過宜則是反為所困矣朱紱方來上應之也九二有剛中之德以處困時雖無凶害而反困於得其所欲之多故其象如此而其占利以亨祀若征行則非其時故凶而於義為無咎也集疏程子曰二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來在困之時利用亨祀其德既誠自然感於上若不安處以俟命往而求之則犯難得凶乃自取也諸卦二五以隂陽相應而吉惟小畜與困乃厄於隂故同道相求也語録問厭飫於所欲如何曰此是困於好事底有困於好事者有困於不好事者此爻是好爻當困時則困於好事又問朱紱方來利用亨祀曰以之事君則君應之以之事神則神應之易氏曰九二以坎水居兊澤之下為二隂所掩雖得中而未能出險故言困于酒食惟其剛中自守而五以同德相與是以有朱紱方來之慶故二言利用亨祀五言利用祭祀二者皆交通神明之理五可以來而二不可以往是以征凶惟其剛中故雖凶而無咎愚案坎體多説酒食或者水之潤及萬物猶酒食之所以飬人與六三困于石據于蒺䔧入于其宫不見其妻凶隂柔而不中正故有此象而其占則凶石指四蒺䔧指二宫謂三而妻則六也其義則繫辭備矣集疏程子曰石堅重難勝之物蒺䔧不可據之物三以剛險而上進則二陽在上堅不可犯困于石也以不善之德居九二剛中之上其不安猶藉刺據蒺䔧也語録曰六三陽之隂上六隂之隂故將六三言之則上六為妻泉峰龔氏曰三無應於上故有不見其妻之象愚案六三實掩二以為困者也初以困人適以自困故有此象猶坎卦諸隂爻陷陽而已反凶也九四來徐徐困于金車吝有終初六九四之正應九四處位不當不能濟物而初六方困於下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車為九二象未詳疑坎有輪象也集疏程子曰金剛也車載物者也二以剛在下載已故謂之金車四欲從初而阻於二故其來遲疑而徐徐故曰困于金車也初四正應終必相從故有吝有終二與四皆以陽居隂而二以剛中之才所以能濟困也徐氏曰來謂初來應也徐徐緩貌愚案金車之義雖未詳要亦困之善者如困于酒食金車赤紱皆非困于株木與石葛藟之比此所謂困於好事也故曰有終九五劓刖困于赤紱乃徐有説利用祭祀劓刖者傷於上下上下既傷則赤紱無所用而反為困矣九五當困之時上為隂掩下則乘剛故有此象然剛中而説體故福能遲久而有説也占具象中又利用祭祀久當獲集疏語録問二五皆利用祭祀如何曰他得中正又似無應而心專一底意思易氏曰困上加劓刖二字指九二也二方見掩於二隂之中上為三所劓下為初所刖則二之受困其志未得故曰困于赤紱采菽言赤紱在股毛氏以為諸侯赤紱則赤紱者諸侯之服乃二之所當服者言困于赤紱則陷于坎險不能急於相濟然以同德相求所以乃徐有説五言利用祭祀二言利用享祀至誠相與久當獲福此所謂困而不失其所亨者與蔡氏曰享狹而祭廣君臣之位不同故所用亦異上六困于葛藟于臲卼曰動悔有悔征吉以隂柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以貞而吉矣集疏程子曰物極則反事極則變困既極矣理當變也葛藟纒束之物臲卼危動之狀六處困之極為困所纒束而居最高危之地困于葛藟于臲卼也張氏曰困至上六極矣三非上之應徒以隂柔相纒係而已故曰困于葛藟葛藟生於下而纒乎上者也九五不可乘也而上六以隂柔乘之豈其所安故又曰于臲卼臲卼處乎上而不安之意徐氏曰葛藟纒繞之物臲卼危動之狀位髙象震無咎者存乎悔言困已極矣有悔則可出困而征吉困窮而通其謂是夫總論語録曰困卦難理會易中有數卦如此繫辭云卦有小大辭有險易困是箇極不好底卦所以把爻辭也做得如此難曉如蹇剝否暌皆是不好底卦只是剝則分明是剝所以分曉困是箇進退不得窮極底卦所以難曉其大意亦可見易氏曰困之成卦兊上坎下凡卦之遇坎者皆有剛掩之義而困為甚考其爻義初之入于幽谷三之據于蒺䔧上之困于葛藟言隂柔之未免乎困也四困于金車而有終五困于赤紱而有説二以朱紱方來而利亨祀言剛之不可以終困也陽剛不可終困而二四五皆不言吉隂柔未免乎困而上獨言吉者困極則變如否之有泰雖險而終濟也泉峰龔氏曰卦以柔掩剛而為困主乎陽而言也爻以剛柔相掩為困而隂之困為尤甚亦附乎陽而言也彖傳曰困而不失其所亨其惟君子乎三剛爻之謂矣巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶井者穴地出水之處以巽木入乎坎水之下而上出其水故為井改邑不改井故無喪無得而往者來者皆井其井也汔幾也繘綆也羸敗也汲井幾至未盡綆而敗其瓶則凶也其占為事仍舊無得喪而又當敬勉不可幾成而敗也集疏胡氏曰邑者人民所聚居井居地而不遷猶君子之身可以富貴貧賤君子之道不為富貴貧賤加損夫井終日汲之不為喪終日不汲不為盈猶君子之用不用君民之幸不幸耳於君子何所損益哉井濟於時往來莫不資其飬猶君子之德逺近莫不被其澤程子曰井以濟用為功幾至而未及用亦與未繘井同君子之道貴乎有成也所以五穀不熟不如荑稗掘井九仭而不及泉猶為棄井有濟物之用而未反物猶無井也羸敗其瓶而失之其用喪矣郭氏曰井之為物水在下者也今坎水居上而為井者水在下則未用在上則出而有功乃能盡井之義也語録曰汔至一句亦未繘井羸其瓶是一句意幾至而止如綆未及升而瓶敗言功不成也徐氏曰以卦體言初柔為井眼二三剛為泉實四柔為井中空處五剛為泉實已汲將出井也上柔為井口有全井之象丘氏曰改邑不改井井之體也無喪無得井之德也往來井井井之用也此三句言井之事汔至亦未繘井未及於用也羸其瓶則并失其用矣此二句言汲井之事泉峰龔氏曰邑坤象井之為卦上卦本坤下卦本乾以乾下畫之陽易坤中爻之隂是改邑也井之為物一定而不可移不改井也變坤為坎是邑可改而井不可改汔至亦未繘井羸其瓶指九五而言九五有汲泉已上而未出井口之象夫汲泉己上而幾出井口未能盡綆而敗瓶則功不及物井道無成是以凶也夫九五陽剛中正在爻辭則井洌寒泉食非幾及而敗者但以井之全體言之則有此象故不可以不戒若能自勉以終其功則吉矣初六井泥不食舊井無禽井以陽剛為泉上出為功初六以隂居下故為此象蓋井不泉而泥則人所不食而禽鳥亦莫之顧也集疏徐氏曰初六隂柔在井之下有泥象又曰人品汚下無用於世為人所棄者觀於此爻可以知所當勉矣泉峰龔氏曰舊井無禽象義俱未詳愚案舊井無禽之説程子謂井水之上人獲其用禽鳥亦就而求焉舊廢之井人既不食水不復上則禽鳥亦不復往易氏謂舊井不食邑為無人禽得而犯之今謂之無禽則猶有人焉李氏謂四不應初無禽也無禽則人不食可知本義謂禽鳥亦莫之顧諸説不同蓋初六隂處最下井泥也井泥不食則為舊井雖禽亦無則井道廢而用不能及物矣六爻惟初二兩爻位不當故皆為廢井九二井谷射鮒甕敝漏九二剛中有泉之象然上無正應下比初六功不上行故其象如此集疏語録曰鮒沙隨以為井有蝦蟇古為徐氏曰流濕就下水之常也井之用則悖矣井谷射鮒井有孔穴水下注於井射其鮒也甕汲水器敝漏則水下注二位柔比初故有此二象泉峰龔氏曰鮒必蝦蟇也今廢井中多有之井谷射鮒只是井中孔穴鮒墜於其中有若射焉似不必謂水下注於井射其鮒也九三井泄不食為我心惻可用汲王明並受其福泄不停汚也井泄不食而使人心惻可用汲矣王明則汲井以及物而施者受者並受其福也九三以陽居陽在下之上而未為時用故其象占如此集疏劉氏曰九三以陽居陽進乎初與二為能潔治矣然尚居巽體未能上出故為不食耿氏曰為我心惻而我未嘗惻則其所飬可知也矣六四井甃無咎以六居四雖得其正然隂柔不泉則但能修治而無及物之功故其象為井甃而占則無咎占者能自修治則雖無及物之功而亦可以無咎矣集疏郭氏曰九三有其才而未得其時六四近中正之君非無其時矣而其才不能濟物足以自修而已故為井甃之象焉雖不能濟物苟能自修則無過矣易之言無咎於有疑之爻多言之其不言者或明見其無咎或明知其有咎如井之初六九二雖未至凶皆有咎也九三雖未至吉知其無咎矣六四之才疑於有咎故明以無咎言之丘氏曰三在內卦而言井泄者泄以致其潔也四在外卦而言井甃者甃以禦其汚也蓋不泄則井之汚不潔不甃則井之潔者易汚居子內外交相飬之道也九五井洌寒泉食洌潔也陽剛中正功及於物故為此象占者有其德則契其象也集疏程子曰五以陽剛中正居髙位井道之至善者也洌謂甘潔也井泉以寒為美甘潔之寒泉可為人食也然而不言吉者井以上出為成功未至於上未及用也易氏曰坎位北而寒故言井洌寒泉五位乎中正陽水上出乃井飬不窮之利然言食而不言吉井以上出為功利及於人至上而後為元吉也又曰三與五皆泉之潔者三居甃下未汲之泉也故曰不食五出乎甃己汲之泉也故曰食上六井收勿幕有孚元吉收汲取也朝氏曰收鹿盧收繘者也亦通幕蔽覆也有孚謂其出有原而不窮也井以上出為功而坎口不掩故上六雖非陽剛而其象如此然占者應之必有孚乃元吉也集疏程子曰井收勿幕取而勿蔽也其利無窮井之施廣矣大矣又曰他卦之終為極為變惟井與鼎終乃為成功是以吉也丘氏曰內卦井道之小成外卦井道之大成也坎為輿在井之上而下應巽繩亦有取繘之象總論李氏曰初井泥二井谷皆廢井也三井泄則泄初之泥四井甃則甃二之谷既泄既甃則井道全也故五井洌而泉寒上井收而勿幕功始及物而井道大成矣離下兊上革已日乃孚元亨利貞悔亡革變革也兊澤在上離火在下火然則水乾水決則火滅中少二女合為一卦而少上中下志不相得故其卦為革也變革之初人未之信故必已日而後信又以其內有文明之德而外有和恱之氣故其占為有所更革皆大亨而得其正所革皆當而所革之悔亡也一有不正則所革不信不通而反有悔矣集疏程子曰革者變其故也變其故則人未能遽信故必已日而後人心信從弊壞而後革之所以致其通也故革之可以大亨蘇氏曰已日乃孚不信於革之日而信於已革之日也徐氏曰元亨利貞悔亡者變有大通之理也然必利於貞則其悔可亡變不以貞則事有不可勝悔者此古人所以重改作也初九鞏用黃牛之革雖當革時居初無應未可有為故為此象鞏固也黃中色牛順物革所以固物亦取卦名而義不同也其占為當堅確固守而不可以有為聖人之於變革其謹如此集疏劉氏曰下非可革之位初非可革之時要在固守中順之道而不敢有革也泉峰龔氏曰易言用黃牛之革者二遁之九二言執之用黃牛之革者處遁之世居中有應欲遁而不可遁者也革之初六言鞏用黃牛之革者處革之初在下無應當革而不可革者也所指雖殊而意實相類合而觀之可也愚案革下三爻皆言革九四言改五上言變改變者革道之已成也初二三處革之時當有所革而未革者也四五六則處革之時而盡革之道矣初九當革之初堅確固守而不輕革焉乃所以為革也豈必更新換故乃為革哉六二已日乃革之征吉無咎六二柔順中正而為文明之主有應於上於是可以革矣然必已日然後革之則征吉而無咎戒占者猶未可遽變也集疏泉峰龔氏曰已日乃孚者人未能遽信也已日乃革者事未可遽變也天下之事必人心信而後可革此革之所以不可遽也愚案六二為內卦之主故卦辭之已日見之於此然卦曰已日乃孚爻曰已日乃革者孚而後革也故征吉無咎九三征凶貞厲革言三就有孚過剛不中居離之極躁動于革者也故其占有征凶貞厲之戒然其時則當革故至于革言三就則亦有孚而可革也集疏程子曰革言猶當革之論就成也合也審察當革之言至於三而皆合則可信也語録曰革言三就言三番結裹成就如第一畨商量這箇是當革是不當革説成一畨又更如此商量一畨然後説成了却不是三人來説泉峰龔氏曰九三以過剛之才躁動以往則凶處當革之時貞固自守則厲惟於改革之言詳審三就則有孚而可革矣蓋詳審如此既無躁動之凶又無固守之厲得其時宜所以可革也九四悔亡有孚改命吉以陽居隂故有悔然卦己過中水火之際乃革之時而剛柔不偏又革之用也是以悔亡然又必有孚然後革乃可獲吉明占者有其德而當其時又必有信乃悔亡而得吉也集疏易氏曰六爻之中惟四不當位宜有悔也而居澤火相革之際革而當其悔亡矣是以下與初相應上與五相比上下交信為有孚其志既孚於人而後可以言改命改命即革命之義改命於有孚之後上下皆信其志所以為吉丘氏曰下卦言革至四言改命改則進於革矣五言虎變上言豹變變者革之成改又不足論矣愚謂九四之改命應天順人之事也而九五虎變上六豹變聖人神化之妙與革道至此極矣九五大人虎變未占有孚虎大人之象變謂希革而毛毨也在大人則自新新民之極順天應人之時也九五以陽剛中正為革之主故有此象占而得此則有此應然亦必自其未占之時人已信其如此乃足以當之耳集疏語録問大人虎變是就事上變是就身上變曰豈止是事上也從這裏做出來這箇却不是空設子做得文王其命維新也是他自新後如此堯克明峻德然後黎民於變大人虎變正如孟子所謂所過者化所存者神上下與天地同流豈曰小補之哉項氏曰九五革之主故曰大人以君德言也上六革之效故曰君子小人以臣民言也易氏曰革九五言大人猶乾九五有飛龍之象革五有虎變之象均是大人也而象則異亦各因其時而已虎西方兊象泉峰龔氏曰革以孚信為主故彖與三四皆以孚為言至五之未占有孚則不言而信無為而成而無以復加矣愚謂虎變者如虎之神其威也九五以大人之德存神過化當革之時譬之虎焉未變之先已知其必變也故曰未占有孚上六君子豹變小人革面征凶居貞吉革道已成君子如豹之變小人亦革面以聽從矣不可以往而居貞則吉變革之事非得已者不可以過而上六之才亦不可以有行也故占者如之集疏程子曰革之終革之成也君子己從革而若豹之變小人昏愚難遷者亦革其面以從上之教令革道可以為成矣然至革之終而又征則凶惟當貞固以自守革至於極而不守以貞則所革復隨變矣天下之事始則患乎難革已革則患乎不能守也故革之終復戒以居貞則吉也泉峰龔氏曰九三與上六皆曰征凶而有貞厲貞吉之殊者三之征凶戒其不可恃才妄動也上之征凶謂事之已革者不可復變也三當革而未革故守貞則厲上已革而當守故居貞則吉蓋三則革道未成上則革道已成故其占如此云總論語録問革下三爻有謹重難改之意上三爻則革而善蓋事有新故革者變故而為新也下三爻則故事也未變之時則當謹審於其先上三爻則變而為新事矣故漸漸好曰然乾卦到九四爻謂乾道乃革也是到這裏方變了泉峰龔氏曰初言鞏用黃牛未可有革者也二言己日乃革不可遽革者也三言革言三就詳審以為革者也皆革道之未成也四言有孚改命則事革矣五言大人虎變則為聖人之神化矣上言君子豹變小人革面則天下為之丕變而革道大成矣巽下離上鼎元吉亨鼎烹飪之器為卦下隂為足二三四陽為腹五隂為耳上陽為鉉有鼎之象又以巽木入離火而致烹飪鼎之用也故其卦為鼎下巽巽也上離為目而五為耳有內巽順而外聰明之象卦自巽來隂進居五而下應九二之陽故其占曰元亨吉衍文也集疏易氏曰易之諸卦皆言象取諸物以名卦者鼎與井而已井以木巽水鼎以木巽火二卦以飬人為義故皆以實象名之徐氏曰以彖傳考之無吉字泉峰龔氏曰彖傳曰柔進而上行得中而應乎剛以卦變言是自遁來二隂上進而居五得中而應乎二也愚案鼎之卦鼎之為字與夫鼎之器其象皆同抑先有卦而後有字與器與先有此器而後有卦與字與蓋鼎之為卦與夫鼎之為字皆取器以為象也故爻有鼎趾鼎足鼎耳之喻才有此器即有此象才有此象卦與字之所由立也初六鼎顛趾利出否得妾以其子無咎居鼎之下鼎趾之象也上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉因其顛而出之則為利矣得妾而因得其子亦由是也此爻之象如此而其占無咎蓋因敗以為功因賤以致貴也集疏語録或曰據此爻是凡事須用與他翻轉了却能致利曰不然只是偶然如此此本是不好底爻却因禍致福所謂不幸中之幸蓋鼎顛趾本是不好因顛傾出鼎中惡穢之物所以反得利而無咎非是故意欲翻轉鼎趾而求利也又曰得妾是無緊要其重却在以其子處徐氏曰妾初也子四也柔巽處卑妾之象也從剛應四以其子也言妾雖賤從子貴也易氏曰趾顛則鼎覆咎也然鼎當致用之始欲取其潔新者必去其故穢者泉峰龔氏曰顛趾當是取隂柔不能勝其重之象不必謂仰從九四也愚案鼎顛趾鼎之未用而傾仆也未用而傾仆則汙穢不能留反以顛為利也若九四之折足則覆敗而凶矣得妾以其子又就顛趾出否上取義得妾者顛趾也以其子者利出否也疑於有咎故曰無咎九二鼎有實我仇有疾不我能即吉以剛居中鼎有實之象也我仇謂初隂陽相求而非正則相陷於惡而為仇矣二能以剛中自守則初雖近不能以就之矣是以其象如此而其占為如是則吉也集疏程子曰鼎有實上出則為用二陽剛有濟用之才上應六五之君則得正而其道可亨然與初密比相從則非正而害義是有疾也二能以正自守則不正不能就之矣所以吉也徐氏曰怨耦曰仇不善之匹也謂初六也九三鼎耳革其行塞雉膏不食方雨虧悔終吉以陽居鼎腹之中本有美實者也然以過剛失中越五應上又居下之極為變革之時故為鼎耳方革而不可舉移雖承上卦文明之腴有雉膏之美而不得以為人之食然以陽居陽為得其正苟能自守則隂陽將和而失其悔矣占者如是則初雖不利而終得吉也集疏語録問鼎耳革是如何曰三與五不相應五是鼎耳鼎無耳動不得革是變換之義他在上下之間與五不相當是鼎耳變革了不可舉移雖有雉膏而不食隂陽終必和故有方雨之吉易氏曰二鼎腹有實者也耳謂六五正所以運而逹其腹中所容者惟上無應塞而不行實在其中美如雉膏誰得而享之然君子處己要使美實備於我而不計行之通塞及其終也隂陽相濟有至和將雨之兆此所以虧其始之悔而終必獲吉也九四鼎折足覆公餗其形渥凶朝氏曰形渥諸本作刑剭謂重刑也今從之九四居上任重者也而下應初六之隂則不勝其任矣故其象如此而其占凶也集疏程子曰四下應於初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也易氏曰四亦鼎腹宜有實也在二陽之上已過於溢而乃以陽剛之才求應於初初趾已顛故有折足之象覆公餗四近君為公之象丘氏曰二三四為鼎腹故二曰有實三曰雉膏四曰公餗也中溪張氏曰初之顛趾即四之折足初利而四凶何也曰初在鼎下未有實也未有實而趾顛故有出否之利四在鼎中已有實矣有實而足折則有覆餗之凶又顛則舍舊而圖新折則鼎毁而用廢矣新安胡氏曰王弼注其形渥以為霑濡之形蓋弼不知古易形作刑渥作剭音屋周禮有剭誅新唐史元載贊曰易稱鼎折足其刑剭諒哉元載以罪誅故云六五鼎黃耳金鉉利貞五於象為耳而有中德故云黃耳金堅剛之物鉉貫耳以舉鼎者也五虛中以應九二之堅剛故其象如此而其占則利在貞固而已或曰金鉉以上九而言更詳之集疏語録曰六五只為上已當玉鉉了却下取九二之應來當金鉉蓋推排到這裏無去處了易氏曰五為鼎耳所以虛中受實為鼎之主然在鼎之上受鉉以舉鼎者耳也在鼎之外貫耳以舉鼎者鉉也上以陽剛為金鉉而言於六五者謂五以中虛居無為之地而來上九剛實之助也泉峰龔氏曰金鉉是指上九而言不必謂九二也金鉉之為用雖出乎鼎之上而實貫乎耳之中六五鼎耳也故亦兼鉉言之上九鼎玊鉉大吉無不利上於象為鉉而以陽居隂剛而能溫故有玉鉉之象而其占為大吉無不利蓋有是德則如其占也集疏郭氏曰上九鼎道大成剛柔適宜故得玉鉉之象易氏曰鼎與井其用在五而其功皆在上井至上而後為元吉鼎至上而後為大吉皆所以全飬人之利者也丘氏曰五與上之鉉一也而有金玉之異何與金一於剛玉則剛而能溫也蓋五以柔中而受上之剛故取金鉉為言上九爻剛而位柔剛柔有節故取玉鉉為言而象亦以剛柔節釋之此金玉之分也總論丘氏曰鼎卦六爻有全鼎之象然初曰趾四亦曰足者以四應乎初四之足即初之趾也上曰鉉五亦曰鉉者以五附乎上五之鉉即上之鉉也五曰耳三亦曰耳者則以三無應乎五有鼎耳革異之象易道變動不居義各有當也愚案以木巽水則為井以木巽火則為鼎其為義本不同而皆以上爻為吉蓋水以汲而出井為用故五寒泉而食上勿幕而吉食以烹而出鼎為用故五金鉉上玉鉉而大吉震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯震動也一陽始生於二隂之下震而動也其象為雷其屬為長子震有亨道震來當震之來時也虩虩恐懼驚顧之貌震驚百里以雷言匕所以舉鼎實鬯者以秬黍酒和鬱金所以灌地降神者也不喪匕鬯以長子言也此卦之占為能恐懼則致福而不失其所主之重集疏語録曰震來虩虩言人常似當震來時虩虩地便能笑言啞啞到得震驚百里便也不喪匕鬯這箇相連做一串下來又曰震亨至不喪匕鬯作一項看出可以守宗廟社稷又做一項看震便自是亨震來虩虩是恐懼顧慮而後便笑言啞啞震驚百里便也不喪匕鬯文王語是解震亨了孔子又自説長子事須拆開看方得又曰震主器事未必彖辭便有此意看來只是傳中方説泉峰龔氏曰語録不喪匕鬯之説與本義小異當以語録為正愚案震亨以天道而論則天地萬物待震而後亨以人事而論天下之理不動則不亨因震動而虩虩恐懼則長慮却顧而無危亡之失是以後獲笑言和樂之吉雖有大震驚于百里亦不失所執之匕鬯蓋知恐懼修省而已此髙鳯麥漂流而不知也初九震來虩虩後笑言啞啞吉成震之主處震之初故其占如此集疏郭氏曰恐懼修省於前則獲和樂笑言之吉於後理之必然也震動之初畏懼修省不可緩也過此則危矣故於初言之蔡氏曰震之用在下初與四皆在下者也四溺於柔故泥初剛無係故吉新安胡氏曰初九爻辭與卦辭同者以其為成卦之主也愚案初九與卦辭同而加後字者卦以全體言故喜懼同時爻以各體言故前懼後喜不言不喪匕鬯而不喪匕鬯之意在其中矣六二震來厲億喪貝躋于九陵勿逐七日得六二乘初九之剛故當震之來而危厲也億字未詳又當喪其貨貝而升於九陵之上然柔順中正足以自守故不求而自獲也此爻占具象中但九陵七日之象則未詳耳集疏程子曰六二居中得正善處震者也而乘初九之剛動而上奮孰能禦之彼來既猛則已處危矣貝所有之資也躋升也九陵至髙之陵也以震來之厲度不能當喪其所有升至髙以避之勿逐七日得過則復常矣卦有六位七乃更始事既終時已易也丘氏曰初震而上二乃乘之安得不厲鄭玄云十萬為億言大也故五言億無喪而象以大無喪明之九陵即九四也下體互艮有山陵之象二五雖無應而處有應之地二登九陵之上以避初震之來時過事已危者安而喪者得矣六三震蘇蘇震行無眚蘇蘇緩散自失之狀以隂居陽當震時而居不正是以如此占者若因懼而能行以去其不正則可以無眚矣集疏程子曰蘇蘇神氣散緩自失之狀三以隂居陽不正處平時且不能安況處震乎故當震懼而蘇蘇然若因震懼而能行去不正而就正則可以無過眚泉峰龔氏曰三居位不當去初已逺震少緩矣故曰震蘇蘇蘇息也蘇蘇者虩虩之反散緩休息而不知警懼者也若能震懼而行則可以無眚所以進之也愚案下震終而上震繼之故兩言震九四震遂泥以剛處柔不中不正陷於二隂之間不能自震也遂者無反之意泥滯溺也集疏新安胡氏曰案漢五行志李竒曰震有互體坎水象四在水中故有震遂泥之象愚案程子曰泥滯溺也以不正之陽上下重隂而不能自震奮者也蓋震貴動而不貴止震遂泥焉象之所以未光也六五震往來厲億無喪有事以六居五而處震時無時而不危也以其得中故無所喪而能有事也占者不失其中則雖危無喪矣集疏張子曰往來厲者往亦厲來亦厲也愚案震往亦厲震來亦厲者禍至與不至皆以危懼待之故能無喪有事蓋不失其所有也此卦辭所謂不喪匕鬯能主器以君天下者與上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言以隂柔處震極故為索索矍矍之象以是而行其凶必矣然能及其震未及身之時恐懼修省則可以無咎而亦不能免於婚媾之有言戒占者當如是也集疏程子曰索索消索不存之狀矍矍不安定貌志氣消索瞻視徊徨矣以隂柔不中正之質而處震動之極故征則凶也不于其躬于其鄰者近於身者也能震懼於未及身之前則不至於極矣故得無咎郭氏曰婚媾所親也有言失之小也處震之時得無大咎足矣小有言不可得而免也泉峰龔氏曰三去初逺故震蘇蘇上去四亦逺而有索索矍矍之象者以隂柔之質處重震之極恐懼自失三不及震而上則過乎震也總論丘氏曰震以一陽動於二隂之下故六爻以初四為主而四下牽於二隂全震之時用者獨在乎初其上四隂爻皆為陽所震者也泉峰龔氏曰震卦六爻之義兩兩相對初與四對初剛無係四溺於隂故四之泥不如初之吉也二與五對二億喪貝五則億無喪也二惟來厲五則往來皆厲也三與上對蘇蘇散緩自失不及乎震者也索索矍矍恐懼自失過乎震者也三猶可進故行而無眚上處震極故征則凶矣大抵處震之道以恐懼修省為主二三四五上皆不得處震之道得處震之道者其惟初乎故諸爻皆不如初之吉也愚案震卦言虩虩啞啞蘇蘇索索矍矍諸卦皆無其義此特因震動而恐懼故其辭如此之異然蘇蘇索索矍矍皆失其所守不得處震之道者得處震之道在初與五乎初則虩虩啞啞五則無時而不危懼而能無喪有事能自守者也善處震者也艮下艮上艮其背不獲其身行其庭不見其人無咎艮止也一陽止於二隂之上陽自下升極上而止也其象為山取坤地而隆其上之狀亦止於極而不進之意也其占則必能止於背而不有其身行其庭而不見其人乃無咎也蓋身動物也惟背為止艮其背則止於所當止也止於所當止則不隨身而動矣是不有其身也如是則雖行於庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得無咎也集疏郭氏曰不獲其身忘我也不見其人忘人也忘我者止之止也忘人者行之止也語録曰艮其背背只言止人之四體皆能動惟背不動取止之義也又曰不獲其身但見得事之當止不見此身之所為利害才將此身預其間則道理便壞了古人所以殺身成仁舍生取義者只為不見此身方能如此又曰看此段工夫全在艮其背上人多是將行其庭對此句説便不是了行其庭只是輕説過緣艮其背既盡得了則不獲其身行其庭不見其人也不見有已也不見有人都只是見此理又曰明道曰與其是內而非外不若內外之兩忘也説得最好便是不獲其身行其庭不見其人不見有物不見有我只見其當止也如為人君止於仁不見下面道如何只是我當止於仁為人臣止於敬不見上面道如何只是我當止於敬大事小事莫不皆然又曰此段分作兩截却是艮其背不獲其身是靜之止行其庭不見其人為動之止總説是艮其背是止之時當其所止了所以止時自不獲其身行時自不見其人此二句乃艮其背之效驗所以彖傳先説止其所也却云是以不獲其身行其庭不見其人也愚案諸爻言艮其趾腓限身輔此獨言艮其背者背之言背也人所不知而已所獨知之地也止其所當止也止其所當止則不見有身不見有人時止時行惟義所在天理固有而人欲自滅矣是正其義不謀其利之説是合外內人我而言通論一卦之義也不獲其身為下卦艮而言不見其人為上卦艮而言初六艮其趾無咎利永貞以隂柔居艮初為艮趾之象占者如之則無咎而又以其隂柔故又戒其利永貞也集疏程子曰六在最下趾之象趾動之先也艮其趾止於動之初也事止於初未至失正故無咎以柔處下當止之時也行則失其正矣故止乃無咎隂柔患其不能常也不能固也故方止之初戒以利在常永貞固則不失止之道矣郭氏曰小畜於復自道言吉復於不逺復言元吉艮之初六有過於二者而不言吉蓋二卦之復皆先失後得復則吉不復則凶吉凶可得而言也艮其趾則止於未失得之前吉凶失得皆在所止矣是以不言吉也世多以吉為過於無咎是不知吉與無咎自為二道論有為則莫善於吉論守道則無咎為大是以或言吉或言無咎或吉而無咎或凶而無咎不可同也六二艮其腓不拯其隨其心不快六二居中得正既止其腓矣三為限則腓所隨也而過剛不中以止乎上二雖中正而體柔弱不能往而拯之是以其心不快也此爻占在象中下爻倣此集疏語録曰艮其腓咸其腓二卦皆就人身取義而皆取其靜腓動物也動則凶不動則吉徐氏曰二有中正之德宜止不動然艮主在剛故其隨在三三剛列夤不得止之宜二不能拯救其失故不拯其隨以二之中正柔弱而不能拯其所隨豈所欲哉故其心不快愚案腓足腹也上與股相依股動則腓隨咸之二言腓三言股則此爻所隨者三也三不中正二不能拯而恆隨之是以其心不快不拯絶句其隨句九三艮其限列其夤厲薰心限身上下之際即腰胯也夤膂也止於腓則不進而已九三以過剛不中當限之處而艮其限則不得屈伸而上下判隔如列其夤矣危厲薰心不安之甚也集疏程子曰三以剛居剛而不中在下體之上而隔上下之限故為艮其限是確乎止而不能進退者也在人身為列絶其夤上下不相屬也其危甚矣故厲薰心易氏曰三上皆成艮之主也上居一卦之極以敦而吉三居下卦之上上下之際而乃固止其所是謂艮其限列其夤限與夤在人身皆為上下之交列而絶之能無厲乎厲薰心尤有甚於二之心不快也六四艮其身無咎以隂居隂時止而止故為艮其身之象而占得無咎也集疏王氏曰四出下體之上居上體之下具全體者故曰艮其身身總諸體者也止諸身則皆從之矣徐氏曰諸卦惟咸與艮以人身取象四當心位不言心者心不可見身則心之區宇也其身止則知心之止矣六五艮其輔言有序悔亡六五當輔之處故其象如此而其占悔亡也悔謂以隂居陽集疏徐氏曰輔頰車也在上之象艮止其輔則言不妄出而有序矣以隂居陽宜有悔也不失其中其悔可亡泉峰龔氏曰艮其輔非不言也言而有序所以為艮也蓋艮之為道時止則止時行則行時止則止止而止也時行則行行而止也若九三之艮其限列其夤知靜而不知動則厲矣愚案艮其輔者時未可言而不言也言有序者可以言而言也時然後言語默以時悔之所以亡也上九敦艮吉以陽剛居止之極敦厚於止者也集疏蔡氏曰艮之時用在上上與三皆所以為艮也三牽於二柔不得為艮之體全艮之時用獨在乎上也易氏曰上居一卦之極全兼山之體山厚也故曰敦艮丘氏曰艮以人身取象艮止體身動物也六爻自初之趾五之輔皆專於一體而未能盡止道之善僅止於無咎悔亡而已獨上九為成艮之主於當止之地而止焉所謂止於至善者也以其非形可拘故曰敦艮吉其與悔亡無咎之辭異矣徐氏曰易諸卦取敦象者三敦臨敦復敦艮皆上卦坤艮下無應與能自厚其德者也坤艮皆有厚象總論語録曰艮就人身取象上一畫有頭之象中二隂有口之象內卦之下有足之象又曰咸艮皆以人身取象但艮卦又差一位又曰艮卦居外卦者八而皆吉賁白賁無咎大畜何天之衢亨蠱不事王侯頤由頤厲吉損弗損益之艮敦艮吉剝碩果不食蒙不利為寇利禦寇雖小不利然卦爻亦自好泉峰龔氏曰艮與震為反對震之用在下艮之用在上故震之六爻初九獨吉艮之六爻上九獨吉也震九四在上卦之下艮九三在下卦之上亦成卦之主而皆不吉者震九四下溺於二隂艮九三上牽於二隂不得以成震艮之用故也艮下巽上漸女歸吉利貞漸漸進也為卦止於下而巽於上為不遽進之義有女歸之象焉又自二至五位皆得正故其占為女歸吉而又戒以利貞也集疏程子曰乾坤變而為巽艮巽艮重而為漸即漸體而言中二爻交也由二爻之交而後男女各得其正位也天下之事進必以漸者莫如女歸故以女歸為義泉峰龔氏曰漸由否變三往居四彖傳謂進得位進以正者主六四而言故為女歸之吉初六鴻漸于干小子厲有言無咎鴻之行有序而進有漸干水涯也始進於下未得所安而上復無應故其象如此而其占則為小子厲雖有言而於義則無咎也集疏郭氏曰易以象言之則一卦一爻之內天地萬物無不具焉聖人或取諸身或取諸物獨舉其一以明之耳如艮則取諸身漸則取諸鴻非艮之象不在物漸之象不在人也故卦言女歸爻言鴻漸無嫌於不同也世之論象者率拘於説卦已言之象其所不言者不能明也況六十四卦之象古人未嘗明言之且震為龍而乾稱龍乾為馬而坤稱馬坤為牛而離稱牛皆非説卦之象八卦無鴻而漸稱鴻故知易之取象天地萬物無不具聖人不能盡言姑舉八卦之略使後但知所謂象者如此貴乎觸類而長之蔡氏曰小子幼稚也柔居初故稱小子愚案鴻之飛也一舉千里然其始舉也必有漸故以鴻漸為象詩伐檀置之河之干兮則知於水涯也近互坎故云小子艮少男象六二鴻漸于磐飲食衎衎吉磐大石也漸逺於水進于磐而益安矣衎衎和樂意六二柔順中正進以其漸而上有九五之應故其象如此而占則吉也集疏易氏曰自干而磐磐大石也漸逺於水安且固之地故言飲食衎衎愚案干磐陸皆取互體坎象而二又取坎飲食之義也九三鴻漸于陸夫征不復婦孕不育凶利禦寇鴻水鳥陸非所安也九三過剛不中而無應故其象如此而其占夫征則不復婦孕則不育凶莫甚焉然以其過剛也故利禦寇集疏郭氏曰髙平曰陸自水涯而至於陸進之甚逺故有夫征不復之象進而比四非其正也故曰婦孕不育凶語録曰九三雖不好夫征不復婦孕不育却利禦寇今術家擇日利婚姻底日不宜用兵利相戰底日不宜婚姻正是此意蓋用兵則要相殺相勝婚姻則要和合用則不同也潘氏曰三之進已髙剛躁之心征行未已不可復反四非應而犯之雖孕不育也泉峰龔氏曰夫坎男象婦巽女象愚案寇坎象坎為寇盜艮一陽限二隂於內有禦寇之象故蒙上九利禦寇豫重門擊柝義皆取此也六四鴻漸于木或得其桷無咎鴻不木棲桷平柯也或得平柯則可以安矣六四乘剛而順巽故其象如此占者如之則無咎也集疏程子曰鴻趾連不能握枝故不木棲桷橫平柯也惟平柯之上乃能安處謂四之處本危或能自得安寧之道則無咎易氏曰四進居巽體巽為木而在艮山之上故言鴻漸于木泉峰龔氏曰六四乘剛處非所宜鴻漸于木也入於巽體位得其當或得其桷也故曰無咎九五鴻漸于陵婦三嵗不孕終莫之勝吉陵髙阜也九五居尊六二正應在下而為三四所隔然終不能奪其正也故其象如此而占者如是則吉也集疏程子曰三比四四比五皆隔其交者也未能即合故三嵗不孕然中正之道有必亨之理不正者豈能害之故終莫之能勝但其合有漸耳終得吉也丘氏曰三四相比以情合也雖非夫而孕是以不育二五相應以理合也特為三四所間是以久而不孕也上九鴻漸于陸其羽可用為儀吉胡氏程氏皆云陸當作逵謂雲路也今以韻讀之良是儀羽旄旌纛之飾也上九至髙出乎人位之外而其羽毛可用以為儀飾位雖極髙而不為無用之象故其占為如是則吉也集疏郭氏曰漸之六爻其辭皆聲音相協故初則千言二則磐衎三則陸復育四則木桷五則陵孕勝羽如此則上九為逵儀明矣泉峰龔氏曰鴻漸于逵其可用為儀猶君子進居髙位其德行可為民之儀表也漸進之吉蔑加於此矣總論丘氏曰漸六爻皆以鴻為象初言于干進之始也二于磐三于陸四于木五于陵六于逵其進有漸以至於極逵在天位之外進之極也又卦以女歸為義故中四爻有夫婦之象五與二應夫婦之正配也故曰婦三嵗不孕終莫之勝吉三與四比矣婦之邪匹故曰婦孕不育兊下震上歸妹征凶無攸利婦人謂嫁曰歸妹少女也兊以少女而從震之長男而其情又為以説而動皆非正也故卦為歸妹而卦之諸爻自二至五皆不得正三五又皆以柔乘剛故其占征凶而無所利也集疏程子曰以説而動動而不當故凶如卦之義不特女歸無所往而利矣初九歸妹以娣跛能履征吉初九居下而無正應故為娣象然陽剛在女子為賢正之德但為娣之賤僅能承助其君而已故又為跛能履之象而其占則征吉也集疏郭氏曰初在下賤者之位也上無正應自無所歸娣之象也釋褐楊氏曰初九居下卦之下娣之義也九二居下卦之中嫡之義也六五居上卦之中夫之象也以二從五為嫡從夫以初從二為娣從嫡蔡氏曰娣女弟謂媵屬也無應不行故跛居位得當而承二故能履適二而媵乎五得妹之正也故征吉丘氏曰卦辭言歸妹征凶者蓋歸妹以説而動故征則凶初九歸妹以娣反言征吉者蓋初九以娣承君故征則吉也愚案初二皆陽初與二並行而在下故曰娣無應故有跛象以剛得位而從乎二能履也能履故征行吉九二眇能視利幽人之貞眇能視承上爻而言九二陽剛得中女之賢也上有正應而反隂柔不正乃女賢而配不良不能大成內助之功故為眇能視之象而其占則利幽人之貞也幽人亦抱道守正而不偶者也集疏丘氏曰歸妹以九二應六五有妻從夫之象以初承九二有娣從嫡之象新安胡氏曰初二跛眇兊毁折象履卦六三亦兊體故取象同愚案初曰跛能履者未中也二曰眇能視者未正也跛能履者不足以行道而娣相承則為吉眇能視者不足以明道而利於守幽人之貞也又九二有賢淑之德而偶不良之配不能成內助之功如眇能視而不及逺然夫雖不夫而婦不可以不婦以幽靜自居確守貞道而已六三歸妹以須反歸以娣六三隂柔而不中正又為説之主女之不正人莫之取者也故為未得所適而反歸為娣之象或曰須女之賤者集疏程子曰三居下之上本非賤者以失德而無正應故欲有歸而未得其歸須待也待者未有所適也六居三不當位德不正也為説之主以説求歸動非禮也上無應無受之者也女子之處如是人誰取之不可以為人配矣故反歸以娣以不正而失其所也愚案三為兊女之主而無應歸妹以須也居不正之位體趨下之性下從於二之嫡是反歸以為之娣也九四歸妹愆期遲歸有時九四以陽居上體而無正應賢女不輕從人而愆期以待所歸之象正與六三相反集疏程子曰四女居貴髙之地有賢德者也過時未歸故云愆期愆期非不售也有待而行也故云遲歸有時新安胡氏曰三為説主四為動主四男而三女彖傳所謂説以動所歸妹是也今爻辭四亦以女言至於二稱賢女而以五為不良之配則二女而五男也至五稱帝女以下嫁於二則五爻為女而二爻為男矣其不可為典要如此六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉六五柔中居尊下應九二尚德而不貴飾故為帝女下嫁而服不盛之象然女德之盛無以加此故又為月幾望之象而占者如之則吉也集疏程子曰易中隂尊而謙降者則曰帝乙歸妹泰六五與此爻是也貴女之歸惟謙降以從禮乃尊髙之德也不事容飾以恱人也娣媵者以容飾為事者也月望隂之盈也盈則敵陽矣幾望未至於盈也五之貴髙不至於盈極則不亢其夫乃為吉也女處尊貴之道也泉峰龔氏曰歸妹卦變由泰而來歸妹之五即泰之六五也故皆有帝乙歸妹之象上六女承筐無實士刲羊無血無攸利上六以隂柔居歸妹之終而無應約婚而不終者也故其象如此而於占為無所利也集疏丘氏曰女指應爻言下卦兊少女也士指本爻言上卦震長男也震體上虛有筐象而三承之承筐也兊體在下有羊象而上應之刲羊也二爻皆隂虛無應故有無實無血之象新安胡氏曰刲羊者士之功承筐者女之職上六不言夫婦而言士女者未成夫婦之禮約婚而不終其事者也總論程子曰卦有男女配合者四咸恆漸歸妹也咸恆夫婦之道漸歸妹女歸之義也丘氏曰卦以少女從長男歸妹之象也以六爻言之五言帝乙於歸妹之上歸妹之主也二不言歸妹正妹之身也初三稱娣於歸妹之下乃妹之娣媵四居上無應則為歸妹之愆期上隂處一卦之極則言夫婦之不終而不言歸妹也愚案上卦震體九四陽也而初以陽應之不得為正偶故為娣之象上六隂也而三以隂應之故亦為娣之象然上六言無實無血而四言歸妹愆期者九四歸妹之主也由六爻而論四為歸妹之主二五得歸妹之正偶初三以非應故皆為娣而上六則不昏之男不嫁之女矣離下震上豐亨王假之勿憂冝日中豐大也以明而動盛大之勢也故其占有亨道焉然王者至此盛極當衰則又有憂道焉聖人以為徒憂無益但能守常不至於過盛則可矣故戒以勿憂宜日中也集疏郭氏曰豐者盛大之名盛大所以亨然物極盛大者憂必將至日過中則昃豐過盛則衰聖人欲持滿以中故言宜日中語録問此卦後面爻不甚好曰是忒豐大了這物事盛極去不得了必衰人君於此時當如奉盤水戰兢自持方無傾倒滿溢之患若才有纎毫驕矜自滿之心即敗矣所以此處極難紹聖中羣臣創為豐亨豫大之説當時某論某人曰當豐亨豫大之時而為因陋就簡之説君臣上下動以藉口於是安意肆志無所不為而大禍起矣初九遇其配主雖旬無咎往有尚配主謂四旬均也謂皆陽也當豐之時明動相資故初九之遇九四雖皆陽剛而其占如此也集疏程子曰初九明之初九四動之初宜相須以為用故雖均而相應位則相應用則相資故初謂四為配主易氏曰初與四本非正應而謂四為配主者同德相求故也四為配主亦謂初為夷主夷等也配偶也遇上為配遇下為夷上下二爻明與動相須莫適為尊卑故皆以主為言鄭本以旬為均旬古均字丘氏曰凡卦爻多論隂陽正應惟豐以明動相資成卦者也故不論正應而以兩剛相遇為同德是以初四兩爻體雖均而無咎六二豐其蔀日中見斗往得疑疾有孚發若吉六二居豐之時為離之主至明者也而上應六五之柔暗故為豐蔀見斗之象蔀障蔽也大其障蔽故日中而昏也往而從之則昏暗之主必反見疑惟在積其誠意以感發之則吉戒占者宜如是也虛中有孚之象集疏程子曰二當豐大之時乃遇柔暗之主猶日中盛明之時乃見斗也徐氏曰卦言宜日中以下體言之則二為中以一卦言之則三四為中故二三四皆言日中剛生明故初應四則為往有尚柔生暗故二應五為往得疑􅔂也愚案初九之往以明遇明故往則有尚六二之往以幽見幽故往得疑疾惟六二柔順中正能積其誠意以感發之則在上者不疑不疾而可獲吉也盡吾之誠意而疑疾焉吉凶非所論矣九三豐其沛日中見沫折其右肱無咎沛一作斾謂幡幔也其蔽甚於蔀矣沫小星也三處明極而應上六雖不可用而非咎也故其象占如此集疏程子曰三居明體之上陽剛得正本能明者也而反暗於四者所應暗故也易氏曰人之一身有左有右左不如右之力折右肱則不可用其過在上六非二四之咎也互兊有毁折象故曰折其右肱泉峰龔氏曰豐沛甚於豐蔀見沫甚於見斗二應五四承五五暗為未甚故但豐蔀而見斗三應上上居暗極故又為豐沛而見沫也九四豐其蔀日中見斗遇其夷主吉象與六二同夷等夷也謂初九也其占為當豐而遇暗主下就同德則吉也集疏程子曰四雖陽剛為動之主得大臣之位然以不中正遇隂暗柔弱之主故為豐其蔀日中見斗當盛明之時反昏暗也夷主其等也初四皆陽是其同德又居相應之地故為夷主易氏曰四言豐其蔀日中見斗與六二同象二以重隂無應而得中居正故有孚發若吉四不中正本無致吉之理惟遇初為夷主初亦遇四為配主二者均為陽剛而四之下行從初得明動相資之義所以吉也六五來章有慶譽吉質雖柔暗若能來致天下之明則有慶譽而吉矣蓋因其柔暗而設此以開之占者能如是則如其占矣集疏郭氏曰處豐之世以無所豐為大故六爻之中稱豐者皆無善道六五不言豐猶為可尚也徐氏曰二居文明之中有章美之才者也以六五柔中之君來六二中正之臣資其開導之益則有慶且有譽矣二五同德相照得處豐之道故吉丘氏曰二以五為蔀在上而暗也五以二為章在下而明也二言往從五之君也五言來致二之臣也二之應五未信則不可往往則反招其疑惟積誠以感之然後五之蔽可開故曰有孚發若吉此人臣事暗君之訓也六五隂暗在上處豐之時本無慶譽以下有文明之臣可以輔已若屈意下之資人之明以為明則不惟有慶譽而且得吉也此暗主用臣之訓也上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶以隂柔居豐極處動終明極而反暗者也故為豐大其屋而反以自蔽之象無人不覿亦言障蔽之深其凶甚矣集疏郭氏曰屋之覆障非特蔀而已見斗見沫猶有見焉三嵗不覿其凶甚矣泉峰龔氏曰豐卦辭以盛大為義豐之吉者也在爻辭皆有豐蔀之象豐之不吉者也蓋卦取明動相資故為盛大之義爻取二隂在上故為蔀蔽之義此所以卦辭之豐為吉而爻辭之豐皆不吉也又豐卦與明夷相似惟變了九四一爻豐其蔀蔽皆六五上六二隂所為二豐其蔀以五為應也三豐其沛以上為應也四豐其蔀以承五也然五雖柔暗以其得中故可采來章之吉上居豐極始則蔽人之明終則反以自蔽與明夷上六相似愚案豐六爻以不應為善初四皆陽初曰遇其配主四曰遇其夷主二五皆隂二曰有孚發若吉五曰來章有慶譽吉三與上為正應三不免於折肱而上則甚凶當豐大之時以明動相資同德相輔為善不取隂陽之應也況上六爻居豐極必變之時其凶必矣此日中則昃盛極必衰理勢所然艮下離上旅小亨旅貞吉旅羈旅也山止於下火炎於上為去其所止而不處之象故為旅以六五得中於外而順乎上下之二陽艮止而離麗於明故其占可以小亨而能守其旅之貞則吉旅非常居若可苟者然道無不在故自有其正不可須臾離也集疏徐氏曰小亨謂五柔居尊位小者亨也愚案旅小亨之旅言卦象旅貞吉指人事而言旅必有正道旅而不以貞則將無所不為矣初六旅瑣瑣斯其所取災當旅之時以隂柔居下位故其象占如此集疏程子曰初以隂處下是柔弱卑賤之人既處旅困而鄙猥瑣細無所不至此其所以取災咎也愚謂君子窮不失義則雖失其所而為旅未嘗以利纍其心小人則窮斯濫矣此初六之旅瑣瑣所以有取災之道也六二旅即次懷其資得童僕貞即次則安懷資則裕得其童僕之貞信則無欺而有賴旅之最吉者也二有柔順中正之德故其象占如此集疏張子曰居得位即次之義下有一隂得童僕也郭氏曰旅幾於困者也不得其次不得其資不得其助則困矣今即其次懷其資又得童僕之助則處旅之善者也六二柔順中正故其善如此九三旅焚其次喪其童僕貞厲過剛不中居下之上故其象占如此喪其童僕則不止於失其心矣故貞字連下句為義集疏程子曰三過剛自髙致災困之道也自髙則不順於上過剛則暴於下故上不與而焚其次下離而喪其童僕也徐氏曰三位髙而近離有焚象童僕初也初為二所得故三喪其童僕潘氏曰居剛而用剛平時猶不可況旅乎焚次喪僕固其宜也九三以剛居下卦之上則焚次上九以剛居上卦之上則焚巢位愈髙剛愈亢則禍愈深矣丘氏曰九三爻辭全與二反二柔順得中三過剛不中故也愚案九三以陽居陽非不正然至於焚且喪者處旅之時當以柔順乎剛九三剛過而不中在下而無應上同乎陽則為離火所傷下連初隂則為二所隔是焚其次喪其童僕之義也如是雖貞亦厲矣九四旅于處得其資斧我心不快以陽居隂處上之下用柔能下故其象占如此然非其正位又上無陽剛之與下惟隂柔之應故其心有所不快也集疏程子曰四陽剛雖不中而處上體之下有用柔能下之象得旅之宜也然非正位故雖得其處止不若二之就次舍也語録曰資斧有做齎斧説底資斧在離上説也自分曉然旅中不可無備禦底物事這便是易氏曰離為兵戈故有斧象蔡氏曰資財也斧利器也徐氏曰才剛得其資斧也六五射雉一矢亡終以譽命雉文明之物離之象也六五柔順文明又得中道為離之主故得此爻者為射雉之象雖不無亡矢之費而所喪不多終有譽命也集疏程子曰五君位也人君無旅旅則失位故不取君義語録曰易中凡言終吉皆是初不甚好張氏曰旅上體本乾六自三升五變乾爻而成離射雉也乾陽剛直三矢之象去其中之一是一矢亡也亡一矢而得雉為所喪不多而終有所獲之象終以譽命獲乎上也愚案雉者文明之物矢可射而致之射之在我者不敢廢而一矢亡在時者不可必然所亡者一矢而雉終可得也故曰終以譽命上九鳥焚其巢旅人先笑後號咷喪牛于易凶上九過剛處旅之上離之極驕而不順凶之道也故其象占如此集疏程子曰上九剛不中而處最髙又離體其亢可知在旅之時而過剛自髙失其所安宜矣巢鳥所安止焚其巢失其所安止也在離上為焚象陽剛自處以至髙始快其意故先笑既而失其所故號咷牛順物喪牛于易謂忽易以失其順也徐氏曰上位極髙為巢之象牛亦離象旅貴柔順中正三陽爻皆失之而最亢者上九也總論泉峰龔氏曰處旅之道不宜過剛過剛非所以處旅也故二以柔順中正而最吉五以柔順得中次之九三則過剛而厲上九則過剛而凶九四以陽居隂剛而能柔雖不及二五之吉而賢於九三上九矣蓋旅雖貴乎柔順又貴得中若初之瑣瑣又反過於柔弱卑下此其所以取災也愚案旅之得名以火在山上去其所處而不復之象故諸爻多以得喪為言二曰得其童僕三曰喪其童僕四曰得其資斧五曰矢亡上曰喪牛而又有即次焚次焚巢之異旅非人之所得已也與巽下巽上巽小亨利有攸往利見大人巽入也一隂伏於二陽之下其性能巽以入也其象為風亦取入義隂為主故其占為小亨以隂從陽故又利有所往然必知所從乃得其正故又曰利見大人也集疏蔡氏曰利見大人剛居二五也愚案巽順也入也惟其能巽順以入故利有攸往惟其能順乎陽剛故利見大人初六進退利武人之貞初六以隂居下為巽之主卑巽之過故為進退不果之象若以武人之貞處之則有以濟其所不及而得所宜矣集疏易氏曰初在下卦之下退則無據進則無應欲進欲退猶豫不決必濟之以剛乃得其宜故曰利武人之貞九二巽在牀下用史巫紛若吉無咎二以陽處隂而居下有不安之意然當巽之時不厭其卑而二又居中不至已甚故其占為能過於巽而丁寧煩悉其辭以自道逹則可以吉而無咎亦竭誠意以祭祀之吉占也集疏泉峰龔氏曰九二以陽居隂而得中夲能巽者也但當巽時九五以陽剛中正居尊位而已以陽剛應之若未能盡巽順之道者故必深自謙抑而又丁寧煩悉以道逹誠意於其上乃可以吉而無咎故曰巽在牀下用史巫紛若夫巽在牀下非自屈也史巫紛若非為諂也必如是而後盡巽順之道耳愚案祝史道人之意以達於神明巫以鬼神之意告於人史巫紛若則卑巽之意逹於上下此九二之巽在牀下過於卑巽以其誠意感動九五而已九三頻巽吝過剛不中居下之上非能巽者勉為屢失吝之道也故其象占如此集疏語録曰頻巽不比頻復復是好事所以頻復為無咎巽不是大段好底事九三别無伎倆只管今日巽了明日又巽自是可吝蔡氏曰爻位皆剛勉強為巽者屢巽屢否豈不可吝泉峰龔氏曰頻巽與頻復相似頻復則厲而無咎頻巽則終於吝者復是反於善屢失屢復雖非不二過之意要亦不害其為反於善也故雖厲而無咎巽則不過卑巽而已屢失屢巽出於勉強適足著不恆之羞是則可吝也此其所以不同愚案巽貴得中卑則諂過則煩九三處下之上居巽之中而上巽繼之故曰頻巽巽而至於頻數吝之道也又案語録與本義及蔡氏之説不同當從語録頻巽只是頻數卑巽自是可吝却未見屢失屢否意六四悔亡田獲三品隂柔無應承乘皆剛宜有悔也而以隂居隂處上之下故得悔亡而又為卜田之吉占也三品者一為乾豆一為賔客一以充庖集疏黃氏宗台曰巽以初與四為主初進退而四有獲者初在下卦隱伏太甚四在上卦位得其當故也泉峰龔氏曰田獲三品取互體離象離為網罟佃漁也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉九五剛健中正而居巽體故有悔以有貞而吉也故得亡其悔而無不利有悔是無初也亡之是有終也庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後有所變更而得此占者如是則吉也集疏程子曰先甲三日以窮其所以然而處其事後甲三日以究其將然而為之防甲者事之始也庚者有所革也程子曰甲者事之端庚者事之變也十干戊己為中過中則變故謂之庚語録曰蠱之先甲三日是辛後甲三日是丁此卦先庚三日是丁丁與辛皆是古人祭祀之日但癸日不見用處愚案蠱言先甲後甲當是積弊之餘而取造始之意巽言先庚後庚是當申命之時而取更變之意庚以甲為對甲者事之始故蠱有先甲後甲之説庚者變之始故巽有先庚後庚之説甲言於蠱卦辭通論一卦之大體者也庚言於巽九五之爻辭九五巽之主重巽以申命者與上九巽在牀下喪其資斧貞凶巽在牀下過於巽者也喪其資斧失所以斷也如是則雖貞亦凶矣居巽之極失其陽剛之德故其象占如此集疏程子曰上九陽剛本有斷以過巽而失其剛斷居上而過巽至於自失在正道則為凶也易氏曰牀在身下而反在牀下過於巽矣上九與九二巽之又巽者也故皆為巽在牀下之象泉峰龔氏曰二爻皆巽在牀下皆過於巽者在九二則為吉在上九則為凶者九二居巽之時以剛應剛疑於亢者上九居巽之極過自卑屈是謂喪其陽剛之德夫巽在牀下一也九二必如是乃能自盡上九而如是則為自失時位不同吉凶所以異也總論泉峰龔氏曰巽貴得中過與不及皆非巽之善者也故二五皆以中而獲吉三重剛不中不及乎巽者也故吝上九巽極過乎巽者也故凶初與四位皆不中初居下卦之下卑巽太甚故為進退之象四居上卦之下位得其正故悔亡而有獲然亦不能如二五之吉也兑下兑上兑亨利貞兊説也一隂進乎二陽之上喜之見乎外也其象為澤取其説萬物又取坎水而塞其下流之象卦體剛中而柔外剛中故説而亨柔外故利於貞蓋説有亨道而其妄説不可以不戒故其占如此又柔外故為説亨剛中故利於貞亦一義也集疏程子曰兊説也説致亨之道也能説於物物莫不説而與之是以致亨然為説之道利於貞正非道求説則為邪媚而有悔咎矣故戒利貞也丘氏曰三女之卦聖人多以貞戒之離曰利亨貞巽曰利貞兊曰亨利貞三男之卦則不言貞震曰亨坎曰心亨艮曰艮其背而已蓋陽剛為能有立若夫隂柔多病於不正故也初九和兑吉以陽爻居説體而處最下又無係應故其象占如此集疏泉峰龔氏曰初居説體在內無應説在心而無所私係者也發而中節故謂之和其吉宜矣愚案語曰君子和而不同小人同而不和晏子曰和如和羮同如濟水此初九之和兊得待小人之道也其吉宜矣九二孚兑吉悔亡剛中為孚居隂為悔占者以孚而説則吉而悔亡矣集疏程子曰二承比隂柔宜有悔矣以其有剛中之德孚信內充雖比小人自守不失故吉而悔亡非二之剛中則有悔矣泉峰龔氏曰九二陽剛得中當説之時以孚信為説者也已以孚信為説人不得而妄説之所以吉也愚案九二中實誠以接物人莫之欺彼此相説而無非道之失所以悔亡也六三來兑凶隂柔不中正為兑之主上無所應而反來就二陽以求説凶之道也集疏程子曰六三隂柔不中之人説不以道者也來兊就之以求説者也比於在下之陽非道就之以求説所以凶也之內為來上下俱陽而獨之內者以同體而隂性下也愚案六三居位不當居上下二兊之間下兊方終上兊又來以求説焉説而又説不得其正者也故上六曰引兊蓋與六三相表裏彼得其位故不言凶咎九四商兑未寧介疾有喜四上承九五之中正而下比六三之柔邪故不能決而商度所説未能有定然質夲陽剛故能介然守正而疾惡柔邪也如此則有喜矣象占如此為戒深矣集疏徐氏曰兩間謂之介分限也人有節守亦謂之介商兊未寧正理欲公私界限處不可不審所從也聖人以介疾有喜言之所以開示正道隄防邪心其意亦切矣九五孚于剝有厲剝謂隂能剝陽者也九五陽剛中正然當説之時而居尊位密近上六上六隂柔為説之主處説之極能妄説以剝陽者也故其占但戒以信於上六則有危也集疏語録曰比上之柔二五所同獨戒五者五君位也徐氏曰上六處説之極無他係應惟附五以求説也五位雖正上柔親附説而信之必至剝剛故曰孚于剝愚案九五中實孚于上下者也但孚于上六則有厲為兊之主而不言兊居位之正以孚信從事所謂説之不以道不説者也上六引兑上六成説之主以隂居説之極引下二陽相與為説而不能必其從也故九五當戒而此爻不言其吉凶集疏易氏曰兑之成卦在上與三三下從二陽故曰來上引二陽進於上故曰引總論釋褐楊氏曰兊以義為説而主在二隂爻惟初九與隂逺獨為和兊諸爻皆近隂者故二有悔四未寧五孚剝然陽性能剛隂之説不能終陷之故有悔而能亡四介疾而有喜五僅厲而已矣易氏曰初二四五陽剛在各卦之內六三上六隂柔在各卦之外隂柔在外兊説之小人也故六三下就二陽以求説上六下引二陽以為説三上之為説一也三言凶者隂居陽位不得其正上不言凶者隂居隂位猶近於正者也泉峰龔氏曰兊本以説之見乎外而得名然六爻之義皆不取乎説之徇乎外者也初居內卦之內故為最吉二居內卦之中故次之三居內卦之外則為凶矣四居外卦之內故商兊而喜五居外卦之中則孚剝而有厲上居外卦之外則為引兊雖不言凶而亦不可以為吉人之所説苟能不徇乎外則其見於外者斯得其正而吉矣坎下巽上渙亨王假有廟利涉大川利貞渙散也為卦下坎上巽風行水上離披解散之象故為渙其變則本自漸卦九來居二而得中六往居三得九之位而上同於四故其占可亨又以祖考之精神既散故王者當至於廟以聚之又以巽木坎水舟楫之象故利涉大川其曰利貞則占者之深戒也集疏朱氏曰渙否九四之變也九二之剛自四而來六四之柔自二而往正位乎外而上同乎五也丘氏曰卦變三剛三柔各以類聚今散四之剛而下居於二散二之柔而上居於四亦渙之義泉峰龔氏曰朱氏卦變之説甚得本旨諸卦彖傳言卦變者皆當以此例之愚案渙與解同而義異解者難之始解渙者難之已散解猶有獲狐射隼等事已散而渙天下無所事矣初六用拯馬壯吉居卦之初渙之始也始渙而拯之為力既易又有壯馬其吉可知初六非有濟渙之才但能順乎九二故其象占如此集疏程子曰六爻獨初不言渙者離散之時辨之宜早方渙始而拯之則不至於渙也馬謂二也初隂柔順而託於九二剛中之才以拯其渙如得壯馬以致逺必有濟矣故吉李氏曰凡柔弱處險難者必上有剛健之才拯之方可出險明夷六二與此爻是也新安胡氏曰馬坎象明夷二至四亦有坎體故其象同愚謂九二以剛在下健而能行馬壯之象也初六上比於二用拯之象也坎為馬互震亦為馬九二渙奔其機悔亡九而居二宜有悔也然當渙之時來而不窮能亡其悔者也故其象占如此蓋九奔而二機也集疏郭氏曰九二之剛自外來而得中得去危就安之意故有奔其機之象語録曰九二渙奔其機以人事言之是來就安處泉峰龔氏曰彖傳曰剛來而不窮謂渙自否來九四之陽下居於二也四危地也下居於二則安矣故有奔其機之象奔者來之急謂九也機在下而憑之以安謂二也二居中而安故以機為象愚謂九二奔其機是自四而來猶隔三故曰奔六四之渙其羣是自二而來亦渙其否塞小人之私羣也六三渙其躬無悔隂柔而不中正有私於已之象也然居得陽位志在濟時能散其私以得無悔故其占如此大率此上四爻皆因渙以濟渙者也集疏程子曰悔亡者本有悔而得亡無悔者本無也易氏曰卦分三才三與四為人位在外體者人也在內體者已也三在內體故為渙其躬愚案躬身也身豈可渙也渙其躬渙其己身之私也正己以正人也所以無悔本義之説得之矣六四渙其羣元吉渙有丘匪夷所思居隂得正上承九五當濟渙之任者也下無應與為能散其朋黨之象占者如是則大善而吉又言能散其小羣以成大羣使所散者聚而若丘則非常人思慮之所及也集疏語録曰老蘇云渙之六四曰渙其羣元吉夫羣者聖人之所欲渙以混一天下者也蓋六四能渙小人之私羣成天下之公道此所以元吉也是説渙了小小底羣隊并做一箇東坡所謂合小以成大大以為一皆是渙其羣渙有丘之義徐氏曰羣同類也丘聚之髙也夷等夷也四夲居二與初三皆柔同類而等夷者也今柔進居四散其同類之私羣而上聚乎五故元吉渙下聚上渙有丘也匪夷所思言非二柔思慮之所及也丘氏曰丘聚之大者謂九五下連二爻為互艮艮為山丘也四上連五是渙散中而得所聚之大故曰渙有丘不溺於在下之私黨而上附於陽明之主所散者小所聚者大濟渙之功莫盛於此泉峰龔氏曰彖傳曰柔得位而上同謂渙自否來六二之柔進居於四而上同於五也二去初三同類之柔而進居於四渙其羣也得位而上同於五渙有丘也易中卦變惟此二爻為明白以類推之可也愚案隂陽各以其類聚則否下卦三隂為羣以為私黨害於其上者也今九四下而得中六二上而同五是各散其羣以歸於一而宗乎九五也然則渙也乃所以聚也九五渙汗其大號渙王居無咎陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而無咎矣故其象占如此九五巽體有號令之象汗謂如汗之出而不反也渙王居如陸贄所謂散小儲而成大儲之意集疏程子曰五以剛中正為治渙之主當使號令洽於人心如人身之汗浹於四體則信服而從矣如是則可以為渙之主居正位為稱而無咎再言渙者上謂渙之時下謂處渙如是則無咎也語録曰號令所當散如汗出千毛萬竅中迸散出來這箇物事出不會反却不是説那號令之出不當反只是取其如汗之散出自有不反底意思愚案當天下渙散之時人思其主須人君發號施令正位乎上使人心知所歸向而天下一矣故曰王居無咎而象亦曰正位也此與萃有位之義同本義以渙王居為渙其居積然當渙散之時必有為渙之主者所當從小象正位之説上九渙其血去逖出無咎上九以陽居渙極能出乎渙故其象占如此血謂傷害逖當作惕與小畜六四同言渙其血則去渙其惕則出也集疏程子曰渙之諸爻皆無係應亦渙離之象惟上與三應三居險陷之極上若下從於彼則不能出於渙矣然上以陽剛處渙之外有出渙之象故云血去逖出無咎潘氏曰處渙之外避害逺去血去避害也逖出逺去也愚案上九下應於坎坎為血卦是當渙之時渙其坎難者也居卦之外逺害憂惕於義為無咎矣總論語録曰渙卦以大意看則人所當渙者莫甚於已私其次便渙散他羣隊合以成大其次便渙散其號令與其居積其次便渙去患害蔡氏曰以成卦言之則在二與四以治渙言之則惟四與五當位故四能渙其羣而上同五能渙其居積與其號令所以濟渙也初與二救渙者也三則自治上則逺害而己溪邊熊氏曰渙散也言能散失險難也天下之難非陽剛得位則莫能濟故其難之散也則為渙及其下皆順從也則為萃渙之言亨者一而萃則再言之渙言利者二而萃則三言之渙言王假有廟萃亦言王假有廟而加以用大牲之辭以是知天下之難渙而後能萃也兊下坎上節亨苦節不可貞節有限而止也為卦下兊上坎澤上有水其容有限故為節節固自有亨道矣又其體隂陽各半而二五皆陽故其占得亨然至於太甚則苦矣故又戒以不可守以為貞也集疏程子曰事有節則能致亨道故節有亨義節貴適中過則苦矣節至於苦豈能常也故不可貞愚案節渙之反泰之變也泰分九三之五以節其上之柔分六五之三以節其下之剛三剛三柔分而有節天下之理惟過則有節不及則無節也節者約泰侈以歸於中道也節則裕矣裕則通故亨節而至於太過又非中道故苦節不可守以為貞初九不出户庭無咎户庭户外之庭也陽剛得正居節之初未可以行能節而止者也故其象占如此集疏耿氏曰剛實在前塞而不通初九乃退藏不出知出處之節也故無咎李氏曰陽竒在前故為户隂偶在前故稱門丘氏曰初四有應宜出者也然前有陽爻蔽塞一不可出也四為坎體應則入於坎窞二不可出也剛在下而無位三不可出也愚案節六爻惟初九為有應而曰不出户庭無咎者所以節之也不知所節則出入無時而失慎密之道當出而出當止而止時行時止在我而已初不係於有應無應此象之所以言知通塞也九二不出門庭凶門庭門內之庭也九二當可行之時而失剛不正上無應與知節而不知通故其象占如此集疏語録問節之過雖非中道然亦愈於不節者如何便會凶曰這處便局定不得若以占言之自有相應處眼下皆未見得若以道理言之則有可為之時乃不出而為之這便是凶之道不是别更有凶又曰時乎時乎不再來如何可失户庭見初爻之象門庭見第二爻之象耿氏曰隂虛在前無隔塞之患可以出矣不出門庭則失時中之義劉氏曰初出而遇九二之剛則適時之塞而不可出者也二出而遇三四之柔則適時之通而可出者也初以不出户庭為知塞二以不出門庭為不知通知塞故無咎不知通則有失時之凶丘氏曰通塞在時出處在已初未得位前遇剛塞故不出則無咎二得中位且無窒塞而亦不知出焉此其所以為凶與愚案九二上有同德前無窒塞可以出矣而不出門庭以取凶咎豈非無妄之災與失時中之義故也占者出而有為尚可反凶為吉六三不節若則嗟若無咎隂柔而不中正以當節時非能節者故其象占如此集疏張子曰處非其位失節也然能嗟其不節則亦無咎矣蔡氏曰柔居説體故不能節既嗟何咎六故不能節三故能嗟徐氏曰三柔不中正而處説極不知節者也説極則悲故曰不節若則嗟若愚案節之時當位以節六三居不當位過而不中失節之道而嗟若則無咎易以補過為善能自覺察者也六四安節亨柔順得正上承九五自然有節者也故其象占如此集疏程子曰四以隂居隂安於正也當位為有節象四非強節安於節者也故能亨節以安為善強守而不安則不能常豈能亨也語録曰安節是安穩自在愚案六四以性則靜以位則柔處節而不見其節者也不見其為節安而行之之事也惟其安所以亨九五甘節吉往有尚所謂當位以節中正以通者也故其象占如此集疏語録曰九五甘節與禮之用和為貴相似是不苦用力底意甘便是對那苦上六苦節貞凶悔亡居節之極故為苦節既處過極故雖得正而不免於凶然禮奢寧儉故雖有悔而終得亡之也集疏丘氏曰苦者甘之反五之節得中故甘上之節過中故苦甘苦之分中與不中而已矣泉峰龔氏曰節極則苦固守則凶知苦節之不可貞則能悔亡矣總論丘氏曰彖傳當位以節故節之六爻大率以當位為善不當位為不善初四五當位者也故五吉四亨初無咎二三不當位者也故二凶三嗟上當位而亦凶者以其當節之極居上之窮故其取義不同也若以兩爻相比者觀之又各相比而相反初與二比初不出户庭無咎二不出門庭凶二與初反也三與四比四柔得正為安節三柔不正為不節三與四反也五與上比五得中為甘節上過中為苦節上與五反也兊下巽上中孚豚魚吉利涉大川利貞孚信也為卦二隂在內四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實皆孚信之象也又下説以應上上巽以順下亦為孚義豚魚無知之物又木在澤上外實內虛皆舟楫之象至信可感豚魚涉險難而不可以失其貞故占者能致豚魚之應則吉而利涉大川又必利於貞也集疏程子曰內外皆實而中虛為中孚之象又二五皆陽而中實亦為孚義中虛信之本中實信之質又曰豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火況涉川乎守信之道在乎堅正故利於貞吉語録問孚字與信字想亦有别曰伊川云存於中為孚見於事為信説得極好因舉字説孚字從爪從子如鳥抱子象今之乳字一邉從孚蓋中所抱者實有物也中間實有物故人自信之徐氏曰鳥之孚卵皆如期不失信也月令注有孚乳之説泉峰龔氏曰利貞之説當以程子為正愚案中孚成卦上風下澤曰豚魚者澤中風起豚魚先出為之兆也豚魚出而風起於澤猶孚信之能先感人也此吳氏之説似亦可通然以彖傳信及豚魚之説推之當以程子司馬氏之説為正初九虞吉有他不燕當中孚之初上應六四能度其可信而信之則吉復有他焉則失其所以度之之正而不得其所安矣戒占者之辭也集疏泉峰龔氏曰虞度也初九當自度以為孚則吉若有他求則不安矣居中孚之初當自度未可以他求者也愚案初九孚之始也能虞度六四之可信而後從之則吉然六四有馬匹亡絶類上之辭是上承乎五不孚於已其志有他矣所以雖吉而有此不樂也比卦終來有他吉子憂傳曰非應稱他九二鳴鶴在隂其子和之我有好爵吾與爾靡之九二中孚之實而九五亦以中孚之實應之故有鶴鳴子和我爵爾靡之象鶴在陰謂九居二好爵謂得中靡與縻同言懿德人之所好故好爵雖我之所獨有而彼亦係戀之也集疏程子曰有孚於中物無不應誠同故也至誠感通之理非知道者誰能識之語録曰看來我有好爵吾與爾靡之是兩箇都要這物事所以鶴鳴子和是兩箇中心都愛所以相應如此童溪王氏曰中孚二五之爻義互相發蓋二與五以同德居相應之地分則君臣義則父子故五倡於上而下二和之有鶴鳴子和我爵爾靡之象泉峰龔氏曰本義諸説以鶴鳴謂二子和為五夫二之於五有君臣之分而子之爾之似均未安王氏之説亦有理因附於此愚案九二居內卦之中而謂鳴鶴在陰君子居室出言之象也其子和之千里應之之義也言出乎身加乎民行發乎邇見乎逺故九五雖非應亦至誠相與曰我有好爵吾與爾靡之曰我曰爾曰吾上下相忘誠信感通自然之應也王氏之説全指九五似亦未當再附此以俟知者六三得敵或鼓或罷或泣或歌敵謂上九信之窮者六三陰柔不中正上居説極而與之為應故不能自主而其象如此集疏程子曰三四皆以中虛為成孚之主然所處則異四得位居正故云匹而從上三不中失正故得敵以纍志而或鼓張或罷廢或悲泣或歌樂之無常也宋氏曰敵勢均而不相下者也艮象曰上下敵應子夏傳曰三與四為敵項氏曰三與四二陰之勢等故三稱敵四稱匹稱類三不正而躁不知自反而求孚於四進退悲喜其狀屢變而四與五相孚無復顧三之理中孚以中正相孚三皆無之故至於此泉峰龔氏曰鼓互體震動象罷鼓之反也歌兊説象泣歌之反也本義以得敵為上九似若未安宋項之説亦可采六四月幾望馬匹亡無咎六四居陰得正位近於君為月幾望之象馬匹謂初與己為匹四乃絶之而上以信於五故為馬匹亡之象占者如是則無咎也集疏徐氏曰月受日光望則與日對敵矣四柔近五有幾望之象馬已所乘者謂三新安胡氏曰自二至四有震故有馬象以三為馬正與小象辭合泉峰龔氏曰易言月幾望者三月幾望陰盛而將極也小畜以隂畜陽為義上九居巽體之終陰德將極如月之幾望則非陽剛之福故凶歸妹以女德為言六五以柔中居尊女德之盛無以加此如月之幾望故吉中孚以臣道為言六四居陰得正位近於五如月之幾望與日相應故無咎小畜之凶主陽而言也歸妹之吉中孚之無咎主陰而言此其所以不同馬匹亡當是主王而言故小象曰絶類上也九五有孚攣如無咎九五剛健中正中孚之實而居尊位為孚之主者也下應九二與之同德故其象占如此集疏程子曰五為君位人君之道當以至誠感通天下使天下之心信之其固結若拘攣然則無咎也丘氏曰諸爻不言孚而九五獨言有孚者非天下之至誠其孰能與於此新安胡氏曰三四中虛二五中實固皆有孚信之義然陽體實能有孚陰體虛不能有孚故二五有相孚之義三四則無取也泉峰龔氏曰易言有孚攣如者二在小畜之九五亦巽體也小畜之變為中孚只爭九三一爻故有孚攣如月幾望爻辭亦多同也愚案攣與靡同意義二言五靡之五言二攣之誠信感通固結而不可解中孚之至善者也上九翰音登于天貞凶居信之極而不知變雖得其貞亦凶道也故其象占如此雞曰翰音乃巽之象居巽之極為登于天雞非登天之物而欲登天信非所信而不知變亦猶是也集疏孔子曰上九處信之終若鳥之翰音登於天虛聲逺聞也易氏曰此所以為誠實不足聲聞過情者之戎泉峰龔氏曰孔氏之説與本義不同似若可從因附於此愚案上九居位不當處信之窮如鳥之飛登于天不見其形徒聞其虛聲其信不足憑也貞固守此凶之道矣總論易氏曰中孚成卦兊下巽上二陰以中虛而包於上下之四陽有中孚之象考之爻義初未中則為虞吉二得中則謂之縻爵三過中則謂之得敵此兊體必以中而後孚也四未中則幾望五得中則攣如上過中則貞凶此巽體亦以中而後孚也未中者猶可進過中則傷於極二者不同而善不善判焉丘氏曰中孚之彖柔在內而剛得中則剛中者成孚之象也在六爻以二五之剛為主故二言鶴鳴子和五言有孚攣如其交孚之實可見矣餘四爻或剛而不中或柔而不中非二五剛中之比故無相孚之實也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉小謂陰也為卦四隂在外二陽在內隂多於陽小者過也既過於陽可以亨矣然必利於守貞則又不可以不戒也卦之二五皆以柔而得中故可小事三四皆以剛失位而不中故不可大事卦體內實外虛如鳥之飛其聲下而不上故能致飛鳥遺音之應則宜下而大吉亦不可大事之類也集疏程子曰小過為小者過又為小事過又為過之小事有待過而後亨者故小過有亨義語録曰中孚有卵象小過有飛鳥象中間二畫是鳥腹上下四隂是鳥翼象鳥出乎卵此小過所以次中孚也蔡氏曰小過柔為主柔性下故宜下大吉萬氏曰小過雖為隂過於陽然初二在下猶順乎陽五上居上則逾逆矣蓋陽上隂下理之正也而五上反之失其道矣故戒之曰不宜上宜下大吉而彖傳亦曰上逆而下順也然則以一卦而統論則隂過而陽弗過以四隂而並論則下猶弗過而上愈過矣隂過之中亦有善惡之分抑揚之意焉本義以不宜上宜下大吉蒙上文飛鳥之義謂其飛上而不下似非本旨初六飛鳥以凶初六隂柔上應九四又居過時上而不下者也飛鳥遺音不宜上宜下故其象占如此郭璞洞林占得此者或致羽蟲之孽集疏耿氏曰大過至上乃凶小過在初已凶以應上而求進故也小過上逆下順今應上求進失宜下之義其凶宜矣泉峰龔氏曰大過卦辭以棟為象而三四兩爻亦以棟言小過卦辭以鳥為象而初上兩爻亦以鳥言大過陽過於中而三四又陽之中也小過隂過於外初上又隂之外也棟之成其用在中故大過於三四言棟鳥之飛其用在外故小過於初上言鳥諸卦爻辭與卦辭同者為成卦之主大過之過其主在中二陽小過之過其主在外二隂亦內陽外隂之義也六二過其祖遇其妣不及其君遇其臣無咎六二柔順中正進則過三四而遇六五是過陽而反遇隂也如此則不及六五而自得其分是不及其君而適遇其臣也皆過而不過守正得中之意無咎之道也故其象占如此集疏程子曰陽在上者父之象尊於父者祖之象四在三上故為祖五隂而尊祖妣之象也二與五居相應之地同有柔中之德志不從於三四故過四遇五是過其祖而遇妣也項氏曰二陽君也祖也而居下二隂臣也妣也而居上今二乃過三與四而應五故為過祖與君而遇妣與臣之象臣不可過其君故變文曰不及其君言不相值也其實相過矣愚案小過四隂皆過陽道也六二過陽而與六五遇以隂遇隂故但為遇其妣與臣而不遇其祖與君言妣與臣則凡天下之隂類皆在其中矣九三弗過防之從或戕之凶小過之時事每當過然後得中九三以剛居正衆隂所欲害者也而自恃其剛不肯過為之備故其象占如此若占者能過防之則可以免矣集疏語録曰弗過防之則是弗能過防之也四字只是一句至弗過遇之皆是兩字為絶句義不可曉新安胡氏曰弗過防之亦當兩字為絶句蓋小過乃隂過之時故二陽爻皆稱弗過是言陽弗能過也防之防隂也言弗能過之則當防之若不防而反從之則彼或得以戕我而凶矣二隂在下有上進之勢故當防泉峰龔氏曰胡氏過防之説與項氏易氏諸説同且與卦內過遇之例合所當從也九四無咎弗過遇之往厲必戒勿用永貞當過之時以剛處柔過乎恭矣無咎之道也弗過遇之言弗過於剛而適合其宜也往則過矣故有厲而當戒陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也或曰弗過遇之若以六二爻例則當如此説若以九三爻例則過遇當如過防之義未詳孰是當闕以俟知者集疏項氏曰九三九四此二爻方為隂所過非能過人者也故皆曰弗過易氏曰弗過而遇則與三不同九三弗過而防猶足制羣隂之過九四弗過而遇則不期而會之在我失位往而遇隂其道為危不可不戒故曰往厲必戒新安胡氏曰九四弗過與九三同義遇之前遇乎隂也上往則危必當致其戒二隂在上有遇之之勢故當戒也六五密雲不雨自我西郊公弋取彼左穴以隂居尊又當隂過之時不能有為而弋取六二以為助故有此象在穴隂物也兩隂相得其不能濟大事可知集疏朱氏曰小畜所畜者小小過所過者小二卦雖殊而大者不能施則一故關子明曰小畜一卦之體當小過一爻之義徐氏曰柔盛居上密雲之象隂陽和則成雨皆隂無應有不雨之象西郊互體兊象公謂五彼謂二在穴二隂居下也泉峰龔氏曰隂陽和而後能雨密雲不雨自我西郊兩見於易皆隂陽不和之象小畜以一隂畜乎五陽隂微而陽盛力不能制小過以四隂過乎二陽隂盛而陽微勢不均敵故皆有密雲不雨之象小畜以巽畜乾主全卦言故以卦辭言之小過以隂過陽而六五為之主故於爻辭言之在小畜為全卦之義在小過則一爻之義也小畜小過皆以隂為主小畜所畜者小小過所過者小皆不足以大其有為者也西郊二卦皆有互體兊象我小畜指六四言小過指六五言也上六弗遇過之飛鳥離之凶是謂災眚六以隂居動體之上處隂過之極過之已髙而甚逺者也故其象占如此或曰遇過恐亦當作過遇義同九四未知是否集疏新安胡氏曰此爻與六四正相反弗過遇之者陽弗能過乎隂反遇乎隂也弗遇過之者隂弗能遇陽反過乎陽也小過隂過而陽弗過之時故四言弗過而上言過四前有隂有相遇之理上已過陽無復相遇之期故四言遇而上言弗遇也飛鳥離之取過逺之象隂過如此非隂之福也災眚荐至凶孰甚焉此可為小人過盛者之戒總論易氏曰隂為小陽為大四陽萃於中則為大過四隂列於上下則為小過故小過之隂爻皆過而陽爻皆言弗過初六居下卦之下上六居上卦之上過而不得其中六二居下卦之中六五居上卦之中雖中而未免於過此四爻正小過之義至三四陽爻皆以弗過為言者扶二陽之不及以抑四隂之過也丘氏曰小過四隂二陽隂過於陽故為小過初上二爻皆隂不中為過者也故皆凶二五兩爻位得其中過而弗過故無凶咎之戒三曰弗過防之謂防下二隂也四曰弗過遇之遇上二隂也然隂在陽下其害猶可逭隂在陽上其禍不可測矣通論項氏曰坎離者乾坤之大用也故上經終於坎離下經終於既未濟頤中孚小過附既未濟二陽函四隂則謂之頤四陽函二隂則謂之中孚皆美名也二隂函四陽則謂之大過四隂函二陽則謂之小過皆非美名也於是可見貴陽賤隂之意離之為麗坎之為陷意亦如此又曰上經將終授以頤大過下經將終授以中孚小過四卦皆不反對所以明雷風山澤之正用也四卦之象皆有坎離雷風山澤之氣出於坎離坎離出於乾坤也離下坎上既濟亨小利貞初吉終亂既濟事之既成也為卦水火相交各得其用六爻之位各得其正故為既濟亨小當作小亨大抵此卦及六爻占辭皆有警戒之意時當然也集疏語録曰大率到那既濟時了便自不好去如唐時正觀之盛便向那不好處又曰既濟是已濟了大事都已亨通了只更小小底正在亨通若能戒謹恐懼則常似今猶自得不然便一向不好去了蔡氏曰初吉二也離明在內也終亂上也既濟之終變為未濟矣又坎難在外新安胡氏曰三隂得位而三陽下之亦猶小者在上而亨之義愚案一治一亂天運之不能無理勢然也觀既濟之六爻隂陽各得其正位似若有吉無凶矣雖然易無不變之理故以初吉終亂繫之初九曳其輪濡其尾無咎輪在下尾在後初之象也曳輪則車不前濡尾則狐不濟既濟之初謹戒如是無咎之道占者如是則無咎矣集疏語録曰曳輪濡尾是欲到未到之間不是不欲濟是要濟而未敢輕濟如老子所謂冬涉川之象則必竟涉只是畏那寒了未敢便涉易氏曰初為足四與二互坎為輪為濡坎輪在前而初自後曳之既曳其輪而不亟於進復濡其尾而不苟進象謂之義無咎者在下無位不輕於進合乎義者也愚案初九雖當既濟之時速於求進則復入於坎險故曳其輪濡其尾而無咎六二婦喪其茀勿逐七日得二以文明中正之德上應九五陽剛中正之君宜得行其志而九五居既濟之時不能下賢以行其道故二有婦喪其茀之象茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒集疏徐氏曰卦有六位七日則剛柔變而失者得矣與震六二同愚案詩有翟茀茀離象也九三髙宗伐鬼方三年克之小人勿用既濟之時以剛居剛髙宗伐鬼方之象也三年克之言其久而後克戒占者不可輕動之意小人勿用占法與師上六同集疏徐氏曰鬼方幽逺小國坎有鬼方象離體有伐象盡離三爻有三年象愚案九三當既治之後居離明之極為日過中明則衰矣不可以輕動之時自宜持盈守成可也顧乃挾重剛之資過於求濟猶髙宗雖賢以伐鬼方小國亦必三年而後克之鬼方幽逺之方蓋指上六隂在外也六四繻有衣袽終日戒既濟之時以柔居柔能預備而戒懼者也故其象如此程子曰繻當作濡衣袽所以塞舟之罅漏集疏程子曰繻當作濡謂罅漏也舟有罅漏則塞以衣袽以備濡漏又終日戒懼不怠慮患當如是也郭氏曰既濟思患預防而四又居多懼之地是以有繻有衣袽之戒袽敝衣也説文謂繻為繒綵蓋其意以為新繒必有敝袽亦猶既濟必致終亂也語録曰六四以柔居柔能慮患預防蓋是心低小底人便能慮事柔善底人心不粗慮事細密剛果之人心粗不解如此蔡氏曰繻帛之美者袽衣之敝者既濟過中時且變矣故四有衣袽之戒言繻雖美必至於有袽事雖濟則必致於未濟必須終日戒慎乎此則不至於終亂也案郭蔡繻有衣袽之説不煩改字於理亦通因附於此九五東鄰殺牛不如西鄰之禴祭實受其福東陽西隂言九五居尊而時已過不如六二之在下而始得時也又當文王與紂之事故其象占如此彖辭初吉終亂亦此意也集疏程子曰殺牛盛祭也禴薄祭也盛不如薄者時不同也二五皆中正二在濟下尚有進也故受福五處濟極無所進矣語録間紂時貴為天子祭祀之盛不若文王薄祭却可以受福蓋時之興衰自是如此曰揚子雲云十六日月雖缺未多更圎似生明之時畢竟漸缺去初三雖小於生魄時畢竟是長底時節愚案西鄰雖指六二以反對而論正未濟之六五也既濟則時已過未濟則時方來時已過雖殺牛亦無福之可僥時未過雖不殺牛而薄祭福將大來時乎時乎聖人不能違也上六濡其首厲既濟之極險體之上而以隂柔處之為狐涉水而濡其首之象占者不戒危之道也集疏易氏曰上以隂柔居坎險之極有濡首之象初在下體之下濡其尾宜也上居上體之上而濡其首則其尤有甚於未濟之初其道至危烏能久乎愚案濡其首只是溺於所安旋致危亂不必謂狐之濡首也濡尾則猶可以濟濡首則不保其終濟矣故厲此有過涉滅頂之義總論語録問既濟上三爻皆漸不好蓋出明而入險四有衣袽之象便是不美之端倪已見五殺牛則已自過盛上濡首則極而亂矣不知如何曰時運到那時節過了康節所謂飲酒酩酊開花離披時節所以有這樣不好底意思出來項氏曰既濟自泰變六五降而為二以六二為主爻未濟自否變六二升而為五以六五為主爻故二彖皆曰柔得中也既濟之終亂即泰之命亂未濟之飲酒即否之後喜也易氏曰乾下坤上為泰天地之交也離下坎上為既濟水火之交也泰之六爻雖相應而二五處非其位二五相易為既濟則剛柔之位無一不當六十四卦無如既濟六爻最正然卦言初吉終亂者乃盛衰安危之常理聖人於既濟而示其戒與泰之上六城復于隍之戒一也泉峰龔氏曰既濟者事之已濟也初言曳輪濡尾欲濟而未濟也二言喪茀勿逐未濟而終濟也三言克鬼方則事已濟矣三年言其濟之難小人勿用欲保其濟也四言繻有衣袽言既濟之終亂也五言殺牛禴祭已濟之盛不如未濟之時也上言濡首則濟極而亂矣義取於濟水故初上二爻曰濡尾濡首其餘四爻取象不類又所以為既濟始濟之喻也愚案在坎後故為濡尾未能出坎故濡首坎下離上未濟亨小狐汔濟濡其尾無攸利未濟事未成之時也水火不交不相為用卦之六爻皆失其位故為未濟汔幾也幾濟而濡尾猶未濟也占者如此何所利哉集疏郭氏曰既濟曰亨未濟亦曰亨者既濟之亨者已然之亨也未濟之亨未然之亨也語録問未濟所以亨者謂之未濟便自有濟之理但尚遲遲故謂之未濟曰然大槩既濟是那日中衙晡時侯盛了只向衰去未濟是那五更初時只是向明去蔡氏曰狐坎象尾謂初也初六濡其尾吝以隂居下當未濟之初未能自進故其象占如此集疏項氏曰既未濟皆取義於濟故兩卦初上皆稱濡然得失不同者既濟而濡尾不害其為既濟故無咎未濟而濡尾則不能濟故吝徐氏曰既濟之初才剛足以有濟雖或濡尾終亦必濟未濟之初才柔不足以濟至於濡尾則不能濟矣溪邊熊氏曰當既濟之時而濡其尾中其濟而後濡也故無咎當未濟之初而濡其尾不得其終濟也故吝而象亦曰不知其極也九二曳其輪貞吉以九二應六五而居柔得中為能自止而不進得為下之正也故其象占如此集疏潘氏曰九二剛中之臣上應柔中之君力足以濟者也然身在坎中未可以大用故曳其車輪不敢輕進待時而動乃為吉也不量時度力而勇於赴難適以敗事者多矣萬氏曰既濟之初曰曳其輪未濟之二亦曰曳其輪者初九當既濟之時居在下之位為能知時而不欲速進故曳其輪九二當未濟之時任濟時之責然當守正而不輕進故亦曰曳其輪其辭雖同而出處進退之道則異也六三未濟征凶利涉大川隂柔不中正居未濟之時以征則凶然以柔乘剛將出乎坎有利涉之象故其占如此蓋行者可以水浮而不可以陸走也或疑利字上當有不字集疏程子曰三以隂柔不中正之才而居險不足以濟也未有可濟之道出險之用而征所以凶也然未濟有可濟之道險中有出險之理上有陽剛之應若能涉險而往從之則濟矣故利涉大川也然三之隂柔豈能出險而往非時不可才不能也易氏曰三與上相應可以征者也隂柔在坎體之下不當其位以此而征則妄動速凶然則終於不濟乎六三雖無濟險之才而有濟險之義居坎體之上既已出險而又互坎在前是謂大川惟能一意以從上九之應所以成利涉之功也愚案利涉之説王氏孔氏謂比二以拯難程氏謂承四可以犯險程子李氏以上九剛應為言易氏以互坎為言劉氏取本義利字上有不字之説謂三無濟險之才愚謂諸爻不稱未濟三獨言未濟正發明卦名之本義未濟者時雖未濟終必濟也濟者何涉川也征凶所謂徙涉也涉川舟涉也諸卦利涉大川皆以舟言征凶以徒行言征凶利涉大川者徒涉則凶舟涉則利也九四貞吉悔亡震用伐鬼方三年有賞于大國以九居四不貞而有悔也能勉而貞則悔亡矣然以不貞之姿欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象集疏郭氏曰四居近臣之位有剛強可濟之才故可以震用伐鬼方則其才足以逺濟非獨自濟其身而已故其君報能濟之功是以三年有賞于大國也必言三年以見未濟之艱於有為也易氏曰四之失位不正悔也居近君之位上承柔中之君以貞守之其志得行是以貞吉悔乃亡也然所謂伐鬼方者與既濟九三同象亦離中有坎義九三言髙宗稱其君也九四言震者稱其威德也三年之伐雖若淹久四得行其志而不窮於用武論功行賞封以大國是知未濟而濟非既濟之所能及此既濟之所以憊未濟之所以吉而志行也六五貞吉無悔君子之光有孚吉以六居五亦非貞也然文明之主居中應剛虛心以求下之助故得貞而吉且無悔又有光輝之盛信實而不妄吉而又吉也集疏蔡氏曰文明之主故稱君子之光下得二四恭順剛明之臣故有孚吉愚案貞吉悔亡者有悔而亡也貞吉無悔者本無悔也管輅曰日中為光朝日為暉所謂君子之光者離為文明故爻辭言光象釋之以暉也上九有孚于飲酒無咎濡其首有孚失是以剛明居未濟之極時將可以有為而自信自養以俟命無咎之道也若縱而不反如狐之涉水而濡其首則過於自信而失其義矣集疏蔡氏曰五為濟主二四助之已成濟之功矣己獨處上無所用力惟于飲酒自樂不妄生事乃為無咎徐氏曰濡坎象首上象愚案未濟之終固為既濟信乎可以豈樂飲酒矣故曰有孚于飲酒無咎然好樂無節致飮酒而濡首則又沈湎淫佚而復如既濟之終亂矣此理之必然無可疑者故曰濡其首有孚失是總論語録曰大槩未濟之下卦皆是未可進用濡尾曳輪尚在險中六三未離坎體便也不好到四五已出乎險方好上六又不全好通論語録曰兩卦各自説濡首濡尾不必拘説在此言尾在彼言首大概既濟是那日中衙晡時候盛了只向衰去未濟是那五更初時只是向明去聖人當初見這箇爻裏有這般意思便説出這一爻來又曰他曳輪濡尾在既濟為無咎在未濟則或吝或貞吉這便有不同又曰未濟與既濟諸爻頭尾相似中間二四兩爻如損益模樣顚倒了蔡氏曰既濟之後必亂故主在初卦而亨取二未濟之後必濟故主在上卦而亨取五又曰坎者隂陷陽而陽難離者隂離陽而陽明是坎雖陽卦而陽不得用離雖隂卦而陽猶得用故既濟未濟名義主坎以坎為陽卦也其亨主離以離陽得用也劉氏曰既濟以柔居上止則亂也故濡其首厲未濟之事也未濟以剛居上窮則通也故有孚于飲酒無咎既濟之事也劉氏曰未濟下三爻未出險初濡尾二曳輪三征凶上三爻已出險矣四志行五有孚吉上有孚飲酒而已既濟吉少凶多未濟吉多凶少雖吉未嘗不戒也萬氏曰泰之變為既濟否之變為未濟蓋既濟自泰而趨否者也未濟自否而趨於泰者也故既濟爻辭無吉者以其趨於否也未濟爻辭多吉以其趨於泰也否泰者治亂對待之理既未濟者否泰變更之漸也又曰四卦初爻相類皆以人才進退為言泰之初曰拔茅茹否之初亦曰拔茅茹既濟之初曰濡其尾未濟之初亦曰濡其尾但泰之拔茅茹為君子之類進否之拔茅茹為小人之類進既濟之濡尾為君子之不可進未濟之濡尾為君子之不可不進其不同者何也蓋君子進所以開泰泰既變則小人用而君子不可進矣小人進所以致否否既變則小人退而君子亦可進矣君子亦何心哉隨其時之如何耳通論李氏曰上篇首乾坤終坎離下篇首咸恆終既未濟亦坎離也天地之道不過隂陽五行之用莫先於水火上篇首天地隂陽之正也故以水火之正終焉下篇首夫婦隂陽之交也故以水火之交終焉隆山李氏曰隂陽之氣往來乎天地之間或不能無過差故聖人作易大過之後繼以坎離者隂陽之中所以救大過之弊也小過之後繼之以既濟未濟者即坎離之中所以救小過之弊也厚齋馮氏曰過之大故繼之以坎離之全過之小故繼之以坎離之交愚案上篇主天道而言故首乾坤而終坎離天地水火之用行也下篇主人事而言故首咸恆而終既未濟夫婦人事之道盡矣天地之用莫大於水火故坎離終之人事之用莫急於水火而既未濟終焉乾以終陽坤以幾隂而為首變而至於六十四卦三百八十四爻而既濟之六爻隂陽始得定其位焉而復繼之以未濟之隂陽失位者所謂易不可窮也既濟以一陽而間一隂未濟以一隂而間一陽六十四卦乾坤而已乾坤隂陽而已一隂一陽之謂道非知道者孰能識之周易本義集成卷二
