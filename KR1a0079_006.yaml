body:
  text: 周易本義集成卷六元熊良輔撰象下𫝊山上有澤咸君子以虚受人山上有澤以虚而通也集疏程子曰澤性潤下山虚受潤是一物之氣相感通也君子觀山澤通氣之象而虚中以受人夫人中虚則能受實則不能入矣丘氏曰山以虚則能受澤心以虚則能受人咸其拇志在外也集疏蔡氏曰外謂四也雖凶居吉順不害也集疏程子曰二居中正其才本善以其在咸之時質柔應正故戒以先動則凶自守則吉象復明之云惟順理則不害也謂守道不先動也咸其股亦不處也志在隨人所執下也言亦者因前二爻皆欲動而云也二爻隂躁其動也冝九三陽剛居止之極冝靜而動可吝之甚也集疏程子曰不處謂動也有陽剛之質而不能自主志反在於隨人是所操執者卑下之甚也項氏曰亦不處承上文也言腓之柔固不能以自主而股之剛亦復如之則為可吝也徐氏曰世之君子位居人上所守不正感不以道而又徇夫䙝御在下者之私情至於多行可媿者皆執其隨也貞吉悔亡未感害也憧憧往來未光大也感害言不正而感則有害也集疏泉峰龔氏曰貞則未有所私感而於事无所害故吉而悔亡若憧憧則有所私感矣故不能公溥而惟其朋應之安能光大乎咸其脢志末也志末謂不能感物集疏楊氏曰居得尊位无思无慮不能通天下之故則其志末矣非為上之道也咸其輔頰舌滕口説也集疏愚案上六正當兑上故有輔頰舌滕口説之象滕口説者以言感人而人不從是徒多言也雷風恒君子以立不易方集疏程子曰君子觀雷風相與成恒之象以常久其徳自立於大中常久之道不變易其方所也丘氏曰震出也巽入也震剛在外巽柔在内二者各居其位則謂之恒故君子體之而立不易方若巽出而居外震入而居内則二者易位而風雷益矣故君子體之則有遷改之義此恒益之所以不同浚恒之凶始求深也集疏徐氏曰交際之道自有淺深若交之淺而遽以深求之豈理也哉九二悔亡能久中也集疏郭氏曰可久之道无他中焉而已矣過猶不及皆非可久也不恒其徳无所容也久非其位安得禽也集疏項氏曰九三剛躁而不常九四以不中不正為常不常者固无所容常久而非其道者亦无所獲故曰恒亨无咎利貞久於其道也婦人貞吉從一而終也夫子制義從婦凶也振恒在上大无功也集疏項氏曰初六居巽之下以深入為恒也上六居震之極以震動為恒也在始而求深在上而好動皆凶道也象辭加始字上字其義明矣天下有山遯君子以逺小人不惡而嚴天體无窮山髙有限遯之象也嚴者君子自守之常而小人自不能近集疏語録問遯字雖是逃隠大抵亦取逺去之義天上山下相去甚遼絶象云君子以逺小人則君子如天小人如山相絶之義須如此方得所以六爻在上而漸逺者愈善也曰恁地推得好蔡氏曰山髙起而止於下天上運而相違遯之象也逺小人艮象不惡而嚴乾象遯尾之厲不往何災也執用黄牛固志也係遯之厲有疾憊也畜臣妾吉不可大事也君子好遯小人否也嘉遯貞吉以正志也集疏泉峰龔氏曰九五剛陽中正不係於隂能正其在已之志以遯為美而樂之此其所以為嘉而吉也肥遯无不利无所疑也集疏愚案上九之遯愈逺愈不干於利害故曰无不利无所疑也雷在天上大壯君子以非禮弗履自勝者强集疏程子曰古人云自勝之謂强赴湯火蹈白刃武夫之勇可能也至於克己復禮非君子之大壯不能也故曰君子以非禮弗履語録曰雷在天上是甚威嚴人之克己能如雷在天上則威嚴果決以去其惡而必於為善若半上落下則不濟事潘氏曰乾下震上順乎天而動也順天而動動罔不正一毫不正則非天矣是以非禮勿履也乾下震上為大壯乾上震下為无妄皆天理也非人為也泉峰龔氏曰禮天理也乾象履動而行也震象雷在天上以天而動非禮勿履順理而行也壯于趾其孚窮也言必窮困九二貞吉以中也小人用壯君子罔也小人以壯敗君子以罔困集疏程子曰在最下而用壯以行可必其困窮而凶也泉峰龔氏曰合遯九四象辭而觀之壯敗罔困之説似未然藩決不羸尚往也集疏蔡氏曰前无困阻可以上進故曰尚往喪羊于易位不當也不能退不能遂不詳也艱則吉咎不長也集疏蔡氏曰詳審也不詳其質之不堪而用壯者也明出地上晉君子以自昭明徳昭明之也集疏項氏曰明徳以象日自昭以象出地大壯之象君子以非禮弗履晉之象曰君子以自昭明徳聖人之言壯言明大率如此世人以敢凌人為壯以能察物為明豈不逺哉丘氏曰晉之自昭明徳致知之學也乾之自强不息力行之學也易大象惟乾晉以自言之致知力行君子盡己之事也晉如摧如獨行正也裕无咎未受命也初居下位未有官守之命集疏蔡氏曰正釋貞言進退之間獨行乎晉之正耳徐氏曰居无位之地以寛裕自處不汲汲於求進乃其宜也故无咎若已受命則是當事有官職苟一於裕則有曠廢之失能无咎乎受兹介福以中正也衆允之志上行也集疏丘氏曰三以柔進於下卦之上而在下二柔信而從之二柔之所以信而從之者以其志同乎上行也鼫鼠貞厲位不當也失得勿恤往有慶也維用伐邑道未光也明入地中明夷君子以涖衆用晦而明集疏語録曰晦地象明日象晦即是不察察若晦而不明則晦得没理㑹了故外晦而内明乃好項氏曰明而見傷本非美事然天地之間既有此象君子觀之皆為有用是道也用之以居人上聰明睿智守之以愚豈非君子之善道哉大象之辭非聖人其孰能修之蔡氏曰涖離象衆坤象用晦坤象明離象君子于行義不食也惟義所在不食可也六二之吉順以則也集疏蔡氏曰以柔居中故順而有則南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也集疏泉峰龔氏曰箕子徉狂晦其明者也晦其明則明全而不息是則箕子之貞也初登于天照四國也後入于地失則也照四國以位言集疏丘氏曰六二受人之傷者也以其順則故卒能自全而免禍上六傷人之明者以其失則故卒自禍而隕身順則者文王失則者其紂與風自火出家人君子以言有物而行有恒身修則家治矣集疏程子曰正家之本在正其身君子觀風自火出之象則事之由内而出故所言必有物所行必有恒也物謂事實恒謂常度法則也言謹行修則身正而家治矣語録曰火中有風如一爐火光此氣自熏蒸上出是也此只是言自内及外之意蔡氏曰物恒内也言行外也外本乎内風自火出之象閑有家志未變也志未變而預防之集疏程子曰閑之於家人志意未變之時是以悔亡志變而後治則所傷者多矣乃有悔也六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也集疏蔡氏曰處家之道易以情勝義雖曰過嚴亦未為失節名分之謂富家大吉順在位也集疏丘氏曰家人利女貞則女貞者家之本也一卦四陽二隂隂皆得位女正之象也女子之道以順為正聖人於二之象曰順以巽於四之象曰順在位以言女子未有不順其夫而家道得其正者故二象皆以順言之王假有家交相愛也程子曰夫愛其内助婦愛其刑家集疏丘氏曰治家之道尚嚴在彖以嚴正為吉五以相愛為義何也曰嚴以分言正家之義也愛以情言假家之義也假有感格之義故象以相愛言之泉峰龔氏曰交相愛則一家之父子兄弟夫婦長幼莫不相愛非特夫婦而已也威如之吉反身之謂也謂非作威也反身自治則人畏服之矣集疏愚案治家之道末歸之反身所謂身修而後家齊也反身之道如何明善誠身而已上火下澤睽君子以同而異二卦合體而性不同集疏程子曰君子觀睽異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者有時而獨異不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳語録曰彖辭言睽而同大象言同而異本義所謂合體者言同也而性不同者言異也君子有同處有異處如所謂周而不比羣而不黨是也項氏曰睽非善事也然有當睽者同而異是也二女同居所謂同也其志不同行所謂異也在君子則和而不同羣而不黨皆同而異也同人於異中見其同暌於同中而得其異同象兑之説異象離之明馮氏曰彖傳言睽中有合所以濟睽也大象言同中有異所以用睽也火上而澤下其性不同睽之所以為異也澤上而火下其勢不久革之所以去故也見惡人以辟咎也遇主于巷未失道也本其正應非有邪也見輿曳位不當也无初有終遇剛也交孚无咎志行也厥宗噬膚往有慶也遇雨之吉羣疑亡也集疏愚謂當睽異之時疑心易生六三上九又處不當位故其疑為尤甚象謂羣疑亡者睽極則變隂陽和而為雨羣疑以之而亡也山上有水蹇君子以反身修徳集疏程子曰君子之遇艱阻必反求諸己而益自修孟子曰行有不得者皆反求諸已故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之无歉於心則加勉乃自修其徳也馮氏曰蹇難也水遇山之險阻其抵觸激射曲折旋伏而不進所以為蹇也君子觀坎險艮止水流不行之象其行有不得者反求諸己而自修焉所以濟蹇也新安胡氏曰反身即思不出位之義艮象修徳即常徳行之義坎象往蹇來譽冝待也集疏泉峰龔氏曰往則入險不如有所待待謂待時而動非終不往也王臣蹇蹇終无尤也事雖不濟亦无可尤集疏泉峰龔氏曰六二之匪躬而不言其濟難之功者其才弱力不足以濟志義可嘉終亦何尤之有哉愚謂六二有濟蹇之才故雖當蹇時而能致匪躬之節故終无尤也往蹇來反内喜之也集疏項氏曰九三艮之主爻二隂之所依也其曰來反内喜之者猶言季子來歸喜之也九三為内所依故曰内喜上六依内以濟故曰志在内往蹇來連當位實也集疏項氏曰六四當位實也上六以從貴也實與貴皆指陽為言六四以九三為實而已連之上六以九五為貴而已從之若但言當位則六四亦當位也故加實字以明之大蹇朋來以中節也集疏泉峰龔氏曰大陽也而陷於隂中五君也而陷於坎中皆大蹇之謂也當大蹇之時必得衆賢之助乃克有濟而六二以中正相應蹇蹇匪躬盡王臣之節則同類之朋冝皆並起而助之矣愚謂當大蹇之時而得朋來以濟蹇故曰以中節也若當蹇之時而朋不來不得為中節矣且二五剛柔得位得中所以中節也往蹇來碩志在内也利見大人以從貴也集疏項氏曰上六以來碩為吉以見大人為利碩指九三九三内卦之上爻故曰志在内也大人指九五九五六爻之最貴故曰以從貴也雷雨作解君子以赦過宥罪集疏蔡氏曰赦宥解象過馮動震象罪陷坎象氏曰解散也解緩也過小而罪大有過者散釋之有罪者寛緩之皆解之義也解為屯之對雲雷交結而為屯雷雨動施而為解雷雨作天地所以解萬物之屯赦宥行君子所以解萬民之屯新安胡氏曰坎在上為雲在下為雨方雲雷而為屯則隂陽未通及雷雨作解則隂陽已通矣屯者難之始解其難之散與剛柔之際義无咎也集疏蔡氏曰際謂交際柔居解初入坎尚淺而承剛應剛得剛柔交際之冝難必解矣故曰義无咎也九二貞吉得中道也負且乗亦可醜也自我致戎又誰咎也解而拇未當位也君子有解小人退也公用射隼以解悖也集疏泉峰龔氏曰悖謂三也悖亂而為難者也山下有澤損君子以懲忿窒慾君子修身所當損者莫切於此集疏語録曰觀山之象以懲忿觀澤之象以窒慾慾如汙澤然其穢濁解汙染人須當填窒了問觀山以懲忿曰人怒時自是恁地突起來故孫權曰令人氣湧如山又曰懲忿如摧山窒慾如填壑釋褐楊氏曰山殺瘦澤増肥山下有澤損之義也丘氏曰忿慾吾身愛惡之私皆所當損也然懲忿易窒慾難盖忿屬陽其發也如山之突兀人皆知之故懲之易慾屬隂其溺人也如水之浸淫使人不覺故窒之難懲忿惟用心之剛者能之窒慾非見理之精者不能也愚案觀山以懲忿有取於靜養之象觀澤以窒慾有取於止水之象已事遄往尚合志也尚上通九二利貞中以為志也集疏蔡氏曰中即正也惟以守中為志一人行三則疑也損其疾亦可喜也六五元吉自上祐也集疏丘氏曰六五以柔居尊位與九二為應本受下之益者也而上九與五相比又從其上而益之故象曰自上祐盖指上九而言也弗損益之大得志也風雷益君子以見善則遷有過則改風雷之勢交相助益遷善改過益之大者而其相益亦猶是也集疏程子曰風烈則雷迅雷激則風怒二物相益者也君子觀雷風相益之象而求益於已見善則遷則可盡天下之善有過則改則无過矣益於人者无大於是語録曰風是一箇急底物見人之善已將不及遷之如風之急雷是一箇勇決底物已有過便頓然改之如雷之勇決元吉无咎下不厚事也下本不當任厚事故不如是不足以塞咎也集疏泉峰龔氏曰厚事即大作之事在下而任厚事踰其分者也故必所作之事大善而吉乃得无咎不然咎將有所不免矣或益之自外來也或者衆无定主之辭益用凶事固有之也益用凶事欲其困心衡慮而固有之也集疏愚謂益之以凶事雖曰災自外來而已反受益乃其已分之所固有者非自外來也若二之或益三之或擊乃自外來者也告公從以益志也集疏泉峰龔氏曰六四之告公以益民為志故得見從也有孚恵心勿問之矣恵我徳大得志也莫益之偏辭也或擊之自外來也莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣澤上於天夬君子以施禄及下居徳則忌澤上於天潰決之勢也施禄及下潰決之意也居徳則忌未詳集疏項氏曰禄惡積而喜決決則及下徳惡決而喜積決則放逸而不為我居矣是施禄者以決為美而居徳者以決為忌居積也施禄象兑之缺居徳象乾之純蔡氏曰施禄及下澤潤下之象居其徳而不施則與象反矣故忌案居徳則忌二説皆通因附於此不勝而往咎也有戎勿恤得中道也集疏蔡氏曰先事則當惕及事則不可憂得居中之道君子夬夬終无咎也其行次且位不當也聞言不信聰不明也中行无咎中未光也程傳備矣集疏程子曰夫人心正意誠乃能極中正之道而充實光輝五近於上六心有所比以義之不可而決之雖行於外不失中正之義可以无咎然於中道未得為光大也語録曰中未光者事雖正而意潛有所係吝如所謂流注不斷皆意不誠之本也无號之凶終不可長也集疏愚謂以一隂處五陽之上為所夬決旡所號呼而能乆長者鮮矣時勢然也天下有風姤后以施命誥四方集疏蔡氏曰風行天下物无不遇姤之象也施乾象命巽象誥四方風行天下之象馮氏曰自上而下曰施以上諭下曰誥天與萬物相逺而皷舞之以風君與萬民相逺而皷舞之以號令皆姤遇之道也泉峰龔氏曰天下有風姤與風行地上觀相似故在姤則曰施命誥四方在觀則曰省方觀民設教曰施曰誥自上而下天下有風之象也曰省曰觀周歴徧覽風行地上之象也繫于金柅柔道牽也牽進也以其進故止之集疏蔡氏曰以柔道而牽於二也包有魚義不及賓也集疏易氏曰賓指九四初為二所包義不及於四故二包有魚而四包无魚也其行次且行未牽也集疏蔡氏曰謂未牽於初也泉峰龔氏曰三與初非比非應故三未為初所牽雖其行次且而不進亦无大咎也愚案牽只當如上文訓進義謂未牽引也未牽盖釋次且義无魚之凶逺民也民之去己猶己逺之集疏徐氏曰民謂初柔逺民謂去初逺也九五含章中正也有隕自天志不舎命也集疏泉峰龔氏曰志不舍命横渠張子所謂盡人謀而聴天命者也五與初相逺本无相遇之理惟守其中正含晦章美而静俟之則其遇將有自天而下者矣中正含章所以盡人謀志不舍命則一聴之天命也姤其角上窮吝也澤上於地萃君子以除戎器戒不虞除者修而治之之謂集疏語録曰大凡物聚衆盛必有事故當預為之備如人少處必无爭纔人多少閒便自有爭所以當預為之防也又澤本地中今却上於地上必有潰決奔突之憂故其取象如此馮氏曰水上於地聚而不流者有隄防以瀦之也不虞者出於意料之外也水上必下水聚必散寧免不虞之決衆聚必爭物聚必奪寧免不虞之變聚土謹防所以戒澤之不虞聚兵為備所以戒國之不虞也又曰水行地中而澤上於地水不能常上於地也故萃有不虞之戒水流下火炎上而水在火上水不能常上於火也故既濟有思患之防乃亂乃萃其志亂也引吉无咎中未變也集疏丘氏曰二與五應而雜於衆隂之間二居中不變必待九五引而進之然後往焉所以吉而无咎往无咎上巽也集疏蔡氏曰巽順也從上二陽有巽體大吉无咎位不當也萃有位志未光也未光謂匪孚集疏泉峰龔氏曰以九居五有其位者也徒有其位故人或匪孚此志之所以未光也齎咨涕洟未安上也地中生木升君子以順徳積小以髙大王肅本順作慎今案他書亦多作慎意尤明白盖古字通用也説見上篇蒙卦集疏語録曰樹木之生日日滋長若一日不長便將枯悴便是生理不接學者之於學不可一日少懈大抵徳須日日要進若一日不進則退馮氏曰木生地中日長而上有升之象自下而外上順也木之升也而成材人之升也而成徳皆以順而積者也以順而積由小而大楝梁者拱把之積聖賢者其片善之積與項氏曰順徳坤也積小以髙大巽也巽為髙物之髙必以積其所積必以順非順不可積非積不能髙也木之始生伏於地中積而不已其髙干雲其大蔽天此木之積也允升大吉上合志也九二之孚有喜也升虚邑无所疑也王用亨于岐山順事也以順而升登祭於山之象集疏泉峰龔氏曰順事者順以事上也六四居近君之位不可復升故獨言其至誠事神以為事君之比六四坤體爻位俱柔順而又順者也故能如此其文王小心翼翼以服事殷之事乎故以亨岐山言之貞吉升階大得志也集疏童溪王氏曰彖曰柔以時升盖謂五也六五貞吉升階言於正既吉其升有序以階言之揖遜而升者也人君皆升乎天位而所以升則不同舜禹之事聖人所欲也湯武之事豈聖人之所欲哉故貞吉升階為大得志若夫明夷之九三其所大得乃南狩之志爾非聖人之本心也冥升在上消不富也集疏泉峰龔氏曰冥升者其升已極昏迷而不知止者也然升極當降長極當消長則富而消則不富也愚案爻曰利于不息之貞而象曰消者反而言之也惟不息其貞則利不然則消而不富也澤无水困君子以致命遂志水下漏則澤上枯故曰澤无水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣集疏語録曰君子道窮之時但當委致其命以遂吾之志而已致命猶送這命與他不復為我之有雖委致其命而志則自遂无所回屈也馮氏曰澤所以瀦水也澤在其上而水在其下則澤中无水矣君子之處困也有命焉有志焉命在天而致之志在我則遂之困而安於困者命之致也困而有不困者志之遂也若小人處之凡可以求為幸免者无不為也而卒不得免焉則亦徒喪其所守而已矣體坎險以致命體兑説而遂志愚案致命豈持以委人之謂委致於天可也莫之為而為者天也君子當窮困之時知其无可奈何而委致於命焉則可以遂吾志矣語曰貧與賤是人之所惡也不以其道得之不去也記曰素貧賤行乎貧賤素患難行乎患難君子无入而不自得焉此皆致命遂志之意也入于幽谷幽不明也困于酒食中有慶也據于蒺藜乗剛也入于其宫不見其妻不祥也來徐徐志在下也雖不當位有與也集疏項氏曰來徐徐小象解之曰志在下明此句指初六也雖不當位即解吝字有與即解有終字劓刖志未得也乃徐有説以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也木上有水井君子以勞民勸相木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義集疏語録問木上有水之義曰如草木之生津潤皆上行露水直至樹末此即木上有水之義雖至小之物亦然如石菖蒲每晨葉尾皆潮水珠雖藏之密室亦然非露水也問井字之義與木上有水何預曰木上有水便如井中之水水本在井底却能汲上來供人食用故取象如此項氏曰説者謂運以轆轤舉以桔橰為木上有水此皆汲者之事非井之本象也凡大象皆據自然无用人為者草木之液自下而外上出其杪往來不息者自然之井也勞民坎象勸相巽象井泥不食下也舊井无禽時舎也言為時所棄井谷射鮒无與也井渫不食行惻也求王明受福也行惻者行道之人皆以為惻井甃无咎修井也寒泉之食中正也元吉在上大成也集疏愚案井以上出為功自初之泥二之谷三之渫四之甃井已完矣至五則寒泉為人所食至上則井道之大成也澤中有火革君子以治歴明時四時之變革之大者集疏語録曰水能滅火則只是隂勝陽火盛則克水水盛則克火此澤中有火之象便有那四時改革底意思君子觀這象便去治歴明時小舟李氏曰晝夜者一日之革晦望者一月之革分至者一嵗之革歴元者无窮之革項氏曰澤中有火天之革也治歴明時人之革也凡改世者必治歴改嵗者亦必治歴治一世之歴者可以明三正五運之相革治一嵗之歴者可以明十二月六十甲子之相革兑為巫史治歴之象也離為日中明時之象也丘氏曰火在澤中水火相克故為革歴數時㑹存乎變也日行周天嵗差甚微積之久則差始見而歴法不容不更故治歴取諸革也鞏用黄牛不可以有為也已日革之行有嘉也集疏徐氏曰已日猶言次日也卦以一爻當一日自初至二已日之象六二當革之時上應九五其才文明其體柔順其位中正處革之至善者也然猶已日而革者亦不輕變也故以之征行則吉而无咎而有可嘉之功也泉峰龔氏曰嘉如嘉乃丕績予嘉乃徳之嘉言為君所嘉也二與五應處革有功故為所嘉也革言三就又何之矣言已審集疏程子曰審當革之言至於三而皆合則必得當至於是可以革矣又何之矣乃俗語更何往也如是而行乃順理時行非己之私所欲為也必得其冝矣改命之吉信志也集疏泉峰龔氏曰信志即有孚之謂也革以有孚為本信足以孚乎人心則可以改命而得吉矣大人虎變其文炳也集疏釋褐楊氏曰其文炳者禮樂法度煥然一新也君子豹變其文蔚也小人革面順以從君也集疏王氏湘卿曰豹虎之小者九居五陽也大人虎變之象六居上隂也君子豹變之象虎文疎而著故曰炳豹文密而理故曰蔚五與上革道已成故皆言變然豹變之蔚然不若虎變之炳然也木上有火鼎君子以正位凝命鼎重器也故有正位凝命之意凝猶至道不凝之凝𫝊所謂協于上下以承天休者也集疏語録曰正位凝命言人君臨朝也須安莊端重一似那鼎相似安在那裏不動然後可以凝住天之命馮氏曰天位不正則傾天命不凝則覆正位凝命鼎之大用也鼎者革之反鼎為凝命之象革有改命之象項氏曰鼎之木上有火猶井之木上有水非井鼎之本形也特象之耳草木皆具水火之氣其生也水氣升于上水至木杪則為津液象井泉之上出也其成也火氣見於上火至木杪則為華實象鼎氣之上蒸也正位離象離為南面之位凝命巽象巽為命丘氏曰革言改命鼎言凝命盖凝其已改之命也以鼎繼革欲人於變革之後以端重守之其㫖微矣鼎顛趾未悖也利出否以從貴也鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意鼎有實慎所之也我仇有疾終无尤也有實而不慎其所往則為仇所即而陷於惡矣集疏程子曰二不昵初而上從六五之正應是乃慎所之也初比已而非正是有疾也自守以正彼不能即我所以終无尤也鼎耳革失其義也集疏蔡氏曰鼎耳在五而與為異故曰失其義也覆公餗信如何也言失信也集疏泉峰龔氏曰信如何也只是无可柰何之謂與小過初六小象不可如何也之意同九四不勝其任而自取覆餗之凶則亦末如之何也己矣鼎黄耳中以為實也集疏丘氏曰實陽也謂六五之鼎耳本虚而受鉉中以為實者蓋虚中所以為受實之地也玉鉉在上剛柔節也集疏愚案上以剛居柔故曰剛柔節而比徳於玉也洊雷震君子以恐懼修省集疏馮氏曰雷聲相屬為洊重震之象恐猶驚也懼猶畏也既恐而懼亦洊之義修其所未為省其所已為既修而省亦洊之義雷之震也莫不恐懼恐懼之定莫不修省體震以恐懼體洊雷以修省昭然上帝之臨而无貳爾心矣震之用也丘氏曰雷天威也方其仍洊而至聞之者莫不恐懼而君子於恐懼之後必以修省繼之使恐懼而不修省則變至而憂變已而休猶无懼也恐懼憂其變之來初震象修省者思其變之弭洊震象震來虩虩恐致福也集疏愚案恐致福謂恐懼方能致福也後有則故笑言啞啞也笑言啞啞後有則也震來厲乗剛也震蘇蘇位不當也震遂泥未光也震往來厲危行也其事在中大无喪也震索索中未得也雖凶无咎畏鄰戒也中謂中心集疏泉峰龔氏曰中未得者處震之極志氣消索中无所主也兼山艮君子以思不出其位集疏項氏曰兩雷兩風兩水兩火兩澤皆有相往來之理獨兩山並立各止其所不相往來人之一身至易止者背至難止者心能使心之所思各止其位不貳不遷則可以言止矣馮氏曰艮為山山止其所不移改也位者止之所也思而出位失其所止也思而不出其位得其所止也隨所居之位而安焉者也故曰不出所居之位自樂日用之常所以用艮也愚案兼山艮言物各有所當止之處也君子思不出其位言人當知所當止之處也此君子素其位而行不願乎其外也觀六十四卦大象又有以見易之有關於世教人心為甚大艮其趾未失正也不拯其隨未退聽也三止乎上亦不肯退而聽乎二也艮其限危薰心也艮其身止諸躬也艮其輔以中正也正字羨文協韻可見敦艮之吉以厚終也山上有木漸君子以居賢徳善俗二者皆當以漸而進疑賢字衍或善字下有脱字集疏語録曰山上有木漸長則山漸髙所以為漸馮氏曰山上有木其長以漸為漸進之象居積也徳以漸而積俗以漸而善徳者俗之表也久居其徳而俗化成焉徳以漸而善俗也内卦艮止也居徳者止諸内也外卦巽入也善俗者入於外也體艮以居徳體巽以善俗又曰益動而巽進徳之象漸止而巽居徳之象丘氏曰夬以決潰為義故居徳則忌漸以積累為義故可以居賢徳也泉峰龔氏曰地中生木以時而升山上有木其進以漸升之象曰順徳積小以髙大以成於已者言也漸之象曰居賢徳善俗兼成於人者言也二卦取象之意也愚案鄭東卿云古易善字下有風字理或然也小子之厲義无咎也飲食衎衎不素飽也素飽如詩言素餐得之以道則不為徒飽而處之安矣集疏泉峰龔氏曰二以中正應五而得禄非尸位素餐者比故食之衎衎而樂也愚案坎體多説酒食六二之飲食衎衎互坎故也夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也集疏泉峰龔氏曰漸之為義有進无退九三過剛不中進處二隂之外止而不反離其羣醜而往不復者也進比六四之隂合不以正失夫婦之道而孕不育者也若能用其剛勇扞禦外冦則不順者去而順者可以相得矣夫指三婦與冦似皆指四而言也愚案艮體故利禦冦順相保順慎通用只是謹慎以相保守也或得其桷順以巽也終莫之勝吉得所願也其羽可用為儀吉不可亂也漸進愈髙而不為无用其志卓然豈可得而亂哉集疏丘氏曰賢達之人進處髙潔不累於位非外物所能亂其志足為天下儀表矣澤上有雷歸妹君子以永終知敝雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然集疏馮氏曰澤上有雷澤氣隨之而上為女人從人之象有始必有終終身不改歸妹之終也有新必有故恩義或替歸妹之敝也君子觀此象也謹之於始務求其終則有終矣戒之於新知有其敝則不至於敝矣永終則不敝知敝則不俟其終而後圖之所以用歸妹也永終當如澤之隄防知敝當如雷之警省歸妹以娣以恒也跛能履吉相承也恒謂有常久之徳集疏釋褐楊氏曰歸妹以娣禮之常也跛而能履二承五初承二吉相承也利幽人之貞未變常也集疏丘氏曰象於初曰以恒於二曰未變常惟各安其常此初之所以吉而二之所以利與歸妹以須未當也集疏丘氏曰未當者以六居三以柔乗剛也愆期之志有待而行也帝乙歸妹不如其娣之袂良也其位在中以貴行也以其有中徳之貴而行故不尚飾上六无實承虚筐也集疏愚案上六以士女對待而言而此獨舉承筐无實者以隂爻故也言承筐无實則刲羊无血之義在其中矣雷電皆至豐君子以折獄致刑取其威照並行之象集疏程子曰雷電皆至明震並行也二體皆合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實惟明克允致刑者以威其姦惡惟斷乃成故君子觀雷電明動之象以折獄致刑也蔡氏曰折獄離明象致刑震懼象雖旬无咎過旬災也戒占者不可求勝其配亦爻辭外意集疏程子曰夫與人同而力均者在乎降已以相求協力以從事若懷先已之心有加尚之意則患當至矣故曰過旬災也有孚發若信以發志也豐其沛不可大事也折其右肱終不可用也集疏泉峰龔氏曰三應上六昏蔽之極不可與成豐大之事也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五之吉有慶也豐其屋天際翔也闚其戸閴其无人自藏也藏謂障蔽集疏語録曰天際翔也是其屋髙大至於天際却只是自障蔽又曰是如翬斯飛様言其屋之大蔽障濶山下有火旅君子以明慎用刑而不留獄慎刑如山不留如火集疏蔡氏曰火行山上而不留旅之象也明離象慎艮象不留獄火行而不處之象馮氏曰不留獄者於刑易至於輕誤而明慎於用刑者其獄類多淹乆明愼用刑而不留獄其善用旅者與丘氏曰山者火之所旅久則延燒獄者囚徒之所依留則淹滯旅有行而不處之象故火不可使久處於山囚不可使久留於獄也建安張氏曰山在内為主火在外為客山止而不遷猶旅館也火行而不居猶旅人也君子體火行山上而不留之象而以之用刑明則无遁情慎則无濫罰明慎既盡斷決隨之聖人取象於旅正恐其留獄也旅瑣瑣志窮災也集疏程子曰志意窮迫自取災也災眚對言則有分獨言則為災患耳得童僕貞終无尤也旅焚其次亦以傷矣以旅與下其義喪也以旅之時而與下之道如此義當喪也旅于處未得位也得其資斧心未快也終以譽命上逮也上逮言其譽命聞於上也以旅在上其義焚也喪牛于易終莫之聞也集疏程子曰終莫之聞謂終不自聞知也使自覺知則不至於極而號咷矣潘氏曰處旅之極居髙用剛始意甚快其如終何于易者禍生於所忽而莫之察也隨風巽君子以申命行事隨相繼之義集疏語録問申命是兩番降命否曰非也只是丁寧反復説便是申命巽風也風之吹物无處不入无物不皷動詔令入人淪肌浹髓亦如風之動物也隆山李氏曰天下有風姤所以施命若風相隨而至則是申命之象古之出命者必反復申戒之然後其事可行於天下項氏曰凡卦之有巽者多文教風俗之事小畜之懿文徳蠱之振民育徳觀之觀民設教姤之施命誥四方漸之居賢徳善俗巽之申命行事鼎之正位凝命皆此意也丘氏曰風所以發揚天之號令君子體隨風之象發號施令反復申戒然後見之行事申命者所以致其戒於行事之先行事者所以踐其言於申命之後重巽有申命之象隨風有行事之象愚謂以卦言之則上下皆巽取其上以巽出命而下以巽順命也以畫言之取其二隂爻皆在一卦之下而順乎陽從命之義也以其重巽也故有申命之辭以其巽順也故可以行事進退志疑也利武人之貞志治也紛若之吉得中也頻巽之吝志窮也集疏童溪王氏曰謂之頻巽則頻失可知三以剛處剛卑巽之志不出於自然勉為屢失其志易窮故可吝也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪其資斧正乎凶也正乎凶言必凶集疏愚案正乎凶也正乎問辭凶也應辭言喪其資斧則雖正亦凶正字釋貞字麗澤兑君子以朋友講習兩澤相麗互相滋益朋友講習其象如此集疏程子曰麗澤二澤相附麗也兩澤相麗互有滋益先儒謂天下之可説莫若朋友之講習朋友講習固可説之大者然當明相益之象蔡氏曰講兑象習重兑象饒氏曰習重也重險故謂之習坎凡學字下著習字者既學而又重學講字下著習字者既講而又重講也和兑之吉行未疑也居卦之初其説也正未有所疑也集疏徐氏曰疑謂係於隂也卦四陽惟初與隂无係故其行未疑若二之有悔四之商兑五之孚于剥皆係於隂而其行不能无疑者也孚兑之吉信志也集疏程子曰心之所存為志二剛實居中孚信存於中也志存誠信豈至悦小人而自失乎是以吉也來兑之凶位不當也九四之喜有慶也孚于剥位正當也與履九五同集疏泉峰龔氏曰五居説體以陽剛居尊而不知戒懼故易至孚剥而取危也上六引兑未光也集疏蔡氏曰牽引為説非光大之道也風行水上渙先王以享于帝立廟皆所以合其散集疏程子曰風行水上有渙散之象先王觀是象救天下之渙散至於享帝立廟也收合人心无如宗廟祭祀出於其誠故享帝立廟人心之所歸也係人心合離散之道无大於此馮氏曰設為郊祀以享上帝知天无二主尊之之極也為之宗廟以時祭之使人知反本親之之至也古之立國者必郊祀上帝必先建廟社以係人心所以合其渙也初六之吉順也集疏泉峰龔氏曰順謂順乎二也順乎二而藉之以拯渙所以得吉也渙奔其机得願也集疏泉峰龔氏曰九以四奔二去危就安得其所願者也渙其躬志在外也集疏潘氏曰居下之上有應於外故其志將不私其身以濟渙也渙其羣元吉光大也王居无咎正位也集疏程子曰正位人君之尊位也能如五之為則居尊位為稱而可以无咎矣渙其血逺害也集疏丘氏曰三上二爻隂陽相應然三渙其躬則曰志在外上渙其血則曰逺害三欲其應上上不欲其應三何也三處險内而應在外則為有所攀援而出險故三以有應於上為美上處險外而應在内則為有所係累而不能去故上以不應三為善又易以隂應陽為柔得剛援陽應隂為剛為柔累故隂爻應陽多吉陽爻應隂多凶澤上有水節君子以制數度議徳行集疏馮氏曰體坎以制數度體兑以議徳行彖傳言財用撙節之節象傳言爵位品節之節泉峰龔氏曰水上澤下以澤受水其容有限節之象也制數度者古人於衣服器用宫室莫不有多寡隆殺之等使賤不踰貴下不侵上所以立節也議徳行者人品之不齊徳有小大材有髙下隨其人品而等第之使大小髙下各得其分所以為節也夫人欲富貴之心无窮苟非有以限節之則將如水之泛溢矣制為數度議其徳行視其人品為爵位之等第不使名器少有濫焉此君子用節之道也不出戸庭知通塞也集疏蔡氏曰塞謂二剛在前不出門庭凶失時極也不節之嗟又誰咎也集疏張子曰王弼於此无咎又别立一例只舊例亦可通若漢武帝下罪已之詔而天下説夫人有過而能改則復何咎之有安節之亨承上道也集疏程子曰四順承九五剛中正之道故安能節而致亨四能安節之義非一象獨舉其重者餘善亦不出於中正也甘節之吉居位中也苦節貞凶其道窮也集疏愚案節本非中正之道節而至於苦彖言不可貞也上六居節之上苦節之極者故曰其道窮也澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意集疏語録曰議獄緩死只是以誠意求之澤中有風感得水動議獄緩死則能感人心馮氏曰澤虚而善受風順而善入相孚之象甫刑曰獄成而孚又曰輸而孚此議獄緩死有取於中孚也議獄者詳其輕重之宜緩死者思其可生之路謂死囚中有未必死者存也獄成矣而又議之罪至死矣而又緩之惟恐失其實而傷其生所以用中孚也議獄兑口象緩死巽不果象新安胡氏曰象言刑獄五卦噬嗑豐以其有離之明震之威也賁次噬嗑旅次豐離明不易震皆反為艮盖明貴无時不然威則有時而當止至于中孚則全體似離互體有震艮而又兑以議之巽以緩之聖人即象垂教其忠厚惻怛之意見於謹刑如此何其仁哉五卦中惟文王於噬嗑中取用獄象夫子又即賁豐旅中孚以盡其義初九虞吉志未變也集疏泉豐龔氏曰志未變未有他從也有他從則志變矣其子和之中心願也或皷或罷位不當也馬匹亡絶類上也集疏蔡氏曰類隂也絶三之類而上從五也有孚攣如位正當也翰音登于天何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也集疏丘氏曰雷陽也方伏於地中其聲未發於卦為復及出於地上其聲和暢於卦為豫在於天上則震薄宇宙於卦為大壯今在山上則已離於地而未升於天其聲小過而已泉峰龔氏曰行過恭喪過哀用過儉皆過於小事而不過於大事過於近而不過於髙逺過於質而不過於文者也其禮奢寧儉喪易寧戚之意與飛鳥以凶不可如何也不及其君臣不可過也所以不及君而還遇臣者以臣不可過故也從或戕之凶如何也弗過遇之位不當也往厲必戒終不可長也爻義未明此亦當闕密雲不雨已上也已上大髙也集疏丘氏曰小過隂過而六五又居二陽之上隂氣閉結陽不得達故但為密雲而不能為雨也泉峰龔氏曰密雲不雨小畜謂其尚往者隂不足以畜陽而陽尚往也小過謂其已上者隂過乎陽而隂已上也一為陽之過一為隂之過皆隂陽不和之象所以不能為雨也弗遇過之已亢也水在火上既濟君子以思患而豫防之集疏古為徐氏曰水性潤下而居上火性炎上而居下相交以為用既濟之象也既濟雖非有患之時而患每生既濟之後君子慎思而預防之則不至於患矣坎險在外固當思患離明在内固當預防泉峰龔氏曰水上火下雖相為用然水決則火滅火炎則水涸相交之中相害之機伏焉故君子思患而預防之能防在乎預能預在乎思思患而預防所以用既濟也曳其輪義无咎也七日得以中道也三年克之憊也集疏程子曰三年克之勞憊之甚以見事之至難也語録曰用兵不得已也以髙宗之賢三年而克鬼方亦不勝其憊矣言其不可輕用也終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也集疏愚案殺牛以祭重祭也不如禴祭之受福盖東鄰之時已過而西鄰正得其時也其文王與紂之事乎來協音離濡其首厲何可久也火在水上未濟君子以慎辨物居方水火異物各居其所故君子觀象而審辨之集疏馮氏曰離火在上坎水在下水自水火自火其氣不交為未濟之象水為潤物火為炎物離上而坎下水火有其辨也以重卦觀之火居南水居北文王卦位也離上坎下水火不失其居也君子體之慎於辨物使物以羣分慎於居方使方以類聚也泉峰龔氏曰辨離明象居坎陷象濡其尾亦不知極也極字未詳考上下文亦不協或恐是敬字今且闕之集疏語録曰極或云當作拯字愚案只是極字當未濟之初而濡其尾不知其終濟否邪故曰不知其極九二貞吉中以行正也九居二本非正以中故得正也集疏泉峰龔氏曰以九居二本不可以為正但居得其中所以適宜所謂中以行正者也未濟征凶位不當也貞吉悔亡志行也君子之光其暉吉也暉者光之散也飲酒濡首亦不知節也集疏愚案初六曰濡其尾不知其極上九曰濡其首亦不知節是皆不知未濟之義也知未濟之義則當有所待而知所止矣有所待則不至於濡尾知所止則不至於濡首故曰不知其極不知節也周易本義集成卷六
